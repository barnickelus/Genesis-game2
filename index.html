  for(let i=0;i<60;i++)dust.push({x:rng(-1500,1500),y:rng(-1500,1500),s:rng(.2,1),vx:rng(-.04,.04),vy:rng(-.04,.04),a:rng(.015,.055),ph:rng(0,TAU)});

function spawn(type,n){
  const T=ORGS[type];
  for(let i=0;i<n;i++){
    if(type==='echo'&&orgs.filter(o=>o.type==='echo').length>=2)return;
    const r=rng(T.minR,T.maxR),a=Math.random()*TAU;
    const minD = type === 'spore' ? 30 : 180;
    const d=rng(minD,T.spW);
    // Individual variation: hue shift, phase, fin offset
    const hueShift=rng(-12,12); // slight color individuality

      r,br:r,hp:T.hp,mhp:T.hp,vx:0,vy:0,hd:Math.random()*TAU,
      st:'idle',stT:0,stunT:0,wAng:Math.random()*TAU,ph:rng(0,TAU),
      ambR:type==='lurker',lAng:rng(0,TAU),trail:[],flT:0,
      hueShift,finPh:rng(0,TAU),breathPh:rng(0,TAU),
      eyeAng:0, // tracks player smoothly
      scatterT:0 // school scatter timer
    });
  }
}

// ═══════════════════════════════════════
// BOIDS FLOCKING SYSTEM
// ═══════════════════════════════════════
function boids(o, dt) {
  const T = ORGS[o.type];
  if (!T.school) return {fx:0, fy:0};
  
  const schR = T.schR || 100;
  let sepX=0,sepY=0,sepN=0; // separation
  let aliX=0,aliY=0,aliN=0; // alignment
  let cohX=0,cohY=0,cohN=0; // cohesion
  
  for (const q of orgs) {
    if (q === o || q.type !== o.type) continue;
    const dx = q.x - o.x, dy = q.y - o.y;
    const dd = Math.hypot(dx, dy);
    if (dd > schR || dd < 0.1) continue;
    
    // Separation: push away from very close neighbors
    if (dd < schR * 0.35) {
      const w = 1 - dd / (schR * 0.35);
      sepX -= (dx / dd) * w;
      sepY -= (dy / dd) * w;
      sepN++;
    }
    // Alignment: match heading of nearby neighbors
    aliX += Math.cos(q.hd);
    aliY += Math.sin(q.hd);
    aliN++;
    // Cohesion: steer toward center of nearby group
    cohX += q.x;
    cohY += q.y;
    cohN++;
  }
  
  let fx = 0, fy = 0;
  
  if (sepN > 0) { fx += sepX / sepN * 1.8; fy += sepY / sepN * 1.8; }
  if (aliN > 0) {
    const ax = aliX / aliN, ay = aliY / aliN;
    fx += (ax - Math.cos(o.hd)) * 0.6;
    fy += (ay - Math.sin(o.hd)) * 0.6;
  }
  if (cohN > 0) {
    const cx2 = cohX / cohN - o.x, cy2 = cohY / cohN - o.y;
    const cd = Math.hypot(cx2, cy2);
    if (cd > 1) { fx += (cx2 / cd) * 0.4; fy += (cy2 / cd) * 0.4; }
  }
  
  // Scatter: if player is close and threatening, school explodes outward
  const scatterMult = Math.min(1, 0.15 + P.stg * 0.22);
  if (canEat(o)) {
    const pd = d2(P, o);
    const fleeR = (60 + P.r * 1.8) * scatterMult;
    if (pd < fleeR) {
      o.scatterT = 500 * scatterMult;
      for (const q of orgs) {
        if (q.type === o.type && d2(o, q) < schR) q.scatterT = Math.max(q.scatterT, 400 * scatterMult);
      }
    }
  }
  
  // During scatter: override cohesion with separation (scaled)
  if (o.scatterT > 0) {
    fx *= 0.3; fy *= 0.3;
    const fa = a2(P, o);
    const urgency = (o.scatterT / 500) * scatterMult;
    fx += Math.cos(fa) * 2 * urgency;
    fy += Math.sin(fa) * 2 * urgency;
  }
  
  return { fx, fy };
}

// Synchronized pulse within schools
function schoolPulse(o, ts) {
  // Find nearest same-type neighbor and sync phase toward it
  let nearest = null, nd = Infinity;
  for (const q of orgs) {
    if (q === o || q.type !== o.type) continue;
    const dd = d2(o, q);

}

// ═══ ORGANISM AI ═══
function aiOrg(o, dt) {
  const T = ORGS[o.type], dist = d2(P, o);
  const smaller = canEat(o), bigger = isPred(o);
  const spd = T.spd * (o.stunT > 0 ? .15 : 1);
  o.stT -= dt; o.stunT = Math.max(0, o.stunT - dt); o.flT = Math.max(0, o.flT - dt);
  o.ph += dt * .003; o.finPh += dt * .006; o.breathPh += dt * .004;
  o.scatterT = Math.max(0, o.scatterT - dt);
  
  // Eye tracking: smoothly look toward player
  const targetEye = a2(o, P);
  const eyeDiff = Math.atan2(Math.sin(targetEye - o.eyeAng), Math.cos(targetEye - o.eyeAng));
  o.eyeAng += eyeDiff * Math.min(1, dt * .005);
  
  // Trail
  if (Math.random() < .04) o.trail.push({x:o.x, y:o.y, l:250});
  if (o.trail.length > 6) o.trail.shift();
  o.trail.forEach(t => t.l -= dt); o.trail = o.trail.filter(t => t.l > 0);
  
  // School pulse sync
  if (T.school) schoolPulse(o, gt);
  
  let tx = o.x, ty = o.y;
  // FLEE SCALING: at stage 0, prey barely reacts. Scales up as player evolves.
  const fleeMult = Math.min(1, 0.2 + P.stg * 0.25);
  const fleeR = smaller ? (60 + P.r * 1.8) * fleeMult : 0;
  const huntR = bigger ? 180 + o.r * 3 : 0;
  
  switch(T.beh) {
    case 'passive_food': {
      // Spores: very gentle drift, NEVER flee. Easy food.
      o.wAng += (Math.random()-.5) * .01 * dt;
      tx = o.x + Math.cos(o.wAng) * spd;
      ty = o.y + Math.sin(o.wAng) * spd;
      // Slowly drift toward areas with other spores (mild clumping)
      let cx2=0,cy2=0,cn=0;
      for(const q of orgs){if(q!==o&&q.type==='spore'&&d2(o,q)<80){cx2+=q.x;cy2+=q.y;cn++;}}
      if(cn>0){tx+=((cx2/cn)-o.x)*.003;ty+=((cy2/cn)-o.y)*.003;}
      break;
    }
    case 'drift': {
      o.wAng += (Math.random()-.5) * .03 * dt;
      tx = o.x + Math.cos(o.wAng) * spd; ty = o.y + Math.sin(o.wAng) * spd;
      if (smaller && dist < fleeR) {
        const fa = a2(P, o), u = 1 - dist / fleeR;
        tx = o.x + Math.cos(fa) * spd * (1.5 + u * 2.5) * fleeMult;
        ty = o.y + Math.sin(fa) * spd * (1.5 + u * 2.5) * fleeMult;
      }
      break;
    }
    case 'swarm': {
      o.wAng += (Math.random()-.5) * .04 * dt;
      tx = o.x + Math.cos(o.wAng) * spd * .5; ty = o.y + Math.sin(o.wAng) * spd * .5;
      if (smaller && dist < fleeR) {
        const fa = a2(P, o), u = 1 - dist / fleeR;
        tx = o.x + Math.cos(fa) * spd * (2 + u * 3) * fleeMult;
        ty = o.y + Math.sin(fa) * spd * (2 + u * 3) * fleeMult;
      }
      break;
    }
    case 'pulse': {
      const ps = Math.sin(o.breathPh * 2) * spd * 2;
      tx = o.x + Math.cos(o.hd) * ps; ty = o.y + Math.sin(o.hd) * ps;
      if (o.stT <= 0) { o.hd += (Math.random()-.5) * 1.5; o.stT = rng(1000, 2500); }
      if (smaller && dist < fleeR) {
        const fa = a2(P, o); tx = o.x + Math.cos(fa) * spd * 3 * fleeMult; ty = o.y + Math.sin(fa) * spd * 3 * fleeMult;
      }
      break;
    }
    case 'chase': {
      if (bigger && dist < huntR) {
        const ha = a2(o, P); tx = o.x + Math.cos(ha) * spd * (dist < 100 ? 1.8 : 1.2); ty = o.y + Math.sin(ha) * spd * (dist < 100 ? 1.8 : 1.2);
      } else if (smaller && dist < fleeR) {
        const fa = a2(P, o), zz = Math.sin(gt * .005) * .6;
        tx = o.x + Math.cos(fa+zz) * spd * 2.8 * fleeMult; ty = o.y + Math.sin(fa+zz) * spd * 2.8 * fleeMult;
      } else { o.wAng += (Math.random()-.5) * .03 * dt; tx = o.x + Math.cos(o.wAng) * spd * .5; ty = o.y + Math.sin(o.wAng) * spd * .5; }
      break;
    }
    case 'ambush': {
      if (smaller && dist < fleeR) { const fa = a2(P, o); tx = o.x + Math.cos(fa) * spd * 3; ty = o.y + Math.sin(fa) * spd * 3; o.ambR = false; o.stT = 2000; }
      else if (o.ambR) { o.lAng += dt * .003; if ((bigger || (!smaller && !bigger)) && dist < 65) { o.ambR = false; o.stT = 2200; const ha = a2(o, P); o.vx = Math.cos(ha) * 6; o.vy = Math.sin(ha) * 6; burst(o.x, o.y, T.col, 6, 2); shk(2, 50); } }
      else { o.wAng += (Math.random()-.5) * .02 * dt; tx = o.x + Math.cos(o.wAng) * spd; ty = o.y + Math.sin(o.wAng) * spd; if (o.stT <= 0) o.ambR = true; }
      break;
    }
    case 'passive': {
      o.wAng += (Math.random()-.5) * .006 * dt; tx = o.x + Math.cos(o.wAng) * spd; ty = o.y + Math.sin(o.wAng) * spd;
      if (smaller && dist < fleeR * .7) { const fa = a2(P, o); tx = o.x + Math.cos(fa) * spd * 2; ty = o.y + Math.sin(fa) * spd * 2; }
      if (o.flT > 0 && bigger && dist < 250) { const ha = a2(o, P); tx = o.x + Math.cos(ha) * spd * 2.5; ty = o.y + Math.sin(ha) * spd * 2.5; }
      break;
    }
    case 'lure': {
      if (smaller && dist < fleeR) { const fa = a2(P, o); tx = o.x + Math.cos(fa) * spd * 2.5; ty = o.y + Math.sin(fa) * spd * 2.5; }
      else if (bigger) { if (dist > 250) { if (Math.random() < .007) parts.push({x:lp(o.x,P.x,.6)+rng(-20,20),y:lp(o.y,P.y,.6)+rng(-20,20),vx:0,vy:0,r:3,life:1500,ml:1500,c:C.prey,t:'lure'}); const ha = a2(o, P); tx = o.x + Math.cos(ha) * spd * .4; ty = o.y + Math.sin(ha) * spd * .4; } else { const ha = a2(o, P); tx = o.x + Math.cos(ha) * spd * 2; ty = o.y + Math.sin(ha) * spd * 2; } }
      else { o.wAng += (Math.random()-.5) * .03 * dt; tx = o.x + Math.cos(o.wAng) * spd; ty = o.y + Math.sin(o.wAng) * spd; }
      break;
    }
    case 'apex': {
      if (smaller && dist < fleeR) { const fa = a2(P, o); tx = o.x + Math.cos(fa) * spd * 3; ty = o.y + Math.sin(fa) * spd * 3; }
      else if (bigger && dist < huntR) { const px = P.x + P.vx * 30, py = P.y + P.vy * 30, ha = Math.atan2(py - o.y, px - o.x); tx = o.x + Math.cos(ha) * spd * 1.6; ty = o.y + Math.sin(ha) * spd * 1.6; if (dist < 150 && o.stT <= 0) { o.vx = Math.cos(ha) * 5; o.vy = Math.sin(ha) * 5; o.stT = 1800; burst(o.x, o.y, T.col, 8, 3); shk(3, 80); } }
      else { const oa = a2(o, P) + PI / 3; tx = o.x + Math.cos(oa) * spd; ty = o.y + Math.sin(oa) * spd; }
      break;
    }
    case 'mirror': {
      if (smaller && dist < fleeR) { const fa = a2(P, o); tx = o.x + Math.cos(fa) * spd * 2.5; ty = o.y + Math.sin(fa) * spd * 2.5; }
      else if (behMem.length >= 10) { const s = behMem[Math.floor(Math.random() * behMem.length)]; const ch = Math.sin(gt * .002) * .7; tx = o.x + s.vx * -1 + Math.sin(gt * .003 + o.x) * ch; ty = o.y + s.vy * -1 + Math.cos(gt * .003 + o.y) * ch; if (Math.random() < .012) { const ha = a2(o, P); o.vx += Math.cos(ha) * 4; o.vy += Math.sin(ha) * 4; } }
      break;
    }
  }
  
  // Apply boids flocking
  const flock = boids(o, dt);
  const moveX = (tx - o.x) * .04 + flock.fx * .3;
  const moveY = (ty - o.y) * .04 + flock.fy * .3;
  
  o.vx = o.vx * .9 + moveX;
  o.vy = o.vy * .9 + moveY;
  o.x += o.vx * (dt / 16); o.y += o.vy * (dt / 16);
  o.hd = Math.atan2(o.vy, o.vx);
  
  if (d2(P, o) > 2200) { const a = Math.random() * TAU, dd = rng(500, T.spW); o.x = P.x + Math.cos(a) * dd; o.y = P.y + Math.sin(a) * dd; o.hp = o.mhp; o.ambR = T.beh === 'ambush'; }
}

// ═══ PLAYER ═══
function updateP(dt) {
  const s = stg(); let dx = 0, dy = 0;
  if (jkAct) { ptr.x = P.x + jkX * 100; ptr.y = P.y + jkY * 100; ptr.on = true; }
  if (ptr.on) { dx = ptr.x - P.x; dy = ptr.y - P.y; }
  const dL = Math.hypot(dx, dy); if (dL > .5) P.hd = Math.atan2(dy, dx);
  if (ptr.tap && s.ab && s.cd > 0) useAbil(); ptr.tap = false;
  let spd = s.spd * (1 + Math.log2(Math.max(1, P.mass)) * .08);
  if (P.dash) { spd *= 2.5; P.dashT -= dt; if (P.dashT <= 0) P.dash = false; }
  if (P.boost > 0) { spd *= 1.2; P.boost = Math.max(0, P.boost - dt); }
  if (dL > 2) { P.vx = lp(P.vx, dx / dL * spd, .1); P.vy = lp(P.vy, dy / dL * spd, .1); } else { P.vx *= .9; P.vy *= .9; }
  P.x += P.vx * (dt / 16); P.y += P.vy * (dt / 16);
  P.r = calcR(P.mass, s.bR);
  const floor = STAGES[P.stg].thr * .85 + 3;
  P.mass = Math.max(floor, P.mass - calcDecay(P.mass, dt));
  P.tail.unshift({x: P.x, y: P.y}); while (P.tail.length > Math.floor(16 + Math.log2(Math.max(1, P.mass)) * 8)) P.tail.pop();
  P.blink = Math.max(0, P.blink - dt); abil_cd = Math.max(0, abil_cd - dt);
  if (P.flash.t > 0) P.flash.t -= dt; streakT = Math.max(0, streakT - dt); if (streakT <= 0) streak = 0;
  if (s.ab === 'sting') orgs.forEach(o => { if (d2(P, o) < P.r * 3 && canEat(o)) { o.stunT = Math.max(o.stunT, 400); if (Math.random() < .02) { o.hp--; o.flT = 120; } } });
  if (s.ab === 'gravity') orgs.forEach(o => { const dd = d2(P, o); if (dd < P.r * 6 && canEat(o)) { const ps = .5 * (1 - dd / (P.r * 6)), a = a2(o, P); o.vx += Math.cos(a) * ps; o.vy += Math.sin(a) * ps; } });
  behMem.push({vx: P.vx, vy: P.vy, hd: P.hd}); if (behMem.length > 120) behMem.shift();
}

function useAbil() {

// ═══ COLLISIONS ═══
function collide(dt) {
  for (let i = orgs.length - 1; i >= 0; i--) {
    const o = orgs[i], T = ORGS[o.type], dist = d2(P, o);
    if (canEat(o) && dist < P.r) { const gain = calcGain(T.mass, P.mass); P.mass += gain; score += Math.floor(gain * 8); streak++; streakT = 2500; burst(o.x, o.y, T.col, 8, 1.8); fTxt(o.x, o.y - 10, '+' + Math.floor(gain), T.col); if (streak > 2) fTxt(o.x, o.y - 24, streak + 'x', 'rgba(255,255,255,.5)'); shk(.6 + o.r * .06, 50); snd('sfxEat'); orgs.splice(i, 1); const cnt = orgs.filter(q => q.type === o.type).length;
      if (cnt < T.mx) setTimeout(() => spawn(o.type, 1), rng(1500, 4000));

    if (o.hp <= 0) { const gain = calcGain(T.mass * .4, P.mass); P.mass += gain; score += Math.floor(gain * 5); burst(o.x, o.y, T.col, 12, 2.5); fTxt(o.x, o.y - 10, '+' + Math.floor(gain), T.col); orgs.splice(i, 1); checkEvo(); }
  }
  for (let i = projs.length - 1; i >= 0; i--) { const p = projs[i]; p.x += p.vx; p.y += p.vy; p.life -= 16; parts.push({x: p.x, y: p.y, vx: rng(-.15, .15), vy: rng(-.15, .15), r: rng(.5, 2), life: 140, ml: 140, c: p.c, t: 'c'}); if (p.life <= 0) { projs.splice(i, 1); continue; } for (let j = orgs.length - 1; j >= 0; j--) { if (d2(p, orgs[j]) < orgs[j].r + p.r) { orgs[j].hp -= p.dmg; orgs[j].flT = 180; orgs[j].stunT = 300; orgs[j].vx += p.vx * .3; orgs[j].vy += p.vy * .3; burst(p.x, p.y, p.c, 6, 1.5); projs.splice(i, 1); break; } } }

  if (frenzy) { fTime -= dt; if (fTime <= 0) frenzy = false; }
  if (!pill.on && !frenzy) { pill.cd += dt; if (pill.cd > 20000 + rng(0, 8000)) { pill = {x: P.x + rng(-600, 600), y: P.y + rng(-600, 600), r: 9, on: true, cd: 0}; } }
  if (shld.on && d2(P, shld) < P.r + shld.r) { P.flash = {c: '#e8c040', t: 400}; shOn = true; shTime = 5000; shld.on = false; snd('sfxEat'); burst(shld.x, shld.y, '#e8c040', 12, 2); shk(2, 100); }
  if (shOn) { shTime -= dt; if (shTime <= 0) shOn = false; }
  if (!shld.on && !shOn) { shld.cd += dt; if (shld.cd > 25000 + rng(0, 10000)) { shld = {x: P.x + rng(-600, 600), y: P.y + rng(-600, 600), r: 9, on: true, cd: 0}; } }

}

function bioGlow(x,y,r,col,a){if(!onS(x,y,r*3))return;cx.globalAlpha=a;const g=cx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,col+'.1)');g.addColorStop(.5,col+'.03)');g.addColorStop(1,col+'0)');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,TAU);cx.fill();cx.globalAlpha=1;}

  return `rgb(${cl(r+shift,0,255)},${cl(g+shift*.7,0,255)},${cl(b-shift*.3,0,255)})`;

    cx.fillStyle = '#012'; cx.globalAlpha = 1; cx.beginPath(); cx.arc(Math.cos(ea) * r * .35, Math.sin(ea) * r * .35, r * .06, 0, TAU); cx.fill();

    if (dd < 350) { const iy = -r - 9; if (canEat(o)) { cx.fillStyle = 'rgba(120,232,96,.35)'; cx.beginPath(); cx.moveTo(o.x - 3, o.y + iy - 5); cx.lineTo(o.x + 3, o.y + iy - 5); cx.lineTo(o.x, o.y + iy); cx.fill(); } else if (isPred(o)) { cx.fillStyle = 'rgba(232,60,60,.35)'; cx.beginPath(); cx.moveTo(o.x - 3, o.y + iy); cx.lineTo(o.x + 3, o.y + iy); cx.lineTo(o.x, o.y + iy - 5); cx.fill(); } }

  }
  
  // ═══ SPORE — tiny passive food, soft glow, no eyes, drifting ═══
  if (o.type === 'spore') {

    cx.fillStyle = col; cx.globalAlpha = pulse * .7;

    cx.beginPath(); cx.arc(0, 0, r * .35, 0, TAU); cx.fill();
  }
  
  // ═══ BLOOM — soft algae cluster, multiple overlapping lobes ═══
  else if (o.type === 'bloom') {
    const pulse = .5 + .25 * Math.sin(o.breathPh * 1.2);

  // ═══ POLYP — cell with nucleus, organelles, membrane ═══
  else if (o.type === 'polyp') {

    cx.beginPath(); cx.arc(0, 0, r * 1.1, 0, TAU); cx.stroke();

    cx.fillStyle = col; cx.globalAlpha = .5; cx.beginPath(); cx.arc(0, 0, r, 0, TAU); cx.fill();
    // Nucleus (large, slightly off-center)
    cx.fillStyle = dimCol; cx.globalAlpha = .3;
    cx.beginPath(); cx.arc(r * .1, r * -.05, r * .35, 0, TAU); cx.fill();
    // Nucleolus (bright dot inside nucleus)
    cx.fillStyle = 'rgba(255,255,255,.4)'; cx.beginPath(); cx.arc(r * .12, r * -.08, r * .12, 0, TAU); cx.fill();
    // Organelles (mitochondria-like shapes)

    for (let i = 0; i < 3; i++) {

    }

  }
  
  // ═══ TENDRIL — jellyfish bell with internal canals + animated tentacles ═══

    cx.quadraticCurveTo(r * .9, -r * .75, r * .9, r * .08);
    cx.quadraticCurveTo(r * .4, r * .25, 0, r * .15);
    cx.quadraticCurveTo(-r * .4, r * .25, -r * .9, r * .08);
    cx.fill();
    // Radial canals (internal structure)
    cx.strokeStyle = 'rgba(255,255,255,.08)'; cx.lineWidth = .4;

    }
    // Gonads (bright spots at canal ends)
    cx.fillStyle = 'rgba(255,255,255,.18)';
    for (let i = 0; i < 4; i++) {
      const ca = (i / 4) * PI - PI / 2 + PI / 8;

    }

    cx.moveTo(r * 1.25, 0);
    cx.quadraticCurveTo(r * .9, -r * .3, r * .3, -r * .33);
    cx.lineTo(-r * .5, -r * .3);
    cx.quadraticCurveTo(-r * .85, -r * .15, -r, r * .08);
    cx.lineTo(-r * .85, 0);
    cx.lineTo(-r, -r * .08);
    cx.quadraticCurveTo(-r * .85, r * .15, -r * .5, r * .3);
    cx.lineTo(r * .3, r * .33);
    cx.quadraticCurveTo(r * .9, r * .3, r * 1.25, 0);

    cx.lineTo(r * .45, -r * .3); cx.fill();

      cx.lineTo(r * -.1, s * r * .28); cx.fill();

    }

    cx.beginPath(); cx.moveTo(r * .8, 0); cx.lineTo(-r * .6, 0); cx.stroke();
    // Eye — tracks player

    const eyeX = r * .6, eyeY = -r * .06;
    cx.fillStyle = '#fff'; cx.globalAlpha = .85;
    cx.beginPath(); cx.ellipse(eyeX, eyeY, r * .12, r * .1, 0, 0, TAU); cx.fill();
    // Iris follows player
    const ix = cl(Math.cos(ea) * r * .04, -r * .04, r * .04);
    const iy = cl(Math.sin(ea) * r * .04, -r * .04, r * .04);
    cx.fillStyle = '#300'; cx.globalAlpha = 1;
    cx.beginPath(); cx.arc(eyeX + ix, eyeY + iy, r * .055, 0, TAU); cx.fill();
  }
  
  // ═══ LURKER — angler with bioluminescent barbel, textured skin ═══
  else if (o.type === 'lurker') {
    cx.fillStyle = col; cx.globalAlpha = .55;
    cx.beginPath();
    cx.moveTo(r * .45, 0); cx.quadraticCurveTo(r * .65, -r * .4, r * .1, -r * .6);
    cx.quadraticCurveTo(-r * .35, -r * .75, -r * .65, -r * .25);
    cx.quadraticCurveTo(-r * .9, 0, -r * .65, r * .25);
    cx.quadraticCurveTo(-r * .35, r * .75, r * .1, r * .6);
    cx.quadraticCurveTo(r * .65, r * .4, r * .45, 0); cx.fill();
    // Skin texture (small bumps)
    cx.fillStyle = dimCol; cx.globalAlpha = .15;
    for (let i = 0; i < 8; i++) {
      const ba = o.ph + i * .8, bd = r * rng(.2, .5);
      cx.beginPath(); cx.arc(Math.cos(ba) * bd, Math.sin(ba) * bd, r * .04, 0, TAU); cx.fill();
    }
    // Mouth (dark crescent)

    cx.beginPath(); cx.arc(r * .3, 0, r * .15, -.3, .3); cx.lineTo(r * .4, 0); cx.fill();
    // Teeth (tiny bright points)
    cx.fillStyle = 'rgba(255,255,255,.3)'; cx.globalAlpha = .4;
    for (let i = 0; i < 4; i++) {
      const ta = -.2 + (i / 3) * .4;
      cx.beginPath(); cx.arc(r * .3 + Math.cos(ta) * r * .15, Math.sin(ta) * r * .15, .8, 0, TAU); cx.fill();
    }
    // Barbel (lure stalk + light)
    if (o.ambR) {
      const lx = r * .6 + Math.sin(o.lAng) * r * .2, ly = -r * .5 - r * .4 + Math.cos(o.lAng) * r * .12;
      cx.strokeStyle = 'rgba(255,255,255,.15)'; cx.lineWidth = .5; cx.globalAlpha = .35;
      cx.beginPath(); cx.moveTo(r * .1, -r * .6);
      cx.quadraticCurveTo(r * .35, -r * .85, lx, ly); cx.stroke();
      // Lure glow
      cx.fillStyle = C.prey; cx.globalAlpha = .45 + .35 * Math.sin(ts * .008);
      cx.shadowBlur = 10 * zm; cx.shadowColor = C.prey;
      cx.beginPath(); cx.arc(lx, ly, 2.5 + Math.sin(ts * .012) * .5, 0, TAU); cx.fill();
      bioGlow(o.x + Math.cos(o.hd) * (r * .6) + Math.sin(o.lAng) * r * .2,
              o.y + Math.sin(o.hd) * (r * .6) + Math.cos(o.lAng) * r * .2,

    cx.fillStyle = '#fff'; cx.globalAlpha = .7; cx.beginPath(); cx.arc(r * .05, -r * .2, r * .11, 0, TAU); cx.fill();
    cx.fillStyle = '#320'; cx.globalAlpha = 1;
    cx.beginPath(); cx.arc(r * .05 + cl(Math.cos(ea) * r * .03, -r * .03, r * .03), -r * .2 + cl(Math.sin(ea) * r * .03, -r * .03, r * .03), r * .05, 0, TAU); cx.fill();
  }
  
  // ═══ LEVIATHAN — whale with baleen grooves, pec fins, blowhole ═══
  else if (o.type === 'levia') {
    cx.fillStyle = col; cx.globalAlpha = .4;
    cx.beginPath();
    cx.moveTo(r * 1.1, 0);
    cx.quadraticCurveTo(r, -r * .42, r * .2, -r * .48);
    cx.quadraticCurveTo(-r * .3, -r * .5, -r * .6, -r * .28);
    cx.quadraticCurveTo(-r * .95, -.06, -r * 1.15, 0);
    cx.quadraticCurveTo(-r * .95, .06, -r * .6, r * .28);

    }

    cx.fillStyle = dimCol; cx.globalAlpha = .3;
    const tailFlex = Math.sin(o.finPh * .8) * .1;
    cx.beginPath(); cx.moveTo(-r * .95, 0); cx.lineTo(-r * 1.3, -r * (.32 + tailFlex)); cx.lineTo(-r * 1.05, -r * .03); cx.fill();
    cx.beginPath(); cx.moveTo(-r * .95, 0); cx.lineTo(-r * 1.3, r * (.32 - tailFlex)); cx.lineTo(-r * 1.05, r * .03); cx.fill();
    // Pectoral fin
    cx.globalAlpha = .25; cx.beginPath();
    cx.moveTo(r * .2, r * .35);
    cx.quadraticCurveTo(r * .1, r * (.55 + finWave * .06), -r * .15, r * (.45 + finWave * .04));
    cx.lineTo(r * .05, r * .3); cx.fill();
    // Blowhole
    cx.fillStyle = dimCol; cx.globalAlpha = .15;
    cx.beginPath(); cx.ellipse(r * .4, -r * .35, r * .04, r * .015, .2, 0, TAU); cx.fill();
    // Eye (small, gentle)
    cx.fillStyle = '#fff'; cx.globalAlpha = .5;
    cx.beginPath(); cx.arc(r * .65, -r * .1, r * .05, 0, TAU); cx.fill();
    // Gentle pulse rings
    cx.strokeStyle = dimCol; cx.lineWidth = .4;
    for (let w = 0; w < 2; w++) { cx.globalAlpha = .05; cx.beginPath(); cx.arc(0, 0, r * (1.3 + w * .25) + Math.sin(ts * .002 + w) * 2, 0, TAU); cx.stroke(); }
  }
  
  // ═══ PHANTOM — flowing teardrop with trailing filaments, spiral ═══
  else if (o.type === 'phantom') {
    cx.fillStyle = col; cx.globalAlpha = .45;
    cx.beginPath();
    cx.moveTo(r * .85, 0); cx.quadraticCurveTo(r * .5, -r * .5, 0, -r * .42);
    cx.quadraticCurveTo(-r * .6, -r * .22, -r * .35, 0);
    cx.quadraticCurveTo(-r * .6, r * .22, 0, r * .42);
    cx.quadraticCurveTo(r * .5, r * .5, r * .85, 0); cx.fill();
    // Internal spiral
    cx.strokeStyle = col; cx.lineWidth = .5; cx.globalAlpha = .12;
    cx.beginPath();
    for (let a = 0; a < TAU * 1.5; a += .06) { const sr = a / (TAU * 1.5) * r * .6; cx.lineTo(Math.cos(a + ts * .003) * sr, Math.sin(a + ts * .003) * sr); } cx.stroke();
    // Bioluminescent spots (unique pattern per individual)
    cx.fillStyle = 'rgba(255,255,255,.15)';
    for (let i = 0; i < 4; i++) {
      const sa = o.ph * .5 + i * 1.6, sd = r * .3;
      cx.beginPath(); cx.arc(Math.cos(sa) * sd, Math.sin(sa) * sd, r * .04 + Math.sin(ts * .005 + i) * r * .01, 0, TAU); cx.fill();
    }
    // Eyes (two, luminous)
    for (let s = -1; s <= 1; s += 2) {
      cx.fillStyle = '#fff'; cx.globalAlpha = .65;
      cx.beginPath(); cx.arc(r * .25, s * r * .1, r * .07, 0, TAU); cx.fill();
      // Pupil tracks player
      const ea = o.eyeAng - o.hd;
      cx.fillStyle = T.dim; cx.globalAlpha = .8;
      cx.beginPath(); cx.arc(r * .25 + Math.cos(ea) * r * .02, s * r * .1 + Math.sin(ea) * r * .02, r * .035, 0, TAU); cx.fill();
    }
    // Trailing filaments
    cx.strokeStyle = col; cx.lineWidth = .5; cx.globalAlpha = .15;
    for (let t = 0; t < 4; t++) {
      cx.beginPath(); cx.moveTo(-r * .35, (t - 1.5) * r * .08);
      let fx = -r * .35, fy = (t - 1.5) * r * .08;
      for (let seg = 0; seg < 4; seg++) {
        fx -= r * .25; fy += Math.sin(o.finPh + t * 1.5 + seg * .8) * r * .12;
        cx.lineTo(fx, fy);
      }
      cx.stroke();
    }
  }
  
  // ═══ BEHEMOTH — armored with crown spikes, glowing seams, three eyes ═══
  else if (o.type === 'behemoth') {
    // Armored body
    cx.fillStyle = col; cx.globalAlpha = .55;
    cx.beginPath(); for (let i = 0; i < 8; i++) { const a = (i / 8) * TAU, nr = r * (1 + ((i % 2) ? .08 : 0)); cx.lineTo(Math.cos(a) * nr, Math.sin(a) * nr); } cx.closePath(); cx.fill();
    // Armor plate seams (glowing lines)
    cx.strokeStyle = col; cx.lineWidth = .4; cx.globalAlpha = .08;
    for (let i = 0; i < 4; i++) { const a = (i / 4) * TAU; cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(Math.cos(a) * r * .65, Math.sin(a) * r * .65); cx.stroke(); }
    // Crown spikes
    cx.fillStyle = dimCol; cx.globalAlpha = .35;
    for (let i = 0; i < 6; i++) {
      const sa = (i / 6) * TAU + ts * .001, tip = r * 1.4 + Math.sin(ts * .003 + i) * r * .07;
      cx.beginPath(); cx.moveTo(Math.cos(sa - .09) * r, Math.sin(sa - .09) * r);
      cx.lineTo(Math.cos(sa) * tip, Math.sin(sa) * tip);
      cx.lineTo(Math.cos(sa + .09) * r, Math.sin(sa + .09) * r); cx.fill();
    }
    // Surface scarring (subtle marks)
    cx.strokeStyle = 'rgba(0,0,0,.08)'; cx.lineWidth = .3;
    for (let i = 0; i < 3; i++) {
      const sa = o.ph + i * 2.1, sd = r * .5;
      cx.beginPath(); cx.moveTo(Math.cos(sa) * sd - r * .05, Math.sin(sa) * sd);
      cx.lineTo(Math.cos(sa) * sd + r * .08, Math.sin(sa) * sd + r * .03); cx.stroke();
    }
    // Three eyes — all track player
    const ea = o.eyeAng - o.hd;
    for (let s = -1; s <= 1; s++) {
      const ed = s === 0 ? r * .42 : r * .38, ey2 = s * .25;
      cx.fillStyle = '#ff3300'; cx.globalAlpha = .75 + .15 * Math.sin(ts * .006 + s);
      cx.beginPath(); cx.arc(Math.cos(0) * ed, ey2, r * .06, 0, TAU); cx.fill();
      // Pupil
      cx.fillStyle = '#200'; cx.globalAlpha = 1;
      cx.beginPath(); cx.arc(Math.cos(0) * ed + Math.cos(ea) * r * .02, ey2 + Math.sin(ea) * r * .02, r * .03, 0, TAU); cx.fill();
    }
  }
  
  cx.restore();
  
  // HP ring
  if (o.hp < o.mhp && r * zm > 3) { const pct = o.hp / o.mhp; cx.strokeStyle = pct > .5 ? 'rgba(120,232,120,.3)' : pct > .25 ? 'rgba(232,232,80,.3)' : 'rgba(232,80,80,.3)'; cx.lineWidth = 1; cx.beginPath(); cx.arc(o.x, o.y, r + 2, -PI / 2, -PI / 2 + pct * TAU); cx.stroke(); }
  // Indicators
  if (dd < 300 && r * zm > 3) {
    if (canEat(o)) { cx.fillStyle = 'rgba(120,232,96,.3)'; cx.beginPath(); cx.moveTo(o.x - 3, o.y - r - 8); cx.lineTo(o.x + 3, o.y - r - 8); cx.lineTo(o.x, o.y - r - 3); cx.fill(); }
    else if (isPred(o)) { cx.fillStyle = 'rgba(232,60,60,.3)'; cx.beginPath(); cx.moveTo(o.x - 3, o.y - r - 3); cx.lineTo(o.x + 3, o.y - r - 3); cx.lineTo(o.x, o.y - r - 8); cx.fill(); }
  }
  cx.shadowBlur = 0; cx.globalAlpha = 1;
}

// ═══ TAPERED TAIL ═══
function drawTail(ts) {
  const n = P.tail.length; if (n < 4) return;
  const s = stg(), maxPts = 45, skip = Math.max(1, Math.floor(n / maxPts));
  const pts = []; for (let i = 0; i < n; i += skip) pts.push({...P.tail[i], t: i / (n - 1)});
  if (pts.length < 3) return;
  const headW = P.r * .6, tipW = .3;
  const left = [], right = [];
  for (let i = 0; i < pts.length; i++) {
