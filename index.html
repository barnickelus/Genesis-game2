<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>GENESIS EVOLUTION</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#00050e;touch-action:none}
#g{position:absolute;inset:0;width:100%;height:100%;display:block}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#hudTL{position:absolute;top:18px;left:20px;display:flex;flex-direction:column;gap:5px}
#stgName{font-family:'Cinzel',serif;font-size:14px;letter-spacing:7px;color:#fff;opacity:.88;text-transform:uppercase;text-shadow:0 0 20px currentColor}
#massTxt{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.28);font-style:italic}
#massTxt b{font-style:normal;font-weight:400;font-size:15px;color:rgba(255,255,255,.62)}
#evoBarWrap{width:150px;height:2px;background:rgba(255,255,255,.05);border-radius:1px;overflow:hidden;margin-top:1px}
#evoBar{height:100%;width:0;border-radius:1px;transition:width .5s ease}
#evoNxtLbl{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.14);font-style:italic;margin-top:2px}
#hudTR{position:absolute;top:16px;right:18px;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
#scoreTxt{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:rgba(255,255,255,.2)}
#abilTxt{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.18);font-style:italic}
#frzHud{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;color:#40c8f0;text-shadow:0 0 12px #40c8f0;margin-top:4px;opacity:0;transition:opacity .2s}
#frzHud.on{opacity:.95}
#frzBar{width:90px;height:2px;background:rgba(64,200,240,.18);margin-top:3px;border-radius:1px;overflow:hidden}
#frzBar i{display:block;height:100%;background:#40c8f0;box-shadow:0 0 8px #40c8f0;transition:width .12s linear}
#cdC{margin-top:2px;opacity:.38}

/* ── Evolution announce ── */
#evoAnn{position:fixed;inset:0;z-index:20;pointer-events:none;display:flex;align-items:flex-start;justify-content:center;padding-top:max(70px,env(safe-area-inset-top,0px) + 60px);opacity:0;transition:opacity .7s}
#evoBox{text-align:center;padding:14px 32px;background:rgba(0,5,14,.42);border:1px solid rgba(255,255,255,.06);border-radius:2px;box-shadow:0 4px 22px rgba(0,0,0,.4);transform:translateY(-6px);transition:transform .7s}
#evoAnn[style*="opacity: 1"] #evoBox{transform:translateY(0)}
#evoBox h1{font-family:'Cinzel',serif;font-size:clamp(18px,3.4vw,28px);letter-spacing:10px;margin-bottom:6px}
#evoBox p{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.45);font-style:italic}

/* ── Flash / vignette ── */
#flash{position:fixed;inset:0;z-index:19;pointer-events:none;opacity:0;transition:opacity .25s}
#danger{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0;transition:opacity .45s;background:radial-gradient(ellipse at center,transparent 35%,rgba(130,6,0,.22) 100%)}

/* ── Intro ── */
#intro{position:fixed;inset:0;z-index:50;background:#00050e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 1.4s;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#iTitle{font-family:'Cinzel',serif;font-size:clamp(20px,5vw,40px);letter-spacing:clamp(8px,2.5vw,20px);color:#fff;opacity:0;transition:opacity 1.8s;text-align:center;animation:titleBreathe 6s ease-in-out infinite 2s}
#iSub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(11px,2vw,14px);letter-spacing:5px;color:rgba(255,255,255,.3);opacity:0;transition:opacity 1.8s .9s;text-align:center}
#iHint{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.15);opacity:0;transition:opacity 1.8s 1.8s;text-align:center;animation:hintPulse 2.6s ease-in-out infinite 3.5s}
#iLine{width:1px;height:0;background:rgba(255,255,255,.12);transition:height 1.8s .4s;position:absolute;top:50%;margin-top:-60px}
#iSpark{position:absolute;top:50%;left:50%;width:2px;height:2px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);opacity:0;box-shadow:0 0 18px 4px rgba(82,255,202,.55);animation:sparkPulse 3.4s ease-in-out infinite 2.4s}
@keyframes titleBreathe{0%,100%{letter-spacing:clamp(8px,2.5vw,20px);text-shadow:0 0 24px rgba(255,255,255,.18)}50%{letter-spacing:clamp(9px,2.7vw,22px);text-shadow:0 0 40px rgba(255,255,255,.32)}}
@keyframes hintPulse{0%,100%{opacity:.18;letter-spacing:3px}50%{opacity:.55;letter-spacing:4px}}
@keyframes sparkPulse{0%,100%{opacity:0;transform:translate(-50%,-50%) scale(.4)}50%{opacity:.55;transform:translate(-50%,-50%) scale(1.4)}}

/* canvas baseline */
#g{touch-action:none;-webkit-tap-highlight-color:transparent;display:block}

/* ── Pause ── */
#pBtn{position:fixed;top:11px;right:16px;z-index:15;background:none;border:none;color:rgba(255,255,255,.15);font-size:15px;cursor:pointer;pointer-events:auto;font-family:serif}
#pMenu{position:fixed;inset:0;z-index:30;background:rgba(0,5,14,.94);display:none;flex-direction:column;align-items:center;justify-content:center;gap:11px;backdrop-filter:blur(18px)}
#pMenu h2{font-family:'Cinzel',serif;font-size:18px;letter-spacing:10px;color:rgba(255,255,255,.35);margin-bottom:14px}
#pMenu button{width:138px;padding:10px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(255,255,255,.38);background:transparent;border:1px solid rgba(255,255,255,.07);cursor:pointer;letter-spacing:2px;transition:all .3s}
#pMenu button:hover{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.2)}

/* ── Minimap ── */
#mmap{position:fixed;bottom:14px;left:14px;z-index:10;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.18)}
#mmC{display:block}
</style>
</head>
<body>
<canvas id="g"></canvas>

<div id="hud">
  <div id="hudTL">
    <div id="stgName">MOTE</div>
    <div id="massTxt"><b id="massV">10</b>&thinsp;mass</div>
    <div id="evoBarWrap"><div id="evoBar"></div></div>
    <div id="evoNxtLbl"></div>
  </div>
  <div id="hudTR">
    <div id="scoreTxt">0</div>
    <div id="abilTxt"></div>
    <canvas id="cdC" width="26" height="26"></canvas>
    <div id="frzHud">FRENZY<div id="frzBar"><i></i></div></div>
  </div>
</div>

<div id="evoAnn"><div id="evoBox"><h1 id="evoT"></h1><p id="evoS"></p></div></div>
<div id="flash"></div>
<div id="danger"></div>

<div id="intro">
  <div id="iLine"></div>
  <div id="iSpark"></div>
  <div id="iTitle">GENESIS EVOLUTION</div>
  <div id="iSub">in the beginning, there was signal</div>
  <div id="iHint">touch to emerge</div>
</div>

<button id="pBtn">⏸</button>
<div id="pMenu">
  <h2>PAUSED</h2>
  <button id="resumeB">Resume</button>
  <button id="restartB">Restart</button>
  <button id="muteB">Mute</button>
</div>

<div id="mmap"><canvas id="mmC" width="80" height="80"></canvas></div>

<!-- Background music: if a file named "background-music.mp3" sits next to this
     HTML, it will be loaded and routed through the stage-aware filter. If the
     file is missing, the procedural drone engine below provides an ambient bed. -->
<audio id="bgm" src="background-music.mp3" loop preload="auto"></audio>

<script>
'use strict';

// ═══════════════════════════════════════════
// CANVAS + RESIZE
// ═══════════════════════════════════════════
const G = document.getElementById('g');
const cx = G.getContext('2d', {alpha: false});
let W, H;
function resize() { W = G.width = innerWidth; H = G.height = innerHeight; }
addEventListener('resize', resize); resize();

// ═══════════════════════════════════════════
// MATH UTILS
// ═══════════════════════════════════════════
const TAU = Math.PI * 2, PI = Math.PI;
const rng  = (a, b) => a + Math.random() * (b - a);
const rni  = (a, b) => Math.floor(rng(a, b));
const lp   = (a, b, t) => a + (b - a) * t;
const cl   = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const dst  = (a, b) => Math.hypot(b.x - a.x, b.y - a.y);
const ang  = (a, b) => Math.atan2(b.y - a.y, b.x - a.x);

// ═══════════════════════════════════════════
// SPATIAL HASH
// ═══════════════════════════════════════════
const CELL = 160;
let grid = {};
function gKey(x, y) { return ((x / CELL | 0) + 5000) + ',' + ((y / CELL | 0) + 5000); }
function gIns(o) { const k = gKey(o.x, o.y); (grid[k] || (grid[k] = [])).push(o); }
function gNear(x, y, radius) {
  const out = [], cr = Math.ceil(radius / CELL), cx0 = x / CELL | 0, cy0 = y / CELL | 0;
  for (let dx = -cr; dx <= cr; dx++) for (let dy = -cr; dy <= cr; dy++) {
    const k = (cx0 + dx + 5000) + ',' + (cy0 + dy + 5000);
    const c = grid[k]; if (c) for (const o of c) out.push(o);
  }
  return out;
}
function rebuildGrid() { grid = {}; for (const o of orgs) gIns(o); }

// ═══════════════════════════════════════════
// PALETTE + STAGE DATA
// ═══════════════════════════════════════════
const COL = {
  mote:  { pri: '#52FFCA', dim: '#0d3828', gl: 'rgba(82,255,202,' },
  drift: { pri: '#14D0FF', dim: '#002e48', gl: 'rgba(20,208,255,' },
  medu:  { pri: '#C87FFF', dim: '#28084c', gl: 'rgba(200,127,255,' },
  naga:  { pri: '#FF9830', dim: '#3a1200', gl: 'rgba(255,152,48,' },
  titan: { pri: '#5AC8FF', dim: '#082840', gl: 'rgba(90,200,255,' },
  primo: { pri: '#FFD700', dim: '#382a00', gl: 'rgba(255,215,0,' },
};

const STAGES = [
  { name: 'MOTE',       thr: 0,    next: 120,  c: COL.mote,  spd: 2.8, bR: 6, desc: 'Consume the smaller.',                ab: null,       abT: '',         cd: 0    },
  { name: 'DRIFTER',    thr: 120,  next: 400,  c: COL.drift, spd: 3.2, bR: 7, desc: 'Propulsion stirs — the world declares itself.', ab: 'dash', abT: '↑ Dash',    cd: 700  },
  { name: 'MEDUSA',     thr: 400,  next: 1100, c: COL.medu,  spd: 2.4, bR: 8, desc: 'Sting aura radiates. Soft seams glow.', ab: 'sting',  abT: 'Sting Aura',cd: 0    },
  { name: 'NAGA',       thr: 1100, next: 2800, c: COL.naga,  spd: 3.4, bR: 7, desc: 'The lash awakens. Veils unravel.',     ab: 'whip',     abT: '↑ Whip',    cd: 1000 },
  { name: 'TITAN',      thr: 2800, next: 6000, c: COL.titan, spd: 2.2, bR: 9, desc: 'Gravity bends to will.',               ab: 'gravity',  abT: 'Gravity',   cd: 0    },
  { name: 'PRIMORDIAL', thr: 6000, next: 1/0,  c: COL.primo, spd: 2.8, bR: 8, desc: 'The first and the last.',              ab: 'bolt',     abT: '↑ Bolt',    cd: 400  },
];

// ═══════════════════════════════════════════
// ORGANISM DEFINITIONS
// ═══════════════════════════════════════════
const ORGS = {
  bloom:    { col:'#34D898', dim:'#123828', minR:4,   maxR:7,   spd:.04,  hp:1,  mass:8,   beh:'bloom',   spW:500,  mx:12             },
  mote:     { col:'#6AE856', dim:'#1a4212', minR:2.5, maxR:5.5, spd:.25,  hp:1,  mass:5,   beh:'drift',   spW:700,  mx:55, school:true, schR:90  },
  polyp:    { col:'#D8D030', dim:'#383c08', minR:5,   maxR:9,   spd:.5,   hp:2,  mass:12,  beh:'swarm',   spW:850,  mx:28, school:true, schR:110 },
  tendril:  { col:'#DC60A8', dim:'#340c28', minR:8,   maxR:14,  spd:.4,   hp:4,  mass:22,  beh:'pulse',   spW:950,  mx:12, school:true, schR:130 },
  hunter:   { col:'#E83030', dim:'#320606', minR:12,  maxR:22,  spd:1.5,  hp:8,  mass:35,  beh:'chase',   spW:1100, mx:8              },
  lurker:   { col:'#D07830', dim:'#301a06', minR:14,  maxR:26,  spd:.3,   hp:11, mass:50,  beh:'ambush',  spW:1300, mx:5              },
  levia:    { col:'#5890D8', dim:'#102040', minR:30,  maxR:50,  spd:.6,   hp:30, mass:90,  beh:'passive', spW:1500, mx:3              },
  phantom:  { col:'#C050E0', dim:'#240840', minR:16,  maxR:30,  spd:1,    hp:18, mass:60,  beh:'lure',    spW:1400, mx:4              },
  behemoth: { col:'#D01818', dim:'#300202', minR:40,  maxR:65,  spd:1.2,  hp:50, mass:140, beh:'apex',    spW:1800, mx:2              },
  echo:     { col:'#D8ECF4', dim:'#303e44', minR:11,  maxR:20,  spd:1,    hp:18, mass:65,  beh:'mirror',  spW:1100, mx:2              },
};

const PREY_OF = {
  hunter:   ['mote','polyp','bloom'],
  lurker:   ['mote','polyp','tendril'],
  phantom:  ['mote','polyp','tendril'],
  behemoth: ['mote','polyp','tendril','hunter','lurker','phantom'],
  levia:    ['bloom','mote'],
  tendril:  ['mote','bloom'],
  echo:     ['mote','polyp'],
};
const ECO_HUNT_R = { hunter:180, lurker:100, phantom:150, behemoth:250, levia:120, tendril:80, echo:140 };

// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
let P, orgs, projs, parts, txts, dust;
let paused, gt, score;
let shx, shy, shi, shd;
let abil_cd, streak, streakT;
let off, zm;
let muted = false;
let frenzy, fTime, frenzyOrbs;
let shOn, shTime;
let pill, shld, beacons;
let anoms, anomCd;
let frenzyTutorialShown = false;  // persists across restarts intentionally
let behMem;
let introActive = true;

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  P = { x:0, y:0, r:6, mass:10, vx:0, vy:0, hd:0, stg:0,
        tail:[], blink:0, dash:false, dashT:0, boost:0, flash:{c:'#fff',t:0} };
  orgs=[]; projs=[]; parts=[]; txts=[]; dust=[]; frenzyOrbs=[];
  score=0; abil_cd=0; streak=0; streakT=0; gt=0; behMem=[];
  frenzy=false; fTime=0; shOn=false; shTime=0;
  shx=shy=0; shi=shd=0; off={x:0,y:0}; zm=1;
  pill = { x:0, y:0, r:9, on:false, cd:0 };
  shld = { x:0, y:0, r:9, on:false, cd:0 };
  beacons = [{x:0,y:-1400},{x:0,y:1400},{x:1400,y:0},{x:-1400,y:0}].map(p=>({...p,r:14}));
  anoms = []; anomCd = 5000;  // first anomaly appears ~5s after start

  spawn('bloom',10); spawn('mote',45); spawn('polyp',22); spawn('tendril',8);
  spawn('hunter',4); spawn('lurker',2); spawn('levia',2); spawn('phantom',2); spawn('behemoth',1);

  for (let i=0; i<55; i++) dust.push({
    x:rng(-1600,1600), y:rng(-1600,1600),
    s:rng(.15,.85), vx:rng(-.03,.03), vy:rng(-.03,.03),
    a:rng(.009,.04), ph:rng(0,TAU)
  });
}

function spawn(type, n) {
  const T = ORGS[type];
  for (let i=0; i<n; i++) {
    if (type==='echo' && orgs.filter(o=>o.type==='echo').length >= 2) return;
    const r = rng(T.minR, T.maxR), a = Math.random()*TAU;
    const d = rng(type==='bloom'?60:180, T.spW);
    orgs.push({
      type, x:P.x+Math.cos(a)*d, y:P.y+Math.sin(a)*d,
      r, br:r, hp:T.hp, mhp:T.hp, vx:0, vy:0, hd:Math.random()*TAU,
      stT:0, stunT:0, wAng:Math.random()*TAU, ph:rng(0,TAU),
      ambR: type==='lurker', lAng:rng(0,TAU), trail:[],
      flT:0, hSh:rng(-10,10), finPh:rng(0,TAU),
      breathPh:rng(0,TAU), eyeAng:0, scatterT:0,
      lobes: type==='bloom' ? Array.from({length:5},()=>({a:rng(0,TAU),d:rng(.25,.4),r:rng(.45,.6),ph:rng(0,TAU)})) : null
    });
  }
}

function stg() { return STAGES[P.stg]; }

// ═══════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════
let ptr = {x:0, y:0, on:false, tap:false};
const tw = e => {
  // Guard against zm being 0 (shouldn't happen but defensive)
  const z = zm || 1;
  const x = (e.clientX - off.x) / z;
  const y = (e.clientY - off.y) / z;
  return { x: isFinite(x) ? x : P.x, y: isFinite(y) ? y : P.y };
};

G.addEventListener('pointerdown', e => {
  if (paused) return;
  if (introActive) { beginGame(); return; }
  ptr.on=true; ptr.tap=true;
  const w=tw(e); ptr.x=w.x; ptr.y=w.y;
});
G.addEventListener('pointermove', e => { if (!ptr.on || paused) return; const w=tw(e); ptr.x=w.x; ptr.y=w.y; });
G.addEventListener('pointerup', () => ptr.on=false);

// ── CRITICAL: intro div sits above canvas at z-index 50, so pointerdown on the
// canvas never fires while it's visible. Attach handlers directly to the intro,
// plus a window-level fallback (covers any edge case on iOS / iframe).
const introEl = document.getElementById('intro');
const introTap = (e) => {
  if (!introActive) return;
  if (e) { e.preventDefault(); e.stopPropagation(); }
  beginGame();
};
introEl.addEventListener('pointerdown', introTap, {passive:false});
introEl.addEventListener('click', introTap);
introEl.addEventListener('touchstart', introTap, {passive:false});
addEventListener('keydown', e => {
  if (introActive && (e.key===' '||e.key==='Enter'||e.code==='Space')) { e.preventDefault(); beginGame(); }
});

// ═══════════════════════════════════════════
// PROCEDURAL AUDIO ENGINE
// ═══════════════════════════════════════════
// Fully synthesized via Web Audio API — no external files. The BGM is a layered
// generative drone that grows with the player's evolutionary stage. Game events
// (kills, hurt, evolution, frenzy, anomaly) duck, sweep, and detune the BGM in
// real time. All SFX are synthesized in-place.
//
// Stage harmonics (semitones above root A1=55Hz):
//   Mote:       [0]            — primal hum
//   Drifter:    [0, 12]        — octave forms
//   Medusa:     [0, 12, 7]     — perfect fifth blooms
//   Naga:       [0, 12, 7, 3]  — minor third tension
//   Titan:      [0, 12, 7, 3, 10]   — minor 7th, mythic
//   Primordial: [0, 12, 7, 3, 10, 19] — high sparkle, cosmic

let AC=null, A_master=null, A_bgmGain=null, A_bgmFilter=null, A_drones=[],
    A_threatGain=null, A_threatOsc=null, A_frenzyGain=null, A_frenzyTick=0,
    A_mp3Gain=null, A_mp3Source=null, A_mp3Connected=false,
    audioReady=false;
const A_ROOT = 55;  // A1
const STAGE_HARMONICS = [
  [0],
  [0, 12],
  [0, 12, 7],
  [0, 12, 7, 3],
  [0, 12, 7, 3, 10],
  [0, 12, 7, 3, 10, 19],
];
const STAGE_CUTOFF = [700, 1500, 3000, 6000, 11000, 18000];
// Drones now sit at *bed* volume — mp3 BGM (if present) carries the melody on top.
// If no mp3 loads, drones are still audible enough to feel atmospheric.
const STAGE_BGM_VOL = [.10, .12, .14, .16, .17, .19];

function freq(semis) { return A_ROOT * Math.pow(2, semis / 12); }

function initAudio() {
  if (audioReady) return;
  try {
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) return;
    AC = new Ctor();

    // Master chain — overall volume reduced for subtler experience
    A_master = AC.createGain();
    A_master.gain.value = muted ? 0 : .55;     // was .9 — quieter overall
    A_master.connect(AC.destination);

    // BGM bus shared by drones + mp3 — both flow through this filter so stage
    // changes ramp the spectrum on whichever source is playing.
    A_bgmFilter = AC.createBiquadFilter();
    A_bgmFilter.type = 'lowpass';
    A_bgmFilter.frequency.value = STAGE_CUTOFF[0];
    A_bgmFilter.Q.value = 0.6;
    A_bgmFilter.connect(A_master);

    A_bgmGain = AC.createGain();
    A_bgmGain.gain.value = STAGE_BGM_VOL[0];
    A_bgmGain.connect(A_bgmFilter);

    // Try to wire the <audio> element through the same filter graph
    const mp3 = document.getElementById('bgm');
    if (mp3) {
      try {
        A_mp3Gain = AC.createGain();
        A_mp3Gain.gain.value = 0.45;  // mp3 sits below master, but louder than drone bed
        A_mp3Source = AC.createMediaElementSource(mp3);
        A_mp3Source.connect(A_mp3Gain).connect(A_bgmFilter);
        A_mp3Connected = true;
        mp3.volume = 1;  // delegate volume to graph
        if (!muted) mp3.play().catch(() => { /* may need second gesture */ });
      } catch(e) { /* if route fails, fall back to element-level playback */ }
    }

    // Threat layer — low menacing tone, swells when a real predator is near
    A_threatGain = AC.createGain(); A_threatGain.gain.value = 0;
    A_threatGain.connect(A_master);
    A_threatOsc = AC.createOscillator();
    A_threatOsc.type = 'sawtooth';
    A_threatOsc.frequency.value = 38;
    const threatFilter = AC.createBiquadFilter();
    threatFilter.type = 'lowpass'; threatFilter.frequency.value = 180; threatFilter.Q.value = 4;
    A_threatOsc.connect(threatFilter).connect(A_threatGain);
    A_threatOsc.start();

    A_frenzyGain = AC.createGain(); A_frenzyGain.gain.value = 0;
    A_frenzyGain.connect(A_master);

    audioReady = true;
    buildDrones(0);
  } catch(e) { /* audio unavailable, fail silently */ }
}

function buildDrones(stg) {
  if (!audioReady) return;
  // Stop and disconnect existing drones
  for (const d of A_drones) { try { d.osc.stop(); d.osc.disconnect(); d.gain.disconnect(); } catch(e){} }
  A_drones = [];
  const harms = STAGE_HARMONICS[stg];
  const now = AC.currentTime;
  for (let i=0; i<harms.length; i++) {
    const h = harms[i];
    // Two slightly detuned oscillators per harmonic for chorus thickness
    for (const detune of [-6, 6]) {
      const osc = AC.createOscillator();
      osc.type = i === 0 ? 'sawtooth' : (i < 3 ? 'sine' : 'triangle');
      osc.frequency.value = freq(h);
      osc.detune.value = detune;
      const g = AC.createGain();
      const baseVol = (i === 0 ? .35 : .12 - i*.012) * (1 / harms.length) * 1.4;
      g.gain.value = 0;
      g.gain.setTargetAtTime(baseVol, now, 1.5);
      // Slow LFO on volume — breathing
      const lfo = AC.createOscillator();
      lfo.frequency.value = .05 + i*.013;
      const lfoG = AC.createGain();
      lfoG.gain.value = baseVol * .25;
      lfo.connect(lfoG).connect(g.gain);
      lfo.start();
      osc.connect(g).connect(A_bgmGain);
      osc.start();
      A_drones.push({ osc, gain:g, lfo, lfoG, baseVol });
    }
  }
}

function setStageAudio(stg) {
  if (!audioReady) return;
  const now = AC.currentTime;
  A_bgmFilter.frequency.cancelScheduledValues(now);
  A_bgmFilter.frequency.setValueAtTime(A_bgmFilter.frequency.value, now);
  A_bgmFilter.frequency.linearRampToValueAtTime(STAGE_CUTOFF[stg], now + 2.6);
  A_bgmGain.gain.cancelScheduledValues(now);
  A_bgmGain.gain.setValueAtTime(A_bgmGain.gain.value, now);
  A_bgmGain.gain.linearRampToValueAtTime(STAGE_BGM_VOL[stg], now + 2.0);
  // Rebuild the drone stack with new harmonics, crossfade old out
  for (const d of A_drones) {
    d.gain.gain.cancelScheduledValues(now);
    d.gain.gain.setValueAtTime(d.gain.gain.value, now);
    d.gain.gain.linearRampToValueAtTime(0, now + 1.4);
    try { d.osc.stop(now + 1.6); d.lfo.stop(now + 1.6); } catch(e){}
  }
  setTimeout(() => buildDrones(stg), 1700);
}

// Apply temporary detune / filter sweep on bgm in response to events
function audioBend(semis, dur=.4) {
  if (!audioReady) return;
  const now = AC.currentTime, cents = semis * 100;
  for (const d of A_drones) {
    d.osc.detune.cancelScheduledValues(now);
    d.osc.detune.setValueAtTime(d.osc.detune.value, now);
    d.osc.detune.linearRampToValueAtTime(cents, now + .04);
    d.osc.detune.linearRampToValueAtTime(0, now + dur);
  }
}

function audioFilterPulse(targetHz, dur=.5) {
  if (!audioReady) return;
  const now = AC.currentTime;
  const cur = A_bgmFilter.frequency.value;
  A_bgmFilter.frequency.cancelScheduledValues(now);
  A_bgmFilter.frequency.setValueAtTime(cur, now);
  A_bgmFilter.frequency.linearRampToValueAtTime(targetHz, now + .04);
  A_bgmFilter.frequency.linearRampToValueAtTime(cur, now + dur);
}

function audioSetThreat(level) {
  if (!audioReady) return;
  // level: 0..1 — how close a real predator is
  const now = AC.currentTime, target = level * .18;
  A_threatGain.gain.cancelScheduledValues(now);
  A_threatGain.gain.setTargetAtTime(target, now, .4);
}

function audioSetFrenzy(on) {
  if (!audioReady) return;
  const now = AC.currentTime;
  A_frenzyGain.gain.cancelScheduledValues(now);
  A_frenzyGain.gain.setTargetAtTime(on ? .14 : 0, now, .2);
}

// ── SFX ──
function envOsc(type, freqArr, durs, vol, dest) {
  if (!audioReady) return;
  const now = AC.currentTime;
  const osc = AC.createOscillator();
  const g = AC.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freqArr[0], now);
  for (let i=1; i<freqArr.length; i++) osc.frequency.exponentialRampToValueAtTime(Math.max(.001,freqArr[i]), now + durs[i-1]);
  const total = durs.reduce((a,b)=>a+b, 0);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(vol, now + Math.min(.01, total*.1));
  g.gain.exponentialRampToValueAtTime(.0001, now + total);
  osc.connect(g).connect(dest || A_master);
  osc.start(now); osc.stop(now + total + .05);
}

function sfxEat() {

  envOsc('triangle', [440, 1200], [.06], .035, A_master); // was .08
}

function sfxHurt() {

// ── EMERGENCE — the long deep drop that plays when the player materializes ──
// Sub-bass swell into a low dropping tone, paired with a slow rising filter
// shimmer. Designed to feel like a vast ancient something drawing breath.
function sfxEmerge() {
  if (!audioReady) return;  // play even if muted? no — respect mute
  if (muted) return;
  const now = AC.currentTime;

  // 1. Sub-bass swell — 200Hz → 28Hz over 1.4s (the "drop")
  const sub = AC.createOscillator();
  sub.type = 'sine';
  sub.frequency.setValueAtTime(200, now);
  sub.frequency.exponentialRampToValueAtTime(28, now + 1.4);
  const subGain = AC.createGain();
  subGain.gain.setValueAtTime(0, now);
  subGain.gain.linearRampToValueAtTime(.32, now + .15);
  subGain.gain.linearRampToValueAtTime(.22, now + 1.0);
  subGain.gain.exponentialRampToValueAtTime(.0001, now + 2.4);
  sub.connect(subGain).connect(A_master);
  sub.start(now); sub.stop(now + 2.5);

  // 2. Second sub harmonic, slightly detuned, octave above — adds weight
  const sub2 = AC.createOscillator();
  sub2.type = 'sine';
  sub2.frequency.setValueAtTime(400, now);
  sub2.frequency.exponentialRampToValueAtTime(56, now + 1.4);
  sub2.detune.value = -8;
  const sub2Gain = AC.createGain();
  sub2Gain.gain.setValueAtTime(0, now);
  sub2Gain.gain.linearRampToValueAtTime(.10, now + .25);
  sub2Gain.gain.exponentialRampToValueAtTime(.0001, now + 2.0);
  sub2.connect(sub2Gain).connect(A_master);
  sub2.start(now); sub2.stop(now + 2.1);

  // 3. Filtered noise sweep — the rush of materialization
  const buf = AC.createBuffer(1, AC.sampleRate * 1.6, AC.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1);
  const noise = AC.createBufferSource(); noise.buffer = buf;
  const noiseFilt = AC.createBiquadFilter();
  noiseFilt.type = 'bandpass';
  noiseFilt.frequency.setValueAtTime(3500, now);
  noiseFilt.frequency.exponentialRampToValueAtTime(150, now + 1.2);
  noiseFilt.Q.value = 3;
  const noiseGain = AC.createGain();
  noiseGain.gain.setValueAtTime(0, now);
  noiseGain.gain.linearRampToValueAtTime(.06, now + .2);
  noiseGain.gain.exponentialRampToValueAtTime(.0001, now + 1.5);
  noise.connect(noiseFilt).connect(noiseGain).connect(A_master);
  noise.start(now); noise.stop(now + 1.6);

  // 4. Bend the entire BGM down a 4th and let it return — feels like reality flexes
  audioBend(-5, 1.6);
}

function burst(x, y, c, n=10, s=2) {
  for (let i=0; i<n && parts.length<240; i++) {
    const a=Math.random()*TAU, sp=rng(.3,s);
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rng(.5,3),life:rng(200,500),ml:500,c,t:'c'});
  }
}
function ring(x, y, c, rad, n=12) {
  for (let i=0; i<n && parts.length<240; i++) {
    const a=(i/n)*TAU;
    parts.push({x:x+Math.cos(a)*rad,y:y+Math.sin(a)*rad,vx:Math.cos(a),vy:Math.sin(a),r:1.5,life:300,ml:300,c,t:'c'});
  }
}
function fTxt(x, y, t, c) { if (txts.length<30) txts.push({x,y,t,c,life:900,ml:900}); }
function shk(i, d) {
  // Hard-cap shake intensity at 5px so the player never appears to leap out of
  // their own frame. Big events still feel impactful via flash/particles/audio.
  shi = Math.max(shi, Math.min(i, 5));
  shd = Math.max(shd, Math.min(d, 350));
}

// ═══════════════════════════════════════════
// BOIDS / FLOCKING
// ═══════════════════════════════════════════
function canEat(o) { return o.r < P.r * .8; }
function isPred(o) { return o.r > P.r * 1.2; }

// ═══════════════════════════════════════════
// SENSE / RADAR SYSTEM
// Unlocks at stage 1 (Drifter). Range and precision scale with evolution.
// Level 1: short range, basic prey/predator coloring
// Level 2: longer range, vulnerable-angle hints on marginal prey
// Level 3+: pierces same-color camouflage clusters
// Level 4+: predator trajectories
// Level 5:  effectively omniscient
// ═══════════════════════════════════════════
const SENSE_RANGE = [0, 200, 320, 440, 580, 800];

// Color families — used for camouflage masking. Smaller creatures of the same
// family as a larger creature can cluster near it; their radar signature dims.
const COLOR_FAMILY = {
  bloom:'green', mote:'green',
  polyp:'yellow', lurker:'yellow',
  tendril:'pink', phantom:'pink',
  hunter:'red', behemoth:'red',
  levia:'blue',
  echo:'white',
};

// Vulnerable angle per creature type (relative to the prey's heading).
// 0 = head-on, PI = directly behind, PI/2 = right flank, -PI/2 = left flank.
// `w` is the arc width (radians). w >= TAU means no preferred angle.
const VULN = {
  bloom:    { ang:0,    w:TAU  }, // omni-edible
  mote:     { ang:0,    w:TAU  },
  polyp:    { ang:0,    w:TAU  },
  tendril:  { ang:PI/2, w:1.4  }, // flanks (bell mouth faces forward)
  hunter:   { ang:PI,   w:1.6  }, // tail strike
  lurker:   { ang:0,    w:1.1  }, // frontal — the lure dangles forward, exposed
  phantom:  { ang:PI,   w:1.4  }, // behind the veil
  echo:     { ang:PI,   w:0.9  }, // narrow rear seam
  levia:    { ang:PI,   w:1.2  }, // tail flukes
  behemoth: { ang:PI,   w:0.7  }, // tiny apex weakspot
};

function canEatAngle(o) {
  // Marginal-size kill: only succeeds when player approaches from the prey's
  // vulnerable side. Requires sense level ≥ 1 (visible cue) but works without it.
  if (o.r < P.r * .8) return false;        // standard kill range handles this
  if (o.r >= P.r * 1.08) return false;     // too large entirely
  const v = VULN[o.type];
  if (!v || v.w >= TAU - 0.01) return false;
  const a = ang(o, P);                     // direction from prey to player
  const target = o.hd + v.ang;
  const df = Math.abs(Math.atan2(Math.sin(a - target), Math.cos(a - target)));
  return df < v.w / 2;
}

function senseRange() { return SENSE_RANGE[P.stg] || 0; }
function senseLevel() { return P.stg; }

function updateSense() {
  const range = senseRange(), lvl = senseLevel();
  for (const o of orgs) {
    o._maskAnchor = null;
    if (range === 0) { o._inRange=false; o._edib=0; o._pred=0; o._maskHide=0; continue; }
    const d = dst(P, o);
    o._inRange = d < range;
    if (!o._inRange) { o._edib=0; o._pred=0; o._maskHide=0; continue; }
    o._edib = canEat(o) ? 1 : (canEatAngle(o) ? 0.5 : 0);
    o._pred = isPred(o) ? 1 : 0;

    // Camouflage check — same color family, larger anchor nearby
    const fam = COLOR_FAMILY[o.type];
    o._maskHide = 0;
    if (fam && o.r < 22) {
      let best=null, bestD=110;
      for (const m of gNear(o.x, o.y, 110)) {
        if (m===o || m.r < o.r*1.5) continue;
        if (COLOR_FAMILY[m.type] !== fam) continue;
        const md = dst(o, m);
        if (md < bestD) { best=m; bestD=md; }
      }
      if (best) {
        o._maskAnchor = best;
        // Higher sense level pierces the mask. Lower stages see it dimmed.
        const fade = 1 - bestD/110;
        o._maskHide = lvl >= 3 ? 0 : fade * 0.78;
      }
    }
  }
}

function boids(o) {
  const T = ORGS[o.type]; if (!T.school) return {fx:0,fy:0};
  const schR = T.schR||100;
  let sepX=0,sepY=0,sepN=0,aliX=0,aliY=0,cohX=0,cohY=0,n=0;
  const nb = gNear(o.x, o.y, schR);
  for (const q of nb) {
    if (q===o || q.type!==o.type) continue;
    const ddx=q.x-o.x, ddy=q.y-o.y, dd=Math.hypot(ddx,ddy);
    if (dd>schR || dd<.1) continue;
    if (dd<schR*.35) { const w=1-dd/(schR*.35); sepX-=(ddx/dd)*w; sepY-=(ddy/dd)*w; sepN++; }
    aliX+=Math.cos(q.hd); aliY+=Math.sin(q.hd); cohX+=q.x; cohY+=q.y; n++;
  }
  let fx=0, fy=0;
  if (sepN>0) { fx+=sepX/sepN*1.8; fy+=sepY/sepN*1.8; }
  if (n>0) {
    fx+=(aliX/n-Math.cos(o.hd))*.6; fy+=(aliY/n-Math.sin(o.hd))*.6;
    const c2x=cohX/n-o.x, c2y=cohY/n-o.y, c2d=Math.hypot(c2x,c2y);
    if (c2d>1) { fx+=(c2x/c2d)*.4; fy+=(c2y/c2d)*.4; }
  }
  if (canEat(o)) {
    const pd=dst(P,o), flR=100+P.r*2.5;
    if (pd<flR) {
      o.scatterT=800;
      for (const q of gNear(o.x,o.y,schR)) if(q.type===o.type) q.scatterT=Math.max(q.scatterT,600);
    }
  }
  if (o.scatterT>0) {
    fx*=.2; fy*=.2;
    const fa=ang(P,o), u=o.scatterT/800;
    fx+=Math.cos(fa)*3*u; fy+=Math.sin(fa)*3*u;
  }
  return {fx, fy};
}

// ═══════════════════════════════════════════
// ORGANISM AI
// ═══════════════════════════════════════════
function findOrgPrey(o) {
  const pp=PREY_OF[o.type]; if (!pp) return null;
  const huntR=ECO_HUNT_R[o.type]||120;
  const nb=gNear(o.x,o.y,huntR); let best=null, bestD=huntR;
  for (const q of nb) {
    if (q===o || !pp.includes(q.type) || q.r>=o.r*.9) continue;
    const dd=dst(o,q); if(dd<bestD){bestD=dd;best=q;}
  }
  return best;
}

function aiOrg(o, dt) {
  const T=ORGS[o.type], dist=dst(P,o);
  const smaller=canEat(o), bigger=isPred(o);
  const spd=T.spd*(o.stunT>0?.15:1);
  o.stT-=dt; o.stunT=Math.max(0,o.stunT-dt); o.flT=Math.max(0,o.flT-dt);
  o.ph+=dt*.003; o.finPh+=dt*.006; o.breathPh+=dt*.004; o.scatterT=Math.max(0,o.scatterT-dt);
  const te=ang(o,P), ed=Math.atan2(Math.sin(te-o.eyeAng),Math.cos(te-o.eyeAng));
  o.eyeAng+=ed*Math.min(1,dt*.005);
  if (Math.random()<.04 && o.trail.length<6) o.trail.push({x:o.x,y:o.y,l:250});
  for (let i=o.trail.length-1; i>=0; i--) { o.trail[i].l-=dt; if(o.trail[i].l<=0)o.trail.splice(i,1); }
  if (T.school) {
    const nb=gNear(o.x,o.y,T.schR||100);
    for (const q of nb) { if(q===o||q.type!==o.type)continue; o.breathPh+=Math.sin(q.breathPh-o.breathPh)*.02; break; }
  }

  let tx=o.x, ty=o.y;
  const fleeR=smaller ? 100+P.r*2.5 : 0;
  const huntR=bigger  ? 180+o.r*3   : 0;

  switch (T.beh) {
    case 'bloom':
      o.wAng+=(Math.random()-.5)*.008*dt;
      tx=o.x+Math.cos(o.wAng)*spd; ty=o.y+Math.sin(o.wAng)*spd; break;

    case 'drift':
      o.wAng+=(Math.random()-.5)*.03*dt;
      tx=o.x+Math.cos(o.wAng)*spd; ty=o.y+Math.sin(o.wAng)*spd;
      if (smaller&&dist<fleeR) { const fa=ang(P,o),u=1-dist/fleeR; tx=o.x+Math.cos(fa)*spd*(2+u*4); ty=o.y+Math.sin(fa)*spd*(2+u*4); } break;

    case 'swarm':
      o.wAng+=(Math.random()-.5)*.04*dt;
      tx=o.x+Math.cos(o.wAng)*spd*.5; ty=o.y+Math.sin(o.wAng)*spd*.5;
      if (smaller&&dist<fleeR) { const fa=ang(P,o),u=1-dist/fleeR; tx=o.x+Math.cos(fa)*spd*(3+u*4); ty=o.y+Math.sin(fa)*spd*(3+u*4); } break;

    case 'pulse': {
      const ps=Math.sin(o.breathPh*2)*spd*2;
      tx=o.x+Math.cos(o.hd)*ps; ty=o.y+Math.sin(o.hd)*ps;
      if (o.stT<=0) { o.hd+=(Math.random()-.5)*1.5; o.stT=rng(1000,2500); }
      if (smaller&&dist<fleeR) { const fa=ang(P,o); tx=o.x+Math.cos(fa)*spd*3; ty=o.y+Math.sin(fa)*spd*3; } break; }

    case 'chase':
      if (bigger&&dist<huntR) { const ha=ang(o,P); tx=o.x+Math.cos(ha)*spd*(dist<100?1.8:1.2); ty=o.y+Math.sin(ha)*spd*(dist<100?1.8:1.2); }
      else if (smaller&&dist<fleeR) { const fa=ang(P,o),zz=Math.sin(gt*.005)*.6; tx=o.x+Math.cos(fa+zz)*spd*2.8; ty=o.y+Math.sin(fa+zz)*spd*2.8; }
      else { o.wAng+=(Math.random()-.5)*.03*dt; tx=o.x+Math.cos(o.wAng)*spd*.5; ty=o.y+Math.sin(o.wAng)*spd*.5; } break;

    case 'ambush':
      if (smaller&&dist<fleeR) { const fa=ang(P,o); tx=o.x+Math.cos(fa)*spd*3; ty=o.y+Math.sin(fa)*spd*3; o.ambR=false; o.stT=2000; }
      else if (o.ambR) {
        o.lAng+=dt*.003;
        if ((bigger||(!smaller&&!bigger))&&dist<65) { o.ambR=false; o.stT=2200; const ha=ang(o,P); o.vx=Math.cos(ha)*6; o.vy=Math.sin(ha)*6; burst(o.x,o.y,T.col,6,2); shk(2,50); }
      } else {
        o.wAng+=(Math.random()-.5)*.02*dt; tx=o.x+Math.cos(o.wAng)*spd; ty=o.y+Math.sin(o.wAng)*spd;
        if (o.stT<=0) o.ambR=true;
      } break;

    case 'passive':
      o.wAng+=(Math.random()-.5)*.006*dt; tx=o.x+Math.cos(o.wAng)*spd; ty=o.y+Math.sin(o.wAng)*spd;
      if (smaller&&dist<fleeR*.7) { const fa=ang(P,o); tx=o.x+Math.cos(fa)*spd*2; ty=o.y+Math.sin(fa)*spd*2; }
      if (o.flT>0&&bigger&&dist<250) { const ha=ang(o,P); tx=o.x+Math.cos(ha)*spd*2.5; ty=o.y+Math.sin(ha)*spd*2.5; } break;

    case 'lure':
      if (smaller&&dist<fleeR) { const fa=ang(P,o); tx=o.x+Math.cos(fa)*spd*2.5; ty=o.y+Math.sin(fa)*spd*2.5; }
      else if (bigger) {
        if (dist>250) {
          if (Math.random()<.007&&parts.length<180) parts.push({x:lp(o.x,P.x,.6)+rng(-20,20),y:lp(o.y,P.y,.6)+rng(-20,20),vx:0,vy:0,r:3,life:1500,ml:1500,c:'#6AE856',t:'lure'});
          const ha=ang(o,P); tx=o.x+Math.cos(ha)*spd*.4; ty=o.y+Math.sin(ha)*spd*.4;
        } else { const ha=ang(o,P); tx=o.x+Math.cos(ha)*spd*2; ty=o.y+Math.sin(ha)*spd*2; }
      } else { o.wAng+=(Math.random()-.5)*.03*dt; tx=o.x+Math.cos(o.wAng)*spd; ty=o.y+Math.sin(o.wAng)*spd; } break;

    case 'apex':
      if (smaller&&dist<fleeR) { const fa=ang(P,o); tx=o.x+Math.cos(fa)*spd*3; ty=o.y+Math.sin(fa)*spd*3; }
      else if (bigger&&dist<huntR) {
        const px=P.x+P.vx*30, py=P.y+P.vy*30, ha=Math.atan2(py-o.y,px-o.x);
        tx=o.x+Math.cos(ha)*spd*1.6; ty=o.y+Math.sin(ha)*spd*1.6;
        if (dist<150&&o.stT<=0) { o.vx=Math.cos(ha)*5; o.vy=Math.sin(ha)*5; o.stT=1800; burst(o.x,o.y,T.col,8,3); shk(3,80); }
      } else { const oa=ang(o,P)+PI/3; tx=o.x+Math.cos(oa)*spd; ty=o.y+Math.sin(oa)*spd; } break;

    case 'mirror':
      if (smaller&&dist<fleeR) { const fa=ang(P,o); tx=o.x+Math.cos(fa)*spd*2.5; ty=o.y+Math.sin(fa)*spd*2.5; }
      else if (behMem.length>=10) {
        const s=behMem[rni(0,behMem.length)], ch=Math.sin(gt*.002)*.7;
        tx=o.x+s.vx*-1+Math.sin(gt*.003+o.x)*ch; ty=o.y+s.vy*-1+Math.cos(gt*.003+o.y)*ch;
        if (Math.random()<.012) { const ha=ang(o,P); o.vx+=Math.cos(ha)*4; o.vy+=Math.sin(ha)*4; }
      } break;
  }

  // Ecosystem hunting
  if (dist>fleeR*1.5 && dist>huntR*1.2 && PREY_OF[o.type]) {
    const prey=findOrgPrey(o);
    if (prey) { const ha=ang(o,prey); tx=lp(tx,o.x+Math.cos(ha)*spd*1.5,.4); ty=lp(ty,o.y+Math.sin(ha)*spd*1.5,.4); }
  }
  // Flee organism predators
  if (T.school||T.beh==='drift'||T.beh==='bloom') {
    for (const pred of gNear(o.x,o.y,120)) {
      if (pred===o) continue;
      const pp=PREY_OF[pred.type]; if(!pp||!pp.includes(o.type)||pred.r<o.r*.9) continue;
      const pd=dst(o,pred), oFlR=60+pred.r*2;
      if (pd<oFlR) { const fa=ang(pred,o),u=1-pd/oFlR; tx+=Math.cos(fa)*spd*(1+u*2); ty+=Math.sin(fa)*spd*(1+u*2); break; }
    }
  }

  const fl=boids(o);
  o.vx=o.vx*.9+((tx-o.x)*.04+fl.fx*.3);
  o.vy=o.vy*.9+((ty-o.y)*.04+fl.fy*.3);

  // ── Camouflage seek: when player is sensed, drift toward same-color larger anchor ──
  if (o._maskAnchor) {
    const pD = dst(P, o);
    if (pD < 320) {
      const ma = ang(o, o._maskAnchor);
      const md = dst(o, o._maskAnchor);
      const ideal = o._maskAnchor.r + o.r + 8;
      const offset = md - ideal;
      const pull = .055 * (1 - cl(pD/320, 0, 1));
      o.vx += Math.cos(ma) * pull * Math.sign(offset||1);
      o.vy += Math.sin(ma) * pull * Math.sign(offset||1);
    }
  }

  o.x+=o.vx*(dt/16); o.y+=o.vy*(dt/16);
  o.hd=Math.atan2(o.vy,o.vx);
  if (dst(P,o)>2200) { const a=Math.random()*TAU,dd=rng(500,T.spW); o.x=P.x+Math.cos(a)*dd; o.y=P.y+Math.sin(a)*dd; o.hp=o.mhp; o.ambR=T.beh==='ambush'; }
}

// PLAYER UPDATE
// ═══════════════════════════════════════════
function calcR(mass, bR)   { return bR + Math.log2(Math.max(1,mass)) * 2.8; }
function calcGain(bm, pm)  { return bm * (1 / (1 + pm * .003)); }
function calcDecay(m, dt) {
  if (m<80)   return .0005 * dt;
  if (m<400)  return (.0008 + (m-80) * .000006) * dt;
  if (m<1500) return (.002  + (m-400) * .00008)  * dt;
  return (.0108 + (m-1500) * .0002) * dt;
}

function updateP(dt) {
  const s=stg(); let dx=0, dy=0;
  if (ptr.on) { dx=ptr.x-P.x; dy=ptr.y-P.y; }
  const dL=Math.hypot(dx,dy); if(dL>.5) P.hd=Math.atan2(dy,dx);
  if (ptr.tap && s.ab && s.cd>0) useAbil();
  ptr.tap=false;

  let spd=s.spd*(1+Math.log2(Math.max(1,P.mass))*.08);
  if (P.dash) { spd*=2.5; P.dashT-=dt; if(P.dashT<=0)P.dash=false; }
  if (P.boost>0) { spd*=1.2; P.boost=Math.max(0,P.boost-dt); }
  if (frenzy) spd *= 1.4;
  if (dL>2) { P.vx=lp(P.vx,dx/dL*spd,.1); P.vy=lp(P.vy,dy/dL*spd,.1); } else { P.vx*=.9; P.vy*=.9; }

  // Hard velocity cap — prevents any combo of multipliers from launching the
  // player so fast they outrun the camera lerp on a single frame.
  const MAX_V = 24;
  if (P.vx > MAX_V) P.vx = MAX_V; else if (P.vx < -MAX_V) P.vx = -MAX_V;
  if (P.vy > MAX_V) P.vy = MAX_V; else if (P.vy < -MAX_V) P.vy = -MAX_V;

  P.x+=P.vx*(dt/16); P.y+=P.vy*(dt/16);

  // NaN guard — if anything ever goes wrong with the math, recover gracefully.
  if (!isFinite(P.x) || !isFinite(P.y)) { P.x = 0; P.y = 0; P.vx = 0; P.vy = 0; }

  P.r=calcR(P.mass, s.bR);

  const floor=STAGES[P.stg].thr*.85+3;
  P.mass=Math.max(floor, P.mass-calcDecay(P.mass,dt));
  P.tail.unshift({x:P.x, y:P.y});
  while (P.tail.length > Math.floor(16+Math.log2(Math.max(1,P.mass))*8)) P.tail.pop();

  P.blink=Math.max(0,P.blink-dt); abil_cd=Math.max(0,abil_cd-dt);
  if (P.flash.t>0) P.flash.t-=dt;
  streakT=Math.max(0,streakT-dt); if(streakT<=0)streak=0;

  // Passive abilities
  if (s.ab==='sting') {
    for (const o of gNear(P.x,P.y,P.r*3)) {
      if (o.r<P.r*.8 && dst(P,o)<P.r*3) { o.stunT=Math.max(o.stunT,400); if(Math.random()<.02){o.hp--;o.flT=120;} }
    }
  }
  if (s.ab==='gravity') {
    for (const o of gNear(P.x,P.y,P.r*6)) {
      const dd=dst(P,o); if(dd<P.r*6&&o.r<P.r*.8){ const ps=.5*(1-dd/(P.r*6)),a=ang(o,P); o.vx+=Math.cos(a)*ps; o.vy+=Math.sin(a)*ps; }
    }
  }
  behMem.push({vx:P.vx,vy:P.vy,hd:P.hd}); if(behMem.length>120)behMem.shift();
}

function useAbil() {
  if (abil_cd>0) return;
  const s=stg(); if(!s.ab||s.cd===0) return;
  switch (s.ab) {
    case 'dash': P.dash=true; P.dashT=180; abil_cd=s.cd; burst(P.x,P.y,s.c.pri,6,2.5); shk(1.5,50); break;
    case 'whip': {
      abil_cd=s.cd; const wR=P.r*4.5, bA=P.hd+PI;
      for (const o of gNear(P.x,P.y,wR)) {
        const d=dst(P,o); if(d<wR){ const a=ang(P,o),df=Math.abs(Math.atan2(Math.sin(a-bA),Math.cos(a-bA))); if(df<PI*.55){o.hp-=3;o.flT=200;o.stunT=600;o.vx+=Math.cos(a)*8;o.vy+=Math.sin(a)*8;burst(o.x,o.y,COL.naga.pri,4,1.5);} }
      }
      for (let i=0;i<16;i++){const a=bA-PI*.55+(i/16)*PI*1.1,d=wR*rng(.4,1);parts.push({x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,vx:Math.cos(a)*2,vy:Math.sin(a)*2,r:2,life:250,ml:250,c:COL.naga.pri,t:'c'});}
      shk(4,150); sfxHurt(); break; }
    case 'bolt': {
      abil_cd=s.cd;
      const a=ang(P, ptr.on?ptr:{x:P.x+Math.cos(P.hd)*100,y:P.y+Math.sin(P.hd)*100});
      projs.push({x:P.x+Math.cos(a)*P.r,y:P.y+Math.sin(a)*P.r,vx:Math.cos(a)*8,vy:Math.sin(a)*8,r:4,life:1200,dmg:8,c:COL.primo.pri});
      burst(P.x+Math.cos(a)*P.r,P.y+Math.sin(a)*P.r,COL.primo.pri,4,1.2); shk(1.5,40); break; }
  }
}

function checkEvo() {
  if (P.stg < STAGES.length-1 && P.mass >= STAGES[P.stg+1].thr) {
    P.stg++;
    const s=stg();
    const fl=document.getElementById('flash');
    fl.style.background=`radial-gradient(circle,${s.c.pri}40 0%,transparent 68%)`;
    fl.style.opacity='1'; setTimeout(()=>fl.style.opacity='0',500);
    document.getElementById('evoT').textContent=s.name; document.getElementById('evoT').style.color=s.c.pri;
    document.getElementById('evoS').textContent=s.desc;
    const ea=document.getElementById('evoAnn'); ea.style.opacity='1'; setTimeout(()=>ea.style.opacity='0',2400);
    burst(P.x,P.y,s.c.pri,45,5); ring(P.x,P.y,'#fff',P.r*2,18); shk(8,400); sfxEvo();
    setStageAudio(P.stg);
    if(P.stg>=2) spawn('hunter',3);
    if(P.stg>=3){spawn('phantom',2);if(Math.random()<.5)spawn('echo',1);}
    if(P.stg>=4){spawn('levia',2);spawn('behemoth',1);spawn('echo',1);}
    if(P.stg>=5) spawn('behemoth',2);
  }
}

// COLLISIONS

// COLLISIONS
// ═══════════════════════════════════════════
function collide(dt) {
  const nearP=gNear(P.x,P.y,Math.max(P.r*2,80));
  // Frenzy expands eat range AND relaxes the threshold so you can punch up
  const eatReachMul = frenzy ? 1.3 : 1.05;
  for (let i=nearP.length-1; i>=0; i--) {
    const o=nearP[i]; if(!orgs.includes(o))continue;
    const d=dst(P,o);

    // Frenzy: temporarily relaxed eat threshold (.95 vs .8 normal)
    const frenzyEdible = frenzy && (o.r < P.r * .95);
    if ((canEat(o) || canEatAngle(o) || frenzyEdible)&&d<P.r*eatReachMul) {
      const T=ORGS[o.type], angleKill = !canEat(o) && !frenzyEdible && canEatAngle(o);
      let gain=calcGain(T.mass,P.mass);
      if (angleKill) gain *= 1.6;                              // precision bonus
      if (frenzy) gain *= (1.5 + Math.min(streak, 10) * .15);  // frenzy combo multiplier — up to 3×
      P.mass+=gain; score+=Math.floor(gain*8); streak++; streakT = frenzy ? 1500 : 2500;
      burst(o.x,o.y,T.col,angleKill?14:8,angleKill?2.6:1.8);
      if (angleKill) { ring(o.x,o.y,'#ffd860',o.r*1.4,14); fTxt(o.x,o.y-24,'PRECISION','#ffd860'); }
      fTxt(o.x,o.y-10,'+'+Math.floor(gain),T.col);
      if (streak>2) fTxt(o.x,o.y-(angleKill?38:24),streak+'×','rgba(255,255,255,.4)');
      shk(.6+o.r*.06+(angleKill?1.5:0),50+(angleKill?80:0));
      if (angleKill) sfxPrecision(); else sfxEat();
      audioFilterPulse(STAGE_CUTOFF[P.stg]*1.6, .15);

      // Frenzy chain pulse — stun and damage nearby creatures, extend frenzy duration
      if (frenzy) {
        fTime = Math.min(12000, fTime + 200);  // each kill extends frenzy by 200ms
        ring(o.x, o.y, '#40c8f0', 60, 14);
        for (const n of gNear(o.x, o.y, 80)) {
          if (n === o || !orgs.includes(n)) continue;
          n.stunT = Math.max(n.stunT||0, 350);
          if (canEat(n)) n.hp = 0; // gentle kill on small fry
        }
      }

      const idx=orgs.indexOf(o); if(idx>=0)orgs.splice(idx,1);
      const cnt=orgs.filter(q=>q.type===o.type).length;
      if (cnt<ORGS[o.type].mx) setTimeout(()=>spawn(o.type,1),rng(1500,4000));
      checkEvo(); continue;
    }
    if (isPred(o)&&d<o.r&&P.blink<=0&&!shOn) {
      // Frenzy = glass cannon: take 1.5× damage during the window
      const dmgMul = frenzy ? 1.5 : 1;
      P.mass=Math.max(5,P.mass-ORGS[o.type].mass*.08*dmgMul*(dt/16)); P.blink=250;
      shk(2.5,80); burst(P.x,P.y,'#ff2244',4,1.2); sfxHurt();
      if (P.stg>0&&P.mass<STAGES[P.stg].thr*.55) { P.stg=Math.max(0,P.stg-1); fTxt(P.x,P.y-28,'DE-EVOLVED','#ff4444'); shk(6,300); setStageAudio(P.stg); audioBend(-4,1.2); }
    }
    if (o.hp<=0) {
      const T=ORGS[o.type], gain=calcGain(T.mass*.4,P.mass);
      P.mass+=gain; score+=Math.floor(gain*5); burst(o.x,o.y,T.col,12,2.5); fTxt(o.x,o.y-10,'+'+Math.floor(gain),T.col);
      const idx=orgs.indexOf(o); if(idx>=0)orgs.splice(idx,1); checkEvo();
    }
  }

  // Projectiles
  for (let i=projs.length-1; i>=0; i--) {
    const p=projs[i]; p.x+=p.vx; p.y+=p.vy; p.life-=16;
    if (parts.length<240) parts.push({x:p.x,y:p.y,vx:rng(-.15,.15),vy:rng(-.15,.15),r:rng(.5,2),life:140,ml:140,c:p.c,t:'c'});
    if (p.life<=0){projs.splice(i,1);continue;}
    for (const o of gNear(p.x,p.y,30)) { if(dst(p,o)<o.r+p.r){o.hp-=p.dmg;o.flT=180;o.stunT=300;o.vx+=p.vx*.3;o.vy+=p.vy*.3;burst(p.x,p.y,p.c,6,1.5);projs.splice(i,1);break;} }
  }

  // ═══════════════════════════════════════════
  // FRENZY — A true feeding frenzy. Edible food in a wide radius gets pulled
  // into orbit around the player, creating a visible swirling feast. The food
  // gets eaten naturally when it touches you. The closer/longer they orbit,
  // the more food converges. Skillful movement (staying still as food gathers,
  // then sweeping through it) maximizes the feast.
  //
  // During frenzy:
  //   • Edible food (canEat smaller creatures) gets pulled into orbit (radius up to 320px)
  //   • Pull strength increases as food gets closer — they spiral inward
  //   • Eat reach +30%, eat threshold relaxed (up to 0.95× player size)
  //   • Each kill extends frenzy by 200ms (rewards sustained feasting)
  //   • Mass-gain multiplier scales with kill streak (1.5× → 3× cap)
  //   • Movement +40% (already in updateP)
  //   • Predators do 1.5× damage to you (glass cannon trade-off)
  //
  // Duration: 8 seconds base, extends with kills.
  // ═══════════════════════════════════════════
  if (pill.on&&dst(P,pill)<P.r+pill.r) {
    P.flash={c:'#40c8f0',t:280}; frenzy=true; fTime=8000; pill.on=false; sfxFrenzy();
    audioSetFrenzy(true); audioFilterPulse(STAGE_CUTOFF[P.stg]*1.8, .8);
    burst(pill.x,pill.y,'#40c8f0',24,3.5); ring(P.x,P.y,'#40c8f0',P.r*3.5,16); shk(2.5,160);
    fTxt(P.x, P.y-40, 'FEEDING FRENZY', '#40c8f0');

    // First-time tutorial
    if (!frenzyTutorialShown) {
      frenzyTutorialShown = true;
      document.getElementById('evoT').textContent = 'FEEDING FRENZY';
      document.getElementById('evoT').style.color = '#40c8f0';
      document.getElementById('evoS').textContent = 'Food spirals toward you. Eat fast. Each kill extends the frenzy.';
      const ea = document.getElementById('evoAnn');
      ea.style.opacity = '1';
      setTimeout(() => { ea.style.opacity = '0'; }, 3200);
    }
  }
  if (frenzy) {
    fTime -= dt;
    if (fTime <= 0) {
      frenzy = false; audioSetFrenzy(false);
      fTxt(P.x, P.y-30, 'frenzy fades', 'rgba(64,200,240,.5)');
      // Release any organisms still caught in the vortex
      for (const o of orgs) o._vortex = 0;
    } else {
      // ── Apply vortex pull to edible food within range ──
      // The food itself becomes the visual — they swirl into the player.
      const VORTEX_RANGE = 320;
      for (const o of gNear(P.x, P.y, VORTEX_RANGE)) {
        if (!canEat(o)) continue;        // only pull what we can actually eat
        const d = dst(P, o);
        if (d < 3) continue;
        if (d > VORTEX_RANGE) continue;

        const t = 1 - d/VORTEX_RANGE;     // strength rises as food nears player
        const a = ang(o, P);              // angle from food toward player
        const radial = .25 + t * .85;     // radial pull (gets stronger inward)
        const swirl  = .55 * t;           // tangential swirl creates orbit

        o.vx += Math.cos(a) * radial;
        o.vy += Math.sin(a) * radial;
        o.vx += Math.cos(a + PI/2) * swirl;
        o.vy += Math.sin(a + PI/2) * swirl;

        // Velocity cap so they spiral inward smoothly, not slingshot
        const v = Math.hypot(o.vx, o.vy);
        const VMAX = 7;
        if (v > VMAX) { o.vx = o.vx/v*VMAX; o.vy = o.vy/v*VMAX; }

        // Tag for visual streak trail and accelerated decay
        o._vortex = t;                    // 0..1 intensity for renderer
      }
    }
  }
  if (!pill.on&&!frenzy) { pill.cd+=dt; if(pill.cd>22000+rng(0,8000)){pill={x:P.x+rng(-600,600),y:P.y+rng(-600,600),r:9,on:true,cd:0};} }

  // Shield
  if (shld.on&&dst(P,shld)<P.r+shld.r) { P.flash={c:'#e8c040',t:400}; shOn=true; shTime=5000; shld.on=false; sfxEat(); burst(shld.x,shld.y,'#e8c040',12,2); shk(2,100); }
  if (shOn) { shTime-=dt; if(shTime<=0)shOn=false; }
  if (!shld.on&&!shOn) { shld.cd+=dt; if(shld.cd>25000+rng(0,10000)){shld={x:P.x+rng(-600,600),y:P.y+rng(-600,600),r:9,on:true,cd:0};} }

  // Beacons
  for (let i=beacons.length-1; i>=0; i--) { if(dst(P,beacons[i])<P.r+beacons[i].r){beacons.length=0;burst(P.x,P.y,'#fff',12,2);shk(2,60);break;} }

  // ═════════════════════════════════════════════════════════════
  // ANOMALIES — high-mass nutrient pods that orbit large predators.
  // High risk (must get close to a predator) for high reward.
  // Mass values scale with host's threat; reward is proportional.
  // ═════════════════════════════════════════════════════════════
  updateAnomalies(dt);
}

const ANOM_HOSTS = {
  hunter:   { mass: 28, col: '#ff5878' },
  lurker:   { mass: 38, col: '#ffaa40' },
  phantom:  { mass: 34, col: '#e060ff' },
  levia:    { mass: 52, col: '#60c8ff' },
  behemoth: { mass: 78, col: '#ff3030' },
};

function spawnAnomaly() {
  // Pick a random eligible predator within reasonable range that isn't already a host
  const candidates = orgs.filter(o => ANOM_HOSTS[o.type] && !anoms.some(a => a.host === o));
  if (!candidates.length) return false;
  const host = candidates[rni(0, candidates.length)];
  const cfg = ANOM_HOSTS[host.type];
  anoms.push({
    host,
    orbAng: Math.random()*TAU,
    orbR: host.r + 30 + rng(0,12),
    orbSpd: rng(.0008, .0016) * (Math.random()<.5 ? 1 : -1),
    x: host.x, y: host.y,
    r: 7, mass: cfg.mass, col: cfg.col,
    life: rng(18000, 26000),
    ph: rng(0, TAU),
    freeT: 0,
  });
  return true;
}

function updateAnomalies(dt) {
  anomCd -= dt;
  // Spawn cadence scales with stage — more anomalies as you grow into needing them
  const wantedCount = P.stg < 2 ? 1 : P.stg < 4 ? 2 : 3;
  if (anomCd <= 0 && anoms.length < wantedCount) {
    if (spawnAnomaly()) anomCd = 9000 + rng(0, 7000);
    else anomCd = 2500;
  }

  for (let i = anoms.length - 1; i >= 0; i--) {
    const a = anoms[i];
    a.life -= dt; a.ph += dt * .004;

    if (a.host && orgs.includes(a.host)) {
      // Orbit the host
      a.orbAng += a.orbSpd * dt;
      a.x = a.host.x + Math.cos(a.orbAng) * a.orbR;
      a.y = a.host.y + Math.sin(a.orbAng) * a.orbR;
    } else {
      // Host died — anomaly drifts free briefly, then dissipates
      a.host = null;
      a.freeT += dt;
      a.x += Math.cos(a.orbAng) * .15 * dt * .016;
      a.y += Math.sin(a.orbAng) * .15 * dt * .016;
      if (a.freeT > 4000) { anoms.splice(i, 1); continue; }
    }

    // Cull if expired or far from player
    if (a.life <= 0 || dst(P, a) > 2400) {
      anoms.splice(i, 1); continue;
    }

    // Player collision — big reward
    if (dst(P, a) < P.r + a.r) {
      P.mass += a.mass; score += Math.floor(a.mass * 18); streak += 2; streakT = 3000;
      burst(a.x, a.y, a.col, 26, 3.5);
      ring(a.x, a.y, a.col, 38, 22);
      ring(a.x, a.y, '#fff', 22, 14);
      fTxt(a.x, a.y - 16, '+' + Math.floor(a.mass), a.col);
      fTxt(a.x, a.y - 32, 'ANOMALY', '#fff');
      shk(4, 220);
      sfxAnomalyGrab();
      anoms.splice(i, 1);
      checkEvo();
    }
  }
}

function ecoCollide() {
  let kills=0;
  for (let i=orgs.length-1; i>=0&&kills<5; i--) {
    const a=orgs[i]; if(!a)continue; const pp=PREY_OF[a.type]; if(!pp)continue;
    for (const b of gNear(a.x,a.y,a.r*2)) {
      if (b===a||!pp.includes(b.type)||b.r>=a.r*.8) continue;
      if (dst(a,b)<a.r+b.r*.3) {
        a.r=Math.min(a.r*1.02,ORGS[a.type].maxR*1.1);
        burst(b.x,b.y,ORGS[b.type].col,5,1.2);
        const idx=orgs.indexOf(b); if(idx>=0)orgs.splice(idx,1); if(idx<i)i--;
        const cnt=orgs.filter(q=>q.type===b.type).length;
        if (cnt<ORGS[b.type].mx) setTimeout(()=>spawn(b.type,1),rng(2000,5000));
        kills++; break;
      }
    }
  }
}

// ═══════════════════════════════════════════
// RENDERING HELPERS
// ═══════════════════════════════════════════
function onScr(x, y, r) {
  const hw=W/(2*zm), hh=H/(2*zm);
  return x+r>P.x-hw && x-r<P.x+hw && y+r>P.y-hh && y-r<P.y+hh;
}

function bioGlow(x, y, r, gl, a) {
  if (!onScr(x,y,r*1.5)) return;
  cx.globalAlpha=a;
  const g=cx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0, gl+'.1)'); g.addColorStop(.55, gl+'.03)'); g.addColorStop(1, gl+'0)');
  cx.fillStyle=g; cx.beginPath(); cx.arc(x,y,r,0,TAU); cx.fill(); cx.globalAlpha=1;
}
