<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Genesis Evolution</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<link href="https://fonts.googleapis.com/css2?family=Megrim&family=Tenor+Sans&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#020a12;font-family:'Tenor Sans',serif}
canvas#game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
#dragonHead{position:absolute;pointer-events:none;z-index:3}
#headCanvas{display:block}

/* HUD - minimal, elegant */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:16px 20px;display:flex;justify-content:space-between}
#hudL{display:flex;flex-direction:column;gap:4px}
#stageLabel{font-family:'Megrim',cursive;font-size:18px;letter-spacing:6px;text-transform:uppercase;transition:color .6s}
#massLabel{font-size:15px;color:rgba(255,255,255,.5);letter-spacing:2px}
#massLabel b{color:#fff;font-weight:400;font-size:18px}
#evoWrap{width:200px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:2px;overflow:hidden}
#evoFill{height:100%;width:0%;border-radius:2px;transition:width .4s ease}
#evoNext{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:2px;margin-top:2px}
#hudR{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
#scoreLabel{font-family:'Megrim',cursive;font-size:16px;color:rgba(255,255,255,.4);letter-spacing:3px}
#abilLabel{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;max-width:180px;text-align:right}
#cdRing{width:28px;height:28px;margin-top:4px;opacity:.5}

/* Evolution flash */
#evoFlash{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .2s}
#evoAnn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:21;pointer-events:none;text-align:center;opacity:0;transition:opacity .5s}
#evoAnn h1{font-family:'Megrim',cursive;font-size:36px;letter-spacing:10px;margin-bottom:4px}
#evoAnn p{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:3px}

/* Controls */
#pauseBtn{position:fixed;top:14px;right:18px;z-index:10;font-size:20px;color:rgba(255,255,255,.4);cursor:pointer;user-select:none;pointer-events:auto;background:none;border:none}
#pauseBtn:hover{color:#fff}
#pauseMenu{position:fixed;inset:0;z-index:30;background:rgba(2,10,18,.94);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;backdrop-filter:blur(12px)}
#pauseMenu h2{font-family:'Megrim',cursive;font-size:24px;letter-spacing:8px;color:rgba(255,255,255,.6);margin-bottom:12px}
#pauseMenu button{width:160px;padding:10px;font-family:'Tenor Sans',serif;font-size:14px;color:rgba(255,255,255,.6);background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:2px;cursor:pointer;letter-spacing:2px;transition:all .3s}
#pauseMenu button:hover{color:#fff;border-color:rgba(255,255,255,.3)}

#radarWrap{position:fixed;top:52px;right:18px;width:72px;height:72px;display:none;z-index:10;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2)}
#radar{width:72px;height:72px}
#minimap{position:fixed;bottom:14px;left:14px;z-index:10;width:80px;height:80px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2)}
#minimapC{width:80px;height:80px}
#joystick{position:fixed;bottom:20px;right:20px;width:100px;height:100px;display:none;z-index:10}
#joystickC{width:100px;height:100px}

/* Danger vignette */
#dangerVig{position:fixed;inset:0;z-index:9;pointer-events:none;opacity:0;transition:opacity .3s;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(180,0,0,.25) 100%)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="dragonHead"><canvas id="headCanvas"></canvas></div>

<div id="hud">
  <div id="hudL">
    <div id="stageLabel">MOTE</div>
    <div id="massLabel"><b id="massV">10</b> mass</div>
    <div id="evoWrap"><div id="evoFill"></div></div>
    <div id="evoNext"></div>
  </div>
  <div id="hudR">
    <div id="scoreLabel">0</div>
    <div id="abilLabel"></div>
    <canvas id="cdRing" width="28" height="28"></canvas>
  </div>
</div>

<div id="evoFlash"></div>
<div id="evoAnn"><h1 id="evoT"></h1><p id="evoS"></p></div>
<div id="dangerVig"></div>

<button id="pauseBtn">⏸</button>
<div id="pauseMenu">
  <h2>PAUSED</h2>
  <button id="resumeBtn">Resume</button>
  <button id="restartBtn">Restart</button>
  <button id="muteBtn">Mute</button>
  <button id="radarBtn">Radar</button>
</div>

<div id="radarWrap"><canvas id="radar" width="72" height="72"></canvas></div>
<div id="minimap"><canvas id="minimapC" width="80" height="80"></canvas></div>
<div id="joystick"><canvas id="joystickC" width="100" height="100"></canvas></div>

<audio id="bgm" src="background-music.mp3" loop preload="auto"></audio>
<audio id="sfxEat" src="eat.mp3" preload="auto"></audio>
<audio id="sfxHurt" src="hurt.mp3" preload="auto"></audio>
<audio id="sfxEvo" src="frenzy.mp3" preload="auto"></audio>

<script>window.TILE=48;window.SCALE=4;window.COLS=32;window.ROWS=5;</script>
<script type="module">
import*as THREE from'https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.module.js';
import{GLTFLoader}from'https://cdn.jsdelivr.net/npm/three@0.153.0/examples/jsm/loaders/GLTFLoader.js';
const T=window.TILE,S=window.SCALE,hc=document.getElementById('headCanvas');
const r=new THREE.WebGLRenderer({canvas:hc,alpha:true,antialias:true});r.setSize(T*S,T*S);
const sc=new THREE.Scene(),cam=new THREE.PerspectiveCamera(40,1,.1,100);cam.position.set(0,0,5);
sc.add(new THREE.DirectionalLight(0xffffff,1.2).position.set(1,2,3)&&sc.children[sc.children.length-1]||sc.children[0]);
const dl=new THREE.DirectionalLight(0xffffff,1.2);dl.position.set(1,2,3);sc.add(dl);
sc.add(new THREE.AmbientLight(0xffffff,.35));
let hm=null;
new GLTFLoader().load('dragon-head.glb',g=>{hm=g.scene;const b=new THREE.Box3().setFromObject(hm);const sz=b.getSize(new THREE.Vector3()).length();hm.scale.setScalar(2/Math.max(sz,.001));b.setFromObject(hm);hm.position.copy(b.getCenter(new THREE.Vector3()).negate());hm.rotation.order='YXZ';sc.add(hm);},undefined,()=>{});
window.renderHead=(yaw,pitch)=>{if(!hm)return;hm.rotation.y=yaw;hm.rotation.x=pitch;r.render(sc,cam);};
</script>

<script>
// ═══════════════════════════════════════════════════════
//  GENESIS EVOLUTION — COMPLETE REBUILD
// ═══════════════════════════════════════════════════════
const TILE=window.TILE,SCALE=window.SCALE,COLS=window.COLS,ROWS=window.ROWS;
const G=document.getElementById('game');
const cx=G.getContext('2d',{alpha:false});
let W,H;function resize(){W=G.width=innerWidth;H=G.height=innerHeight;}
addEventListener('resize',resize);resize();

const TAU=Math.PI*2,PI=Math.PI;
const rng=(a,b)=>a+Math.random()*(b-a);
const rni=(a,b)=>Math.floor(rng(a,b));
const d2=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
const a2=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x);
const lp=(a,b,t)=>a+(b-a)*t;
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const onS=(x,y,r,px,py,z)=>!(x+r<px-W/(2*z)||x-r>px+W/(2*z)||y+r<py-H/(2*z)||y-r>py+H/(2*z));

// ── COLOR PALETTE ──
// Each stage/creature gets a specific hue. Background is deep indigo.
const PAL={
  bg:'#020a12',bgLight:'#061420',
  mote:'#7cebc6',moteDim:'#3a9070',
  drifter:'#00c8f0',drifterDim:'#006880',
  medusa:'#b388ff',medusaDim:'#6633aa',
  naga:'#ff6040',nagaDim:'#993020',
  titan:'#4499ff',titanDim:'#1a4488',
  primordial:'#ffc040',primordialDim:'#aa7010',
  prey:'#88ee55',cell:'#eedd44',jelly:'#ff77bb',
  hunter:'#ff3838',lurker:'#ee8822',whale:'#5599ee',
  phantom:'#dd55ff',apex:'#ee2200',mirror:'#ffffff',mirrorGlow:'#00eeff'
};

// ═══ EVOLUTION STAGES ═══
// Balanced: early stages fast to hook player, later stages reward patience
const STAGES=[
  {name:'MOTE',thr:0,next:100,col:PAL.mote,dim:PAL.moteDim,spd:3.0,baseR:7,
   desc:'Consume to grow.',abil:null,abilTxt:'',cd:0},
  {name:'DRIFTER',thr:100,next:350,col:PAL.drifter,dim:PAL.drifterDim,spd:3.4,baseR:9,
   desc:'Tap to dash forward.',abil:'dash',abilTxt:'TAP — Dash',cd:700},
  {name:'MEDUSA',thr:350,next:900,col:PAL.medusa,dim:PAL.medusaDim,spd:2.6,baseR:13,
   desc:'Sting aura slows nearby prey.',abil:'sting',abilTxt:'PASSIVE — Sting aura',cd:0},
  {name:'NAGA',thr:900,next:2200,col:PAL.naga,dim:PAL.nagaDim,spd:3.6,baseR:11,
   desc:'Tap to lash tail.',abil:'whip',abilTxt:'TAP — Tail whip',cd:1000},
  {name:'TITAN',thr:2200,next:5000,col:PAL.titan,dim:PAL.titanDim,spd:2.3,baseR:18,
   desc:'Gravity well pulls prey in.',abil:'gravity',abilTxt:'PASSIVE — Gravity well',cd:0},
  {name:'PRIMORDIAL',thr:5000,next:Infinity,col:PAL.primordial,dim:PAL.primordialDim,spd:3.0,baseR:16,
   desc:'Tap to fire star bolts.',abil:'bolt',abilTxt:'TAP — Star bolt',cd:350}
];

// ═══ ORGANISMS ═══
// mass = what player gains. spawnW = spawn ring width from player
const ORGS={
  mote:    {col:PAL.prey,   dim:'#448822',minR:2.5,maxR:5,  spd:.25,hp:1, mass:4,  beh:'drift',  spW:600, mx:55},
  polyp:   {col:PAL.cell,   dim:'#887722',minR:4,  maxR:9,  spd:.5, hp:2, mass:10, beh:'swarm',  spW:800, mx:30},
  tendril: {col:PAL.jelly,  dim:'#883355',minR:7,  maxR:14, spd:.4, hp:4, mass:18, beh:'pulse',  spW:900, mx:14},
  hunter:  {col:PAL.hunter, dim:'#881111',minR:11, maxR:22, spd:1.6,hp:7, mass:32, beh:'chase',  spW:1100,mx:8},
  lurker:  {col:PAL.lurker, dim:'#774411',minR:13, maxR:26, spd:.3, hp:10,mass:48, beh:'ambush', spW:1300,mx:5},
  levia:   {col:PAL.whale,  dim:'#224488',minR:28, maxR:50, spd:.6, hp:28,mass:85, beh:'passive',spW:1500,mx:3},
  phantom: {col:PAL.phantom,dim:'#772299',minR:16, maxR:32, spd:1.0,hp:18,mass:58, beh:'lure',   spW:1400,mx:4},
  behemoth:{col:PAL.apex,   dim:'#771100',minR:38, maxR:65, spd:1.3,hp:45,mass:130,beh:'apex',   spW:1800,mx:2},
  echo:    {col:PAL.mirror, dim:'#448888',minR:10, maxR:20, spd:1.1,hp:18,mass:62, beh:'mirror', spW:1100,mx:2}
};

// ═══ STATE ═══
let P,orgs,projs,parts,txts,paused=false,gt=0,score=0;
let sx=0,sy=0,si=0,sd=0; // shake
let abil_cd=0,streak=0,streakT=0;
let off={x:0,y:0},zm=1,szm=1;
let muted=false,radarOn=false;
let jkAct=false,jkX=0,jkY=0;
let behMem=[];
let pill={x:0,y:0,r:9,on:false,cd:0};
let shld={x:0,y:0,r:9,on:false,cd:0};
let frenzy=false,fTime=0,shOn=false,shTime=0;
let beacons=[];

function init(){
  P={x:0,y:0,r:7,mass:10,vx:0,vy:0,hd:0,stg:0,tail:[],blink:0,dash:false,dashT:0,boost:0,flash:{c:'#fff',t:0}};
  orgs=[];projs=[];parts=[];txts=[];score=0;abil_cd=0;streak=0;streakT=0;gt=0;behMem=[];
  frenzy=false;fTime=0;shOn=false;shTime=0;
  pill={x:0,y:0,r:9,on:false,cd:0};shld={x:0,y:0,r:9,on:false,cd:0};
  beacons=[];
  [{x:0,y:-1500},{x:0,y:1500},{x:1500,y:0},{x:-1500,y:0}].forEach(p=>beacons.push({...p,r:16}));
  spawn('mote',45);spawn('polyp',22);spawn('tendril',8);spawn('hunter',4);spawn('lurker',2);spawn('levia',2);spawn('phantom',2);spawn('behemoth',1);
}

function spawn(type,n){
  const T=ORGS[type];
  for(let i=0;i<n;i++){
    if(type==='echo'&&orgs.filter(o=>o.type==='echo').length>=2)return;
    const r=rng(T.minR,T.maxR),a=Math.random()*TAU,d=rng(150,T.spW);
    orgs.push({type,x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,r,br:r,hp:T.hp,mhp:T.hp,
      vx:0,vy:0,hd:Math.random()*TAU,st:'idle',stT:0,stunT:0,
      wAng:Math.random()*TAU,ph:Math.random()*TAU,
      ambR:type==='lurker',lAng:Math.random()*TAU,
      trail:[],flT:0,born:gt});
  }
}

function stg(){return STAGES[P.stg];}
function prey(o){return o.r<P.r*.82;}
function pred(o){return o.r>P.r*1.18;}

// ── INPUT ──
let ptr={x:0,y:0,on:false,tap:false};
const tw=e=>({x:(e.clientX-off.x)/zm,y:(e.clientY-off.y)/zm});
G.addEventListener('pointerdown',e=>{if(paused)return;ptr.on=true;ptr.tap=true;const w=tw(e);ptr.x=w.x;ptr.y=w.y;});
G.addEventListener('pointermove',e=>{if(!ptr.on||paused)return;const w=tw(e);ptr.x=w.x;ptr.y=w.y;});
G.addEventListener('pointerup',()=>ptr.on=false);

document.getElementById('pauseBtn').onclick=()=>{paused=!paused;document.getElementById('pauseMenu').style.display=paused?'flex':'none';};
document.getElementById('resumeBtn').onclick=()=>{paused=false;document.getElementById('pauseMenu').style.display='none';};
document.getElementById('restartBtn').onclick=()=>{paused=false;document.getElementById('pauseMenu').style.display='none';init();};
document.getElementById('muteBtn').onclick=()=>{muted=!muted;document.getElementById('muteBtn').textContent=muted?'Unmute':'Mute';};
document.getElementById('radarBtn').onclick=()=>{radarOn=!radarOn;document.getElementById('radarWrap').style.display=radarOn?'block':'none';};

const jC=document.getElementById('joystickC'),jx=jC?.getContext('2d');
jC?.addEventListener('touchstart',e=>{if(paused)return;e.preventDefault();const t=e.touches[0],r=jC.getBoundingClientRect();jkX=(t.clientX-r.left-50)/50;jkY=(t.clientY-r.top-50)/50;const L=Math.hypot(jkX,jkY);if(L>1){jkX/=L;jkY/=L;}jkAct=true;ptr.on=true;});
jC?.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=jC.getBoundingClientRect();jkX=(t.clientX-r.left-50)/50;jkY=(t.clientY-r.top-50)/50;const L=Math.hypot(jkX,jkY);if(L>1){jkX/=L;jkY/=L;}});
jC?.addEventListener('touchend',()=>{jkAct=false;jkX=jkY=0;ptr.on=false;});
if(/Mobi|Android/i.test(navigator.userAgent))document.getElementById('joystick').style.display='block';

function snd(id){const s=document.getElementById(id);if(s&&!muted){s.currentTime=0;s.play().catch(()=>{});}}
function unlk(){const b=document.getElementById('bgm');if(b&&b.paused&&!muted)b.play().catch(()=>{});}
addEventListener('touchstart',unlk,{once:true});addEventListener('pointerdown',unlk,{once:true});

// ── FX ──
function burst(x,y,c,n=10,s=2){for(let i=0;i<n;i++){const a=Math.random()*TAU,sp=rng(.3,s);parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rng(.8,3.5),life:rng(250,550),ml:550,c,t:'c'});}}
function ring(x,y,c,rad,n=14){for(let i=0;i<n;i++){const a=(i/n)*TAU;parts.push({x:x+Math.cos(a)*rad,y:y+Math.sin(a)*rad,vx:Math.cos(a)*1.2,vy:Math.sin(a)*1.2,r:1.5,life:350,ml:350,c,t:'c'});}}
function fTxt(x,y,t,c){txts.push({x,y,t,c,life:1000,ml:1000});}
function shk(i,d){si=Math.max(si,i);sd=Math.max(sd,d);}

// ── NEBULA ──
const neb=document.createElement('canvas');neb.width=neb.height=512;
(()=>{const c=neb.getContext('2d');c.fillStyle='#020a12';c.fillRect(0,0,512,512);
[{x:90,y:70,r:200,c:'rgba(0,50,90,.08)'},{x:410,y:130,r:190,c:'rgba(60,0,80,.06)'},{x:250,y:380,r:260,c:'rgba(0,40,70,.09)'},{x:60,y:430,r:150,c:'rgba(50,30,0,.05)'},{x:400,y:380,r:180,c:'rgba(0,70,60,.05)'}].forEach(b=>{const g=c.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,b.c);g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(0,0,512,512);});
const id=c.getImageData(0,0,512,512);for(let i=0;i<id.data.length;i+=4){const n=(Math.random()-.5)*5;id.data[i]+=n;id.data[i+1]+=n;id.data[i+2]+=n;}c.putImageData(id,0,0);})();

const stars=[];for(let i=0;i<180;i++)stars.push({x:rng(-4000,4000),y:rng(-4000,4000),s:rng(.2,1.8),dp:rng(.03,.14),tw:rng(.4,2.5),ph:rng(0,TAU),c:['#dde8ff','#ffe8cc','#ffd0ee','#ccffee','#e0ddff'][rni(0,5)]});

// ── EVOLUTION ──
function checkEvo(){
  if(P.stg<STAGES.length-1&&P.mass>=STAGES[P.stg+1].thr){
    P.stg++;const s=stg();
    document.getElementById('evoFlash').style.background=`radial-gradient(circle,${s.col}66 0%,transparent 70%)`;
    document.getElementById('evoFlash').style.opacity='1';setTimeout(()=>document.getElementById('evoFlash').style.opacity='0',250);
    document.getElementById('evoT').textContent=s.name;document.getElementById('evoT').style.color=s.col;
    document.getElementById('evoS').textContent=s.desc;
    document.getElementById('evoAnn').style.opacity='1';setTimeout(()=>document.getElementById('evoAnn').style.opacity='0',3000);
    burst(P.x,P.y,s.col,45,6);ring(P.x,P.y,'#fff',P.r*2,20);ring(P.x,P.y,s.col,P.r*3,16);shk(10,500);snd('sfxEvo');
    // Stage-appropriate spawns
    if(P.stg>=2){spawn('hunter',3);spawn('tendril',4);}
    if(P.stg>=3){spawn('phantom',2);if(Math.random()<.6)spawn('echo',1);}
    if(P.stg>=4){spawn('levia',2);spawn('behemoth',2);spawn('echo',1);}
    if(P.stg>=5){spawn('behemoth',2);}
  }
}

// ── ABILITY ──
function useAbil(){
  if(abil_cd>0)return;const s=stg();if(!s.abil||s.cd===0)return;
  switch(s.abil){
    case'dash':P.dash=true;P.dashT=180;abil_cd=s.cd;burst(P.x,P.y,s.col,8,3);shk(2,60);break;
    case'whip':{
      abil_cd=s.cd;const wR=P.r*4.5,bA=P.hd+PI;
      orgs.forEach(o=>{const d=d2(P,o);if(d<wR){const a=a2(P,o),df=Math.abs(Math.atan2(Math.sin(a-bA),Math.cos(a-bA)));if(df<PI*.55){o.hp-=3;o.flT=200;o.stunT=700;o.vx+=Math.cos(a)*9;o.vy+=Math.sin(a)*9;burst(o.x,o.y,'#ff4400',5,2);}}});
      for(let i=0;i<18;i++){const a=bA-PI*.55+(i/18)*PI*1.1,d=wR*rng(.4,1);parts.push({x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,r:2.5,life:280,ml:280,c:'#ff6040',t:'c'});}
      shk(5,180);snd('sfxHurt');break;}
    case'bolt':{
      abil_cd=s.cd;const a=a2(P,ptr.on?ptr:{x:P.x+Math.cos(P.hd)*100,y:P.y+Math.sin(P.hd)*100});
      projs.push({x:P.x+Math.cos(a)*P.r,y:P.y+Math.sin(a)*P.r,vx:Math.cos(a)*9,vy:Math.sin(a)*9,r:5,life:1400,dmg:9,c:'#ffcc00'});
      burst(P.x+Math.cos(a)*P.r,P.y+Math.sin(a)*P.r,'#ffaa00',5,1.5);shk(2,50);break;}
  }
}

// ═══ ORGANISM AI ═══
function aiOrg(o,dt){
  const T=ORGS[o.type],d=d2(P,o),pr=prey(o),pd=pred(o);
  const spd=T.spd*(o.stunT>0?.15:1)*(1+P.stg*.03);
  o.stT-=dt;o.stunT=Math.max(0,o.stunT-dt);o.flT=Math.max(0,o.flT-dt);o.ph+=dt*.003;
  if(Math.random()<.06)o.trail.push({x:o.x,y:o.y,l:350});
  if(o.trail.length>10)o.trail.shift();
  o.trail.forEach(t=>t.l-=dt);o.trail=o.trail.filter(t=>t.l>0);
  let tx=o.x,ty=o.y;

  switch(T.beh){
    case'drift':o.wAng+=(Math.random()-.5)*.04*dt;tx=o.x+Math.cos(o.wAng)*spd;ty=o.y+Math.sin(o.wAng)*spd;if(pr&&d<180){const f=a2(P,o);tx=o.x+Math.cos(f)*spd*3.5;ty=o.y+Math.sin(f)*spd*3.5;}break;
    case'swarm':{let fx=0,fy=0,fn=0;orgs.forEach(q=>{if(q!==o&&q.type==='polyp'&&d2(o,q)<100){fx+=q.x;fy+=q.y;fn++;}});if(fn){fx/=fn;fy/=fn;const f=Math.atan2(fy-o.y,fx-o.x);tx+=Math.cos(f)*spd*.4;ty+=Math.sin(f)*spd*.4;}o.wAng+=(Math.random()-.5)*.06*dt;tx+=Math.cos(o.wAng)*spd*.4;ty+=Math.sin(o.wAng)*spd*.4;if(pr&&d<160){const f=a2(P,o);tx=o.x+Math.cos(f)*spd*4;ty=o.y+Math.sin(f)*spd*4;}break;}
    case'pulse':{const ps=Math.sin(o.ph*2)*spd*2;tx=o.x+Math.cos(o.hd)*ps;ty=o.y+Math.sin(o.hd)*ps;if(o.stT<=0){o.hd+=(Math.random()-.5)*1.5;o.stT=rng(1000,2500);}if(pr&&d<180){const f=a2(P,o);tx=o.x+Math.cos(f)*spd*3;ty=o.y+Math.sin(f)*spd*3;}break;}
    case'chase':{if(pd){const h=a2(o,P);tx=o.x+Math.cos(h)*spd*(d<130?2:1.3);ty=o.y+Math.sin(h)*spd*(d<130?2:1.3);}else if(pr){const f=a2(P,o),z=Math.sin(gt*.005)*.7;tx=o.x+Math.cos(f+z)*spd*2.8;ty=o.y+Math.sin(f+z)*spd*2.8;}else{const oa=a2(o,P)+PI/2;tx=o.x+Math.cos(oa)*spd;ty=o.y+Math.sin(oa)*spd;}break;}
    case'ambush':{if(o.ambR){o.lAng+=dt*.003;if(!pr&&d<70){o.ambR=false;o.stT=2200;const h=a2(o,P);o.vx=Math.cos(h)*7;o.vy=Math.sin(h)*7;burst(o.x,o.y,'#ee8822',8,3);shk(2,80);}else if(pr&&d<180){const f=a2(P,o);tx=o.x+Math.cos(f)*spd*3;ty=o.y+Math.sin(f)*spd*3;o.ambR=false;o.stT=2500;}}else{o.wAng+=(Math.random()-.5)*.02*dt;tx=o.x+Math.cos(o.wAng)*spd;ty=o.y+Math.sin(o.wAng)*spd;if(o.stT<=0)o.ambR=true;}break;}
    case'passive':{o.wAng+=(Math.random()-.5)*.008*dt;tx=o.x+Math.cos(o.wAng)*spd;ty=o.y+Math.sin(o.wAng)*spd;if(o.flT>0&&d<280){const h=a2(o,P);tx=o.x+Math.cos(h)*spd*3;ty=o.y+Math.sin(h)*spd*3;}break;}
    case'lure':{if(pd){if(d>280){if(Math.random()<.008)parts.push({x:lp(o.x,P.x,.6)+rng(-25,25),y:lp(o.y,P.y,.6)+rng(-25,25),vx:0,vy:0,r:3.5,life:1800,ml:1800,c:PAL.prey,t:'lure'});const h=a2(o,P);tx=o.x+Math.cos(h)*spd*.4;ty=o.y+Math.sin(h)*spd*.4;}else{const h=a2(o,P);tx=o.x+Math.cos(h)*spd*2.2;ty=o.y+Math.sin(h)*spd*2.2;}}else if(pr){const f=a2(P,o);tx=o.x+Math.cos(f)*spd*2.2;ty=o.y+Math.sin(f)*spd*2.2;}else{o.wAng+=(Math.random()-.5)*.03*dt;tx=o.x+Math.cos(o.wAng)*spd;ty=o.y+Math.sin(o.wAng)*spd;}break;}
    case'apex':{if(pr){const f=a2(P,o);tx=o.x+Math.cos(f)*spd*3;ty=o.y+Math.sin(f)*spd*3;}else if(pd){const px=P.x+P.vx*35,py=P.y+P.vy*35,h=Math.atan2(py-o.y,px-o.x);tx=o.x+Math.cos(h)*spd*1.8;ty=o.y+Math.sin(h)*spd*1.8;if(d<180&&o.stT<=0){o.vx=Math.cos(h)*6;o.vy=Math.sin(h)*6;o.stT=1800;burst(o.x,o.y,PAL.apex,10,3);shk(3,100);}}else{const oa=a2(o,P)+PI/3;tx=o.x+Math.cos(oa)*spd;ty=o.y+Math.sin(oa)*spd;}break;}
    case'mirror':{if(behMem.length<10)break;const s=behMem[Math.floor(Math.random()*behMem.length)];const ch=Math.sin(gt*.002)*.8;tx=o.x+s.vx*-1+Math.sin(gt*.003+o.x)*ch;ty=o.y+s.vy*-1+Math.cos(gt*.003+o.y)*ch;if(Math.random()<.012){const h=a2(o,P);o.vx+=Math.cos(h)*4.5;o.vy+=Math.sin(h)*4.5;}break;}
  }
  o.vx=o.vx*.91+(tx-o.x)*.04;o.vy=o.vy*.91+(ty-o.y)*.04;
  o.x+=o.vx*(dt/16);o.y+=o.vy*(dt/16);o.hd=Math.atan2(o.vy,o.vx);
  if(d2(P,o)>2400){const a=Math.random()*TAU,dd=rng(600,T.spW);o.x=P.x+Math.cos(a)*dd;o.y=P.y+Math.sin(a)*dd;o.hp=o.mhp;o.ambR=T.beh==='ambush';}
}

// ═══ PLAYER ═══
function updateP(dt){
  const s=stg();let dx=0,dy=0;
  if(jkAct){ptr.x=P.x+jkX*100;ptr.y=P.y+jkY*100;ptr.on=true;}
  if(ptr.on){dx=ptr.x-P.x;dy=ptr.y-P.y;}
  const dL=Math.hypot(dx,dy);if(dL>.5)P.hd=Math.atan2(dy,dx);
  if(ptr.tap&&s.abil&&s.cd>0)useAbil();
  ptr.tap=false;
  let spd=s.spd*(1+P.mass*.0004);
  if(P.dash){spd*=2.8;P.dashT-=dt;if(P.dashT<=0)P.dash=false;}
  if(P.boost>0){spd*=1.3;P.boost=Math.max(0,P.boost-dt);}
  if(dL>2){P.vx=lp(P.vx,dx/dL*spd,.1);P.vy=lp(P.vy,dy/dL*spd,.1);}else{P.vx*=.9;P.vy*=.9;}
  P.x+=P.vx*(dt/16);P.y+=P.vy*(dt/16);
  P.r=s.baseR+P.mass*.018;
  // Mass decay: gentle early, steeper late. Floor at 80% of current stage threshold.
  const decayRate=.0015*(1+P.mass*.00008)*(P.stg>=4?1.3:1);
  P.mass=Math.max(STAGES[P.stg].thr*.85+3,P.mass-decayRate*dt);
  P.tail.unshift({x:P.x,y:P.y});
  while(P.tail.length>Math.floor(18+P.mass*.07))P.tail.pop();
  P.blink=Math.max(0,P.blink-dt);abil_cd=Math.max(0,abil_cd-dt);
  if(P.flash.t>0)P.flash.t-=dt;
  streakT=Math.max(0,streakT-dt);if(streakT<=0)streak=0;
  // Passives
  if(s.abil==='sting')orgs.forEach(o=>{if(d2(P,o)<P.r*3.2&&prey(o)){o.stunT=Math.max(o.stunT,500);if(Math.random()<.025){o.hp--;o.flT=150;burst(o.x,o.y,PAL.medusa,2,.8);}}});
  if(s.abil==='gravity')orgs.forEach(o=>{const dd=d2(P,o);if(dd<P.r*6.5&&prey(o)){const ps=.7*(1-dd/(P.r*6.5)),a=a2(o,P);o.vx+=Math.cos(a)*ps;o.vy+=Math.sin(a)*ps;}});
  behMem.push({vx:P.vx,vy:P.vy,hd:P.hd});if(behMem.length>120)behMem.shift();
}

// ═══ COLLISIONS ═══
function collide(dt){
  for(let i=orgs.length-1;i>=0;i--){
    const o=orgs[i],T=ORGS[o.type],d=d2(P,o);
    if(prey(o)&&d<P.r){
      const mult=1+streak*.1;
      P.mass+=T.mass*mult;score+=Math.floor(T.mass*10*mult);
      streak++;streakT=3000;
      burst(o.x,o.y,T.col,10,2);
      fTxt(o.x,o.y-12,'+'+Math.floor(T.mass*mult),T.col);
      if(streak>2)fTxt(o.x,o.y-26,streak+'x',`rgba(255,255,255,.6)`);
      shk(.8+o.r*.08,60);snd('sfxEat');
      orgs.splice(i,1);
      const cnt=orgs.filter(q=>q.type===o.type).length;
      if(cnt<T.mx)setTimeout(()=>spawn(o.type,1),rng(1500,4000));
      checkEvo();continue;
    }
    if(pred(o)&&d<o.r&&P.blink<=0&&!shOn){
      P.mass=Math.max(5,P.mass-T.mass*.12*(dt/16));P.blink=280;shk(3,100);
      burst(P.x,P.y,'#ff2244',5,1.5);snd('sfxHurt');
      if(P.stg>0&&P.mass<STAGES[P.stg].thr*.55){P.stg=Math.max(0,P.stg-1);fTxt(P.x,P.y-30,'DE-EVOLVED','#ff4444');shk(8,350);}
    }
    if(o.hp<=0){
      P.mass+=T.mass*.4;score+=Math.floor(T.mass*5);
      burst(o.x,o.y,T.col,14,3);fTxt(o.x,o.y-12,'+'+Math.floor(T.mass*.4),T.col);
      orgs.splice(i,1);checkEvo();
    }
  }
  // Projectiles
  for(let i=projs.length-1;i>=0;i--){const p=projs[i];p.x+=p.vx;p.y+=p.vy;p.life-=16;parts.push({x:p.x,y:p.y,vx:rng(-.2,.2),vy:rng(-.2,.2),r:rng(.8,2.5),life:160,ml:160,c:p.c,t:'c'});if(p.life<=0){projs.splice(i,1);continue;}for(let j=orgs.length-1;j>=0;j--){if(d2(p,orgs[j])<orgs[j].r+p.r){orgs[j].hp-=p.dmg;orgs[j].flT=200;orgs[j].stunT=350;orgs[j].vx+=p.vx*.4;orgs[j].vy+=p.vy*.4;burst(p.x,p.y,p.c,7,2);projs.splice(i,1);break;}}}
  // Inter-org
  for(let i=0;i<orgs.length;i++){const a=orgs[i];for(let j=i+1;j<orgs.length;j++){const b=orgs[j];if(d2(a,b)<a.r+b.r){if(a.r>b.r*1.3){b.hp-=1.5;b.flT=80;}else if(b.r>a.r*1.3){a.hp-=1.5;a.flT=80;}else{const pa=a2(b,a);a.vx+=Math.cos(pa)*.4;a.vy+=Math.sin(pa)*.4;b.vx-=Math.cos(pa)*.4;b.vy-=Math.sin(pa)*.4;}}}}
  // Pickups
  if(pill.on&&d2(P,pill)<P.r+pill.r){P.flash={c:'#00aaff',t:400};frenzy=true;fTime=8000;pill.on=false;snd('sfxEvo');burst(pill.x,pill.y,'#00aaff',16,3);shk(4,180);for(let i=0;i<25;i++)spawn('mote',1);}
  if(frenzy){fTime-=dt;if(fTime<=0)frenzy=false;}
  if(!pill.on&&!frenzy){pill.cd+=dt;if(pill.cd>22000+rng(0,8000)){pill={x:P.x+rng(-700,700),y:P.y+rng(-700,700),r:9,on:true,cd:0};}}
  if(shld.on&&d2(P,shld)<P.r+shld.r){P.flash={c:'#ffd700',t:400};shOn=true;shTime=5000;shld.on=false;snd('sfxEat');burst(shld.x,shld.y,'#ffd700',14,2);shk(3,120);}
  if(shOn){shTime-=dt;if(shTime<=0)shOn=false;}
  if(!shld.on&&!shOn){shld.cd+=dt;if(shld.cd>28000+rng(0,12000)){shld={x:P.x+rng(-700,700),y:P.y+rng(-700,700),r:9,on:true,cd:0};}}
  beacons.forEach((b,i)=>{if(d2(P,b)<P.r+b.r){beacons.length=0;radarOn=true;document.getElementById('radarWrap').style.display='block';burst(b.x,b.y,'#fff',14,2);shk(3,80);}});
}

// ═══════════════════════════════════
// CREATURE ILLUSTRATION SYSTEM
// ═══════════════════════════════════
// Each organism gets a proper silhouette — shapes, not circles.

function drawCreature(o,ts){
  const T=ORGS[o.type];if(!onS(o.x,o.y,o.r*2,P.x,P.y,zm))return;
  const fl=o.flT>0,c=fl?'#fff':T.col,dd=d2(P,o);
  const pu=1+.05*Math.sin(o.ph);const r=o.r*pu;
  // Trail wisps
  cx.globalAlpha=.1;o.trail.forEach(t=>{cx.fillStyle=T.dim;cx.globalAlpha=(t.l/350)*.12;cx.beginPath();cx.arc(t.x,t.y,o.r*.3*(t.l/350),0,TAU);cx.fill();});

  cx.save();cx.translate(o.x,o.y);cx.rotate(o.hd);

  // ── MIRROR ──
  if(o.type==='echo'){
    cx.rotate(-o.hd); // undo rotation for glitch effect
    cx.globalCompositeOperation='lighter';
    for(let i=0;i<3;i++){cx.globalAlpha=.08;cx.beginPath();cx.arc(Math.sin(ts*.01+i)*8,Math.cos(ts*.01+i)*8,r*(1.15+i*.25),0,TAU);cx.fillStyle=`hsla(${185+i*55},90%,60%,.2)`;cx.fill();}
    cx.globalCompositeOperation='source-over';
    // Distortion body
    cx.fillStyle='#fff';cx.globalAlpha=.75;cx.beginPath();
    for(let a=0;a<TAU;a+=.25){const rr=r+Math.sin(a*4+ts*.012)*3+Math.sin(a*7+ts*.007)*2;cx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}
    cx.closePath();cx.fill();
    // Inner shimmer
    cx.fillStyle=PAL.mirrorGlow;cx.globalAlpha=.3+.2*Math.sin(ts*.008);
    cx.beginPath();cx.arc(0,0,r*.4,0,TAU);cx.fill();
    // Glitch eye
    const ea=a2(o,P)-o.hd;cx.fillStyle='#00eeff';cx.globalAlpha=.9;
    cx.beginPath();cx.arc(Math.cos(ea)*r*.35,Math.sin(ea)*r*.35,r*.18,0,TAU);cx.fill();
    cx.fillStyle='#001';cx.beginPath();cx.arc(Math.cos(ea)*r*.42,Math.sin(ea)*r*.42,r*.08,0,TAU);cx.fill();
    cx.restore();cx.globalAlpha=1;
    // Indicators
    if(dd<350){const iy=-r-10;if(prey(o)){cx.fillStyle='rgba(100,255,100,.5)';cx.beginPath();cx.moveTo(o.x-4,o.y+iy-5);cx.lineTo(o.x+4,o.y+iy-5);cx.lineTo(o.x,o.y+iy+1);cx.fill();}else if(pred(o)){cx.fillStyle='rgba(255,80,80,.5)';cx.beginPath();cx.moveTo(o.x-4,o.y+iy+1);cx.lineTo(o.x+4,o.y+iy+1);cx.lineTo(o.x,o.y+iy-5);cx.fill();}}
    return;
  }

  // Stun sparks
  if(o.stunT>0){cx.strokeStyle='rgba(255,255,120,.3)';cx.lineWidth=.8;for(let i=0;i<3;i++){const sa=ts*.012+i*TAU/3;cx.beginPath();cx.arc(0,0,r*1.2,sa,sa+.35);cx.stroke();}}

  // ── MOTE (tiny dot + shimmer) ──
  if(o.type==='mote'){
    cx.shadowBlur=8*zm;cx.shadowColor=c;cx.fillStyle=c;cx.globalAlpha=.7;
    cx.beginPath();cx.arc(0,0,r,0,TAU);cx.fill();
    cx.fillStyle='#fff';cx.globalAlpha=.4;cx.beginPath();cx.arc(r*-.15,r*-.15,r*.35,0,TAU);cx.fill();
  }

  // ── POLYP (cluster of small circles, membrane) ──
  else if(o.type==='polyp'){
    cx.shadowBlur=10*zm;cx.shadowColor=T.dim;
    // Membrane
    cx.fillStyle=c;cx.globalAlpha=.2;cx.beginPath();cx.arc(0,0,r*1.15,0,TAU);cx.fill();
    // Cell body
    cx.globalAlpha=.7;cx.fillStyle=c;cx.beginPath();cx.arc(0,0,r,0,TAU);cx.fill();
    // Organelles
    cx.globalAlpha=.35;cx.fillStyle='#fff';
    cx.beginPath();cx.arc(r*.2,r*-.2,r*.25,0,TAU);cx.fill();
    cx.beginPath();cx.arc(r*-.15,r*.25,r*.18,0,TAU);cx.fill();
  }

  // ── TENDRIL (jellyfish mini — dome + trailing lines) ──
  else if(o.type==='tendril'){
    cx.shadowBlur=12*zm;cx.shadowColor=T.dim;
    // Dome (bell shape)
    cx.fillStyle=c;cx.globalAlpha=.6;cx.beginPath();
    cx.moveTo(-r,r*.1);cx.quadraticCurveTo(-r,-r*.8,0,-r);cx.quadraticCurveTo(r,-r*.8,r,r*.1);
    cx.quadraticCurveTo(r*.5,r*.35,0,r*.2);cx.quadraticCurveTo(-r*.5,r*.35,-r,r*.1);
    cx.fill();
    // Inner glow
    cx.fillStyle='#fff';cx.globalAlpha=.2;cx.beginPath();cx.arc(0,-r*.2,r*.3,0,TAU);cx.fill();
    // Tendrils
    cx.strokeStyle=c;cx.lineWidth=1;cx.globalAlpha=.35;
    for(let t=0;t<4;t++){
      const bx=(t-1.5)*r*.4;cx.beginPath();cx.moveTo(bx,r*.2);
      cx.quadraticCurveTo(bx+Math.sin(ts*.004+t*2)*r*.3,r*.2+r*.8,bx+Math.sin(ts*.003+t)*r*.5,r*.2+r*1.5);cx.stroke();
    }
  }

  // ── HUNTER (angular, sleek — barracuda silhouette) ──
  else if(o.type==='hunter'){
    cx.shadowBlur=12*zm;cx.shadowColor=T.dim;
    cx.fillStyle=c;cx.globalAlpha=.75;cx.beginPath();
    cx.moveTo(r*1.3,0); // nose
    cx.lineTo(r*.4,r*.35);cx.lineTo(-r*.6,r*.4);
    cx.lineTo(-r*1.1,r*.15); // tail fork
    cx.lineTo(-r*.8,0);
    cx.lineTo(-r*1.1,-r*.15);
    cx.lineTo(-r*.6,-r*.4);cx.lineTo(r*.4,-r*.35);
    cx.closePath();cx.fill();
    // Dorsal fin
    cx.fillStyle=T.dim;cx.globalAlpha=.5;cx.beginPath();
    cx.moveTo(r*.1,-r*.35);cx.lineTo(r*.3,-r*.7);cx.lineTo(r*.6,-r*.3);cx.fill();
    // Eye
    cx.fillStyle='#fff';cx.globalAlpha=.9;cx.beginPath();cx.arc(r*.6,r*-.05,r*.14,0,TAU);cx.fill();
    cx.fillStyle='#200';cx.beginPath();cx.arc(r*.65,r*-.05,r*.07,0,TAU);cx.fill();
  }

  // ── LURKER (bulbous body, dangling lure) ──
  else if(o.type==='lurker'){
    cx.shadowBlur=14*zm;cx.shadowColor=T.dim;
    // Body (asymmetric blob)
    cx.fillStyle=c;cx.globalAlpha=.7;cx.beginPath();
    cx.moveTo(r*.6,0);cx.quadraticCurveTo(r*.8,-r*.5,r*.2,-r*.7);
    cx.quadraticCurveTo(-r*.4,-r*.9,-r*.8,-r*.3);
    cx.quadraticCurveTo(-r*1.1,0,-r*.8,r*.3);
    cx.quadraticCurveTo(-r*.4,r*.9,r*.2,r*.7);
    cx.quadraticCurveTo(r*.8,r*.5,r*.6,0);
    cx.fill();
    // Mouth
    cx.fillStyle='#441100';cx.globalAlpha=.6;cx.beginPath();
    cx.arc(r*.3,0,r*.2,-.3,.3);cx.lineTo(r*.5,0);cx.fill();
    // Lure stalk + light
    if(o.ambR){
      cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1;cx.globalAlpha=.5;
      cx.beginPath();cx.moveTo(r*.2,-r*.7);
      const lx=r*.2+Math.sin(o.lAng)*r*.3+r*.8,ly=-r*.7-r*.6+Math.cos(o.lAng)*r*.2;
      cx.quadraticCurveTo(r*.5,-r*1.2,lx,ly);cx.stroke();
      cx.fillStyle='#88ff44';cx.globalAlpha=.6+.4*Math.sin(ts*.008);cx.shadowBlur=16*zm;cx.shadowColor='#88ff44';
      cx.beginPath();cx.arc(lx,ly,3.5,0,TAU);cx.fill();
    }
    // Eye
    cx.fillStyle='#fff';cx.globalAlpha=.8;cx.beginPath();cx.arc(r*.1,-r*.25,r*.15,0,TAU);cx.fill();
    cx.fillStyle='#330';cx.beginPath();cx.arc(r*.15,-r*.25,r*.07,0,TAU);cx.fill();
  }

  // ── LEVIATHAN (smooth whale curves, gentle) ──
  else if(o.type==='levia'){
    cx.shadowBlur=18*zm;cx.shadowColor=T.dim;
    // Body
    cx.fillStyle=c;cx.globalAlpha=.55;cx.beginPath();
    cx.moveTo(r*1.2,0);
    cx.quadraticCurveTo(r,-r*.5,r*.3,-r*.55);
    cx.quadraticCurveTo(-r*.3,-r*.6,-r*.7,-r*.35);
    cx.quadraticCurveTo(-r*1.1,-r*.1,-r*1.3,0);
    cx.quadraticCurveTo(-r*1.1,r*.1,-r*.7,r*.35);
    cx.quadraticCurveTo(-r*.3,r*.6,r*.3,r*.55);
    cx.quadraticCurveTo(r,r*.5,r*1.2,0);cx.fill();
    // Tail flukes
    cx.fillStyle=T.dim;cx.globalAlpha=.4;cx.beginPath();
    cx.moveTo(-r*1.1,0);cx.lineTo(-r*1.5,-r*.4);cx.lineTo(-r*1.2,-r*.05);cx.fill();
    cx.beginPath();cx.moveTo(-r*1.1,0);cx.lineTo(-r*1.5,r*.4);cx.lineTo(-r*1.2,r*.05);cx.fill();
    // Belly stripe
    cx.strokeStyle='rgba(255,255,255,.12)';cx.lineWidth=1;cx.beginPath();cx.moveTo(r*.8,r*.1);cx.quadraticCurveTo(0,r*.35,-r*.8,r*.1);cx.stroke();
    // Eye
    cx.fillStyle='#fff';cx.globalAlpha=.7;cx.beginPath();cx.arc(r*.7,-r*.15,r*.08,0,TAU);cx.fill();
    // Pulse rings
    cx.strokeStyle=T.dim;cx.lineWidth=.6;for(let w=0;w<2;w++){cx.globalAlpha=.08;cx.beginPath();cx.arc(0,0,r*(1.4+w*.3)+Math.sin(ts*.002+w)*2,0,TAU);cx.stroke();}
  }

  // ── PHANTOM (spiral body, hypnotic) ──
  else if(o.type==='phantom'){
    cx.shadowBlur=14*zm;cx.shadowColor=T.dim;
    // Body — flowing teardrop
    cx.fillStyle=c;cx.globalAlpha=.6;cx.beginPath();
    cx.moveTo(r,0);cx.quadraticCurveTo(r*.6,-r*.6,0,-r*.5);
    cx.quadraticCurveTo(-r*.8,-r*.3,-r*.5,0);
    cx.quadraticCurveTo(-r*.8,r*.3,0,r*.5);
    cx.quadraticCurveTo(r*.6,r*.6,r,0);cx.fill();
    // Inner spiral
    cx.strokeStyle=c;cx.lineWidth=.8;cx.globalAlpha=.2;cx.beginPath();
    for(let a=0;a<TAU*1.8;a+=.08){const sr=(a/(TAU*1.8))*r*.8;cx.lineTo(Math.cos(a+ts*.004)*sr,Math.sin(a+ts*.004)*sr);}cx.stroke();
    // Eyes (two, glowing)
    for(let s=-1;s<=1;s+=2){cx.fillStyle='#fff';cx.globalAlpha=.8;cx.beginPath();cx.arc(r*.3,s*r*.15,r*.1,0,TAU);cx.fill();}
    // Trailing wisps
    cx.strokeStyle=c;cx.lineWidth=1;cx.globalAlpha=.25;
    for(let t=0;t<3;t++){cx.beginPath();cx.moveTo(-r*.5,0);const ea=-r*.5-r*(1+t*.4),ey=Math.sin(ts*.005+t*2)*r*.4;cx.quadraticCurveTo((-r*.5+ea)/2,ey*.7,ea,ey);cx.stroke();}
  }

  // ── BEHEMOTH (crowned apex, armored plates) ──
  else if(o.type==='behemoth'){
    cx.shadowBlur=20*zm;cx.shadowColor=T.dim;
    // Armored body
    cx.fillStyle=c;cx.globalAlpha=.7;cx.beginPath();
    cx.moveTo(r*1.1,0);
    for(let i=0;i<8;i++){const a=(i/8)*TAU,nr=r*(1+((i%2)?.12:0));cx.lineTo(Math.cos(a)*nr,Math.sin(a)*nr);}
    cx.closePath();cx.fill();
    // Crown spikes
    cx.fillStyle=T.dim;cx.globalAlpha=.5;
    for(let i=0;i<6;i++){const sa=(i/6)*TAU+ts*.0015;cx.beginPath();
    cx.moveTo(Math.cos(sa-.1)*r,Math.sin(sa-.1)*r);
    cx.lineTo(Math.cos(sa)*(r*1.55+Math.sin(ts*.003+i)*r*.1),Math.sin(sa)*(r*1.55+Math.sin(ts*.003+i)*r*.1));
    cx.lineTo(Math.cos(sa+.1)*r,Math.sin(sa+.1)*r);cx.fill();}
    // Inner armor lines
    cx.strokeStyle='rgba(0,0,0,.15)';cx.lineWidth=1;
    for(let i=0;i<4;i++){const a=(i/4)*TAU;cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.cos(a)*r*.7,Math.sin(a)*r*.7);cx.stroke();}
    // Eyes — three, menacing
    for(let s=-1;s<=1;s++){const ea=s*.35,ed=s===0?r*.5:r*.45;cx.fillStyle='#ff3300';cx.globalAlpha=.9;cx.beginPath();cx.arc(Math.cos(ea)*ed,Math.sin(ea)*ed,r*.09,0,TAU);cx.fill();}
  }

  cx.restore();

  // HP ring
  if(o.hp<o.mhp&&r*zm>3){const pct=o.hp/o.mhp;cx.strokeStyle=pct>.5?'rgba(120,255,120,.5)':pct>.25?'rgba(255,255,80,.5)':'rgba(255,80,80,.5)';cx.lineWidth=1.5;cx.beginPath();cx.arc(o.x,o.y,r+3,-PI/2,-PI/2+pct*TAU);cx.stroke();}

  // Prey/pred arrow
  if(dd<380&&r*zm>3){
    if(prey(o)){cx.fillStyle='rgba(120,238,85,.45)';cx.beginPath();cx.moveTo(o.x-3,o.y-r-9);cx.lineTo(o.x+3,o.y-r-9);cx.lineTo(o.x,o.y-r-3);cx.fill();}
    else if(pred(o)){cx.fillStyle='rgba(255,60,60,.45)';cx.beginPath();cx.moveTo(o.x-3,o.y-r-3);cx.lineTo(o.x+3,o.y-r-3);cx.lineTo(o.x,o.y-r-9);cx.fill();}
  }
  cx.shadowBlur=0;cx.globalAlpha=1;
}

// ═══ PLAYER DRAWING ═══
function drawP(ts){
  const s=stg(),r=P.r,c=s.col,n=P.tail.length;
  const br=1+.035*Math.sin(ts*.004);

  // ── TAIL ──
  if(n>3){
    cx.save();cx.globalCompositeOperation='lighter';cx.lineJoin='round';cx.lineCap='round';
    const sk=Math.max(1,Math.floor(n/45));
    if(P.stg<=1){
      // Thin flagellum
      cx.strokeStyle=s.dim;cx.lineWidth=Math.max(1,r*.25);cx.globalAlpha=.35;cx.beginPath();cx.moveTo(P.tail[0].x,P.tail[0].y);
      for(let i=1;i<n;i+=sk){const t=i/n,w=Math.sin(t*14+ts*.009)*r*.25*(1-t),pa=P.hd+PI/2;cx.lineTo(P.tail[i].x+Math.cos(pa)*w,P.tail[i].y+Math.sin(pa)*w);}cx.stroke();
    }else if(P.stg===2){
      // Jelly tentacles
      for(let t=0;t<5;t++){cx.strokeStyle=s.dim;cx.lineWidth=1.2;cx.globalAlpha=.3;cx.beginPath();
      const ba=P.hd+PI+(t-2)*.28;let px=P.x,py=P.y;cx.moveTo(px,py);
      for(let sg=0;sg<7;sg++){const st=sg/7,w=Math.sin(st*5+ts*.005+t)*r*.35;px+=Math.cos(ba)*r*.5;py+=Math.sin(ba)*r*.5;cx.quadraticCurveTo(px+Math.cos(ba+PI/2)*w,py+Math.sin(ba+PI/2)*w,px,py);}cx.stroke();}
    }else if(P.stg===3){
      // Serpent thick segmented body
      cx.strokeStyle=s.dim;cx.lineWidth=r*.7;cx.globalAlpha=.25;cx.shadowBlur=8*zm;cx.shadowColor=s.dim;
      cx.beginPath();cx.moveTo(P.tail[0].x,P.tail[0].y);
      for(let i=1;i<n;i+=sk){const t=i/n,w=Math.sin(t*7+ts*.005)*r*.45*(1-t*.5),pa=P.hd+PI/2;cx.lineTo(P.tail[i].x+Math.cos(pa)*w,P.tail[i].y+Math.sin(pa)*w);}cx.stroke();
      cx.strokeStyle=c;cx.lineWidth=r*.28;cx.globalAlpha=.4;cx.beginPath();cx.moveTo(P.tail[0].x,P.tail[0].y);
      for(let i=1;i<n;i+=sk){const t=i/n,w=Math.sin(t*7+ts*.005)*r*.25*(1-t*.5),pa=P.hd+PI/2;cx.lineTo(P.tail[i].x+Math.cos(pa)*w,P.tail[i].y+Math.sin(pa)*w);}cx.stroke();cx.shadowBlur=0;
      // Dorsal bumps
      for(let i=0;i<n;i+=Math.max(1,Math.floor(n/10))){const t=i/n,p=P.tail[i];cx.fillStyle=s.dim;cx.globalAlpha=.2*(1-t);cx.beginPath();cx.arc(p.x,p.y,r*(1-t)*.35,0,TAU);cx.fill();}
    }else{
      // Leviathan/Primordial luminous ribbon
      cx.strokeStyle=s.dim;cx.lineWidth=r*.9;cx.globalAlpha=.1;cx.shadowBlur=16*zm;cx.shadowColor=s.dim;
      cx.beginPath();cx.moveTo(P.tail[0].x,P.tail[0].y);for(let i=1;i<n;i+=sk)cx.lineTo(P.tail[i].x,P.tail[i].y);cx.stroke();
      cx.strokeStyle=c;cx.lineWidth=r*.4;cx.globalAlpha=.3;cx.beginPath();cx.moveTo(P.tail[0].x,P.tail[0].y);for(let i=1;i<n;i+=sk)cx.lineTo(P.tail[i].x,P.tail[i].y);cx.stroke();
      cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=r*.08;cx.beginPath();cx.moveTo(P.tail[0].x,P.tail[0].y);for(let i=1;i<n;i+=sk)cx.lineTo(P.tail[i].x,P.tail[i].y);cx.stroke();cx.shadowBlur=0;
    }
    cx.restore();
  }

  // ── BODY ──
  cx.save();cx.translate(P.x,P.y);cx.rotate(P.hd);
  const bv=P.blink>0?(Math.sin(gt*.03)>0?.35:.85):.85;

  // Aura
  cx.globalCompositeOperation='lighter';cx.shadowBlur=28*zm;cx.shadowColor=s.dim;
  cx.fillStyle=s.dim;cx.globalAlpha=.06;cx.beginPath();cx.arc(0,0,r*2*br,0,TAU);cx.fill();
  cx.globalCompositeOperation='source-over';

  // ── Stage 0: MOTE — translucent droplet ──
  if(P.stg===0){
    cx.fillStyle=c;cx.globalAlpha=bv*.7;cx.shadowBlur=12*zm;cx.shadowColor=c;
    cx.beginPath();cx.arc(0,0,r*br,0,TAU);cx.fill();
    cx.fillStyle='#fff';cx.globalAlpha=.5;cx.beginPath();cx.arc(r*-.1,r*-.15,r*.3,0,TAU);cx.fill();
  }

  // ── Stage 1: DRIFTER — elongated cell ──
  else if(P.stg===1){
    cx.fillStyle=c;cx.globalAlpha=bv*.75;cx.shadowBlur=12*zm;cx.shadowColor=c;
    cx.beginPath();cx.ellipse(0,0,r*1.2*br,r*.8*br,0,0,TAU);cx.fill();
    // Nucleus
    cx.fillStyle='#fff';cx.globalAlpha=.35;cx.beginPath();cx.arc(r*.1,0,r*.28,0,TAU);cx.fill();
    // Membrane
    cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=.8;cx.beginPath();cx.ellipse(0,0,r*1.15,r*.75,0,0,TAU);cx.stroke();
  }

  // ── Stage 2: MEDUSA — bell dome ──
  else if(P.stg===2){
    cx.shadowBlur=14*zm;cx.shadowColor=c;
    // Bell
    cx.fillStyle=c;cx.globalAlpha=bv*.6;cx.beginPath();
    cx.moveTo(-r*.9,r*.1);cx.quadraticCurveTo(-r*.9,-r*.9,0,-r*1.1);cx.quadraticCurveTo(r*.9,-r*.9,r*.9,r*.1);
    cx.quadraticCurveTo(r*.4,r*.4,0,r*.25);cx.quadraticCurveTo(-r*.4,r*.4,-r*.9,r*.1);cx.fill();
    // Bioluminescent spots
    cx.fillStyle='#fff';cx.globalAlpha=.25;
    for(let i=0;i<5;i++){const sa=(i/5)*TAU+ts*.002;cx.beginPath();cx.arc(Math.cos(sa)*r*.35,Math.sin(sa)*r*.35-r*.15,r*.08,0,TAU);cx.fill();}
    // Sting field
    cx.strokeStyle=s.dim;cx.lineWidth=.6;cx.globalAlpha=.12+.06*Math.sin(ts*.005);cx.beginPath();cx.arc(0,0,r*3.2,0,TAU);cx.stroke();
  }

  // ── Stage 3: NAGA — serpent head ──
  else if(P.stg===3){
    cx.shadowBlur=14*zm;cx.shadowColor=c;
    // Head shape — angular, predatory
    cx.fillStyle=c;cx.globalAlpha=bv*.8;cx.beginPath();
    cx.moveTo(r*1.3,0);cx.quadraticCurveTo(r*.9,-r*.5,r*.2,-r*.6);
    cx.quadraticCurveTo(-r*.3,-r*.7,-r*.5,-r*.4);cx.lineTo(-r*.3,0);
    cx.lineTo(-r*.5,r*.4);cx.quadraticCurveTo(-r*.3,r*.7,r*.2,r*.6);
    cx.quadraticCurveTo(r*.9,r*.5,r*1.3,0);cx.fill();
    // Scales
    cx.fillStyle=s.dim;cx.globalAlpha=.3;
    for(let i=0;i<5;i++){const sa=(i/5)*TAU;cx.beginPath();cx.arc(Math.cos(sa)*r*.5,Math.sin(sa)*r*.5,r*.12,0,TAU);cx.fill();}
    // Eye
    cx.fillStyle='#fff';cx.globalAlpha=.9;cx.beginPath();cx.arc(r*.55,-r*.12,r*.16,0,TAU);cx.fill();
    cx.fillStyle='#200';cx.beginPath();cx.arc(r*.6,-r*.12,r*.08,0,TAU);cx.fill();
    // Jaw line
    cx.strokeStyle='rgba(0,0,0,.2)';cx.lineWidth=1;cx.beginPath();cx.moveTo(r*.8,r*.15);cx.lineTo(r*1.2,0);cx.lineTo(r*.8,-r*.15);cx.stroke();
  }

  // ── Stage 4: TITAN — armored juggernaut ──
  else if(P.stg===4){
    cx.shadowBlur=20*zm;cx.shadowColor=c;
    // Hex armor body
    cx.fillStyle=c;cx.globalAlpha=bv*.65;cx.beginPath();
    for(let i=0;i<6;i++){const a=(i/6)*TAU-PI/6;cx.lineTo(Math.cos(a)*r*1.1*br,Math.sin(a)*r*1.1*br);}cx.closePath();cx.fill();
    // Armor plates
    cx.fillStyle=s.dim;cx.globalAlpha=.3;
    for(let i=0;i<6;i++){const a=(i/6)*TAU+ts*.001;cx.beginPath();
    cx.moveTo(Math.cos(a-.18)*r*.85,Math.sin(a-.18)*r*.85);cx.lineTo(Math.cos(a)*r*1.25,Math.sin(a)*r*1.25);
    cx.lineTo(Math.cos(a+.18)*r*.85,Math.sin(a+.18)*r*.85);cx.fill();}
    // Twin eyes
    for(let s2=-1;s2<=1;s2+=2){cx.fillStyle='#fff';cx.globalAlpha=.8;cx.beginPath();cx.arc(r*.45,s2*r*.2,r*.12,0,TAU);cx.fill();
    cx.fillStyle='#112';cx.beginPath();cx.arc(r*.48,s2*r*.2,r*.06,0,TAU);cx.fill();}
    // Gravity rings
    cx.strokeStyle=s.dim;cx.lineWidth=.5;for(let rn=0;rn<3;rn++){cx.globalAlpha=.05;cx.beginPath();cx.arc(0,0,r*(2+rn*1.2)+Math.sin(ts*.003+rn)*4,0,TAU);cx.stroke();}
  }

  // ── Stage 5: PRIMORDIAL — cosmic crown ──
  else if(P.stg===5){
    cx.shadowBlur=24*zm;cx.shadowColor=c;
    // Body
    cx.fillStyle=c;cx.globalAlpha=bv*.7;cx.beginPath();cx.arc(0,0,r*br,0,TAU);cx.fill();
    // Crown spines
    cx.fillStyle=s.dim;cx.globalAlpha=.45;
    for(let i=0;i<8;i++){const sa=(i/8)*TAU+ts*.002,tip=r*1.6+Math.sin(ts*.004+i)*r*.15;
    cx.beginPath();cx.moveTo(Math.cos(sa-.1)*r*.9,Math.sin(sa-.1)*r*.9);cx.lineTo(Math.cos(sa)*tip,Math.sin(sa)*tip);cx.lineTo(Math.cos(sa+.1)*r*.9,Math.sin(sa+.1)*r*.9);cx.fill();}
    // Energy arcs
    cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=1;for(let a=0;a<3;a++){const aa=ts*.005+a*TAU/3;cx.beginPath();cx.arc(0,0,r*1.7,aa,aa+.5);cx.stroke();}
    // Three eyes
    for(let s2=-1;s2<=1;s2++){const ed=s2===0?r*.45:r*.4,ey2=s2*.3;cx.fillStyle='#fff';cx.globalAlpha=.9;cx.beginPath();cx.arc(ed,ey2,r*(s2===0?.14:.1),0,TAU);cx.fill();
    cx.fillStyle='#ff5500';cx.globalAlpha=1;cx.beginPath();cx.arc(ed+r*.02,ey2,r*(s2===0?.07:.05),0,TAU);cx.fill();}
    // Core
    cx.fillStyle='#fff';cx.globalAlpha=.3;cx.shadowBlur=10*zm;cx.shadowColor='#ffcc00';cx.beginPath();cx.arc(0,0,r*.28,0,TAU);cx.fill();
  }

  cx.restore();

  // Shield ring
  if(shOn){const rem=shTime/5000;cx.save();cx.globalCompositeOperation='lighter';cx.strokeStyle=`rgba(255,215,0,${.25*rem})`;cx.lineWidth=1.5;cx.shadowBlur=12*zm;cx.shadowColor='#ffd700';cx.beginPath();cx.arc(P.x,P.y,r*1.35,0,TAU);cx.stroke();cx.restore();}
  // Dash afterimage
  if(P.dash){cx.globalCompositeOperation='lighter';cx.fillStyle=c;cx.globalAlpha=.25;cx.beginPath();cx.arc(P.x-P.vx*3,P.y-P.vy*3,r*.7,0,TAU);cx.fill();cx.globalCompositeOperation='source-over';}
  // Flash
  if(P.flash.t>0){cx.fillStyle=P.flash.c;cx.globalAlpha=.3*(P.flash.t/400);cx.beginPath();cx.arc(P.x,P.y,r*1.5,0,TAU);cx.fill();}

  cx.shadowBlur=0;cx.globalAlpha=1;
}

// ── PICKUPS ──

  if(pill.on){cx.shadowBlur=12*zm;cx.shadowColor='#00aaff';cx.fillStyle='#00aaff';cx.globalAlpha=.7;cx.beginPath();cx.arc(pill.x,pill.y,pill.r*(1+.15*Math.sin(ts*.005)),0,TAU);cx.fill();cx.fillStyle='#fff';cx.globalAlpha=.4;cx.beginPath();cx.arc(pill.x,pill.y,pill.r*.3,0,TAU);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;}
  if(shld.on){cx.shadowBlur=12*zm;cx.shadowColor='#ffd700';cx.fillStyle='#ffd700';cx.globalAlpha=.7;cx.beginPath();cx.arc(shld.x,shld.y,shld.r*(1+.12*Math.sin(ts*.006)),0,TAU);cx.fill();cx.fillStyle='#fff';cx.globalAlpha=.4;cx.beginPath();cx.arc(shld.x,shld.y,shld.r*.3,0,TAU);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;}
  beacons.forEach(b=>{if(!onS(b.x,b.y,b.r*2,P.x,P.y,zm))return;cx.shadowBlur=10*zm;cx.shadowColor='#fff';cx.fillStyle='#fff';cx.globalAlpha=.4+.15*Math.sin(ts*.004);cx.beginPath();cx.arc(b.x,b.y,b.r,0,TAU);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;});
}

// ── BACKGROUND ──
function drawBg(ts){
  const tl=1024,ox=(-P.x*.02)%tl,oy=(-P.y*.02)%tl;cx.globalAlpha=.55;
  for(let nx=-1;nx<=Math.ceil(W/tl)+1;nx++)for(let ny=-1;ny<=Math.ceil(H/tl)+1;ny++)cx.drawImage(neb,ox+nx*tl,oy+ny*tl,tl,tl);
  cx.globalAlpha=1;
  for(const s of stars){const sx2=(s.x-P.x*s.dp)*zm+off.x+sx,sy2=(s.y-P.y*s.dp)*zm+off.y+sy;if(sx2<-3||sx2>W+3||sy2<-3||sy2>H+3)continue;
  const tw=.25+.75*(.5+.5*Math.sin(ts*s.tw*.001+s.ph));cx.globalAlpha=tw;cx.fillStyle=s.c;
  if(s.s>1.2){cx.fillRect(sx2-s.s*1.2,sy2-.3,s.s*2.4,.6);cx.fillRect(sx2-.3,sy2-s.s*1.2,.6,s.s*2.4);}cx.fillRect(sx2,sy2,s.s,s.s);}cx.globalAlpha=1;
}

function drawGrid(){
  const step=100;cx.lineWidth=.5;
  for(let i=-8;i<=8;i++)for(let j=-8;j<=8;j++){const x=i*step,y=j*step;if(!onS(x,y,step*1.5,P.x,P.y,zm))continue;const dd=Math.hypot(x+50-P.x,y+50-P.y);const f=Math.max(0,1-dd/550);cx.strokeStyle=`rgba(25,35,50,${.2*f+.02})`;cx.beginPath();cx.rect(x,y,step,step);cx.stroke();}
}

function drawVignette(){cx.setTransform(1,0,0,1,0,0);const g=cx.createRadialGradient(W/2,H/2,W*.2,W/2,H/2,W*.7);g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(2,10,18,.5)');cx.fillStyle=g;cx.fillRect(0,0,W,H);}

// ── RADAR ──

}

// ── HUD ──
const cdC=document.getElementById('cdRing').getContext('2d');
function updateHUD(){
  const s=stg(),nx=STAGES[P.stg+1];
  document.getElementById('stageLabel').textContent=s.name;document.getElementById('stageLabel').style.color=s.col;
  document.getElementById('stageLabel').style.textShadow=`0 0 14px ${s.col},0 0 35px ${s.dim}`;
  document.getElementById('massV').textContent=Math.floor(P.mass);
  document.getElementById('scoreLabel').textContent=score.toLocaleString();
  document.getElementById('abilLabel').textContent=s.abilTxt+(streak>1?`  ${streak}x streak`:'');
  const bar=document.getElementById('evoFill');
  if(nx){const pct=cl((P.mass-s.thr)/(nx.thr-s.thr)*100,0,100);bar.style.width=pct+'%';bar.style.background=`linear-gradient(90deg,${s.col},${nx.col})`;document.getElementById('evoNext').textContent=`${nx.name} — ${nx.thr}`;}
  else{bar.style.width='100%';bar.style.background=s.col;document.getElementById('evoNext').textContent='APEX EVOLUTION';}
  // Cooldown ring
  cdC.clearRect(0,0,28,28);if(s.cd>0){const pct2=1-abil_cd/s.cd;cdC.strokeStyle=s.col;cdC.lineWidth=2;cdC.beginPath();cdC.arc(14,14,11,-PI/2,-PI/2+pct2*TAU);cdC.stroke();cdC.strokeStyle='rgba(255,255,255,.08)';cdC.beginPath();cdC.arc(14,14,11,0,TAU);cdC.stroke();}
  // Danger vignette
  const hpPct=(P.mass-STAGES[P.stg].thr*.85)/(STAGES[P.stg].thr*.15||50);
  document.getElementById('dangerVig').style.opacity=hpPct<.3?(.3-hpPct)/.3*.7:0;
}

// ── 3D HEAD ──
function updateHead(){
  const w=document.getElementById('dragonHead'),sz=TILE*SCALE*Math.min(1.4,.85+(P.r/20));
  const sx2=P.x*zm+off.x+sx,sy2=P.y*zm+off.y+sy;
  w.style.width=sz+'px';w.style.height=sz+'px';w.style.left=(sx2-sz/2)+'px';w.style.top=(sy2-sz/2)+'px';
  document.getElementById('headCanvas').style.width=sz+'px';document.getElementById('headCanvas').style.height=sz+'px';
  if(typeof window.renderHead==='function'){const yT=(P.hd+PI)/TAU;window.renderHead((yT%1)*TAU,(cl(Math.hypot(P.vx,P.vy)/3,0,1)*.5-.25)*PI);}
}

// Joystick draw
function drawJK(){if(!jx)return;jx.clearRect(0,0,100,100);jx.fillStyle='rgba(255,255,255,.08)';jx.beginPath();jx.arc(50,50,46,0,TAU);jx.fill();jx.strokeStyle='rgba(255,255,255,.08)';jx.lineWidth=1;jx.beginPath();jx.arc(50,50,46,0,TAU);jx.stroke();if(jkAct){jx.fillStyle=`rgba(${stg().col},0.4)`;jx.fillStyle='rgba(0,228,184,.4)';jx.beginPath();jx.arc(50+jkX*28,50+jkY*28,14,0,TAU);jx.fill();}}

// ═══ MAIN LOOP ═══
let lt=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(paused){lt=ts;return;}
  const dt=Math.min(ts-lt,50)||16;lt=ts;gt+=dt;

  if(sd>0){sd-=dt;const t=cl(sd/300,0,1);sx=(Math.random()-.5)*si*t*2;sy=(Math.random()-.5)*si*t*2;}else{sx=sy=0;si=0;}

  updateP(dt);orgs.forEach(o=>aiOrg(o,dt));collide(dt);

  const tz=cl(H/(P.r*5),.35,1.5)*szm;zm=lp(zm,tz,.04);
  off.x=W/2-P.x*zm;off.y=H/2-P.y*zm;

  // Ecosystem maintenance
  for(const[type,T]of Object.entries(ORGS)){if(type==='echo')continue;const cnt=orgs.filter(o=>o.type===type).length;if(cnt<T.mx*.35)spawn(type,1);}

  // ── RENDER ──
  cx.setTransform(1,0,0,1,0,0);cx.clearRect(0,0,W,H);
  drawBg(ts);
  cx.setTransform(zm,0,0,zm,off.x+sx,off.y+sy);
  drawGrid();

  // Particles
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;p.life-=dt;if(p.life<=0){parts.splice(i,1);continue;}const a=cl(p.life/p.ml,0,1);cx.fillStyle=p.c;cx.globalAlpha=a*(p.t==='lure'?.4*(.5+.5*Math.sin(ts*.01)):.6);cx.beginPath();cx.arc(p.x,p.y,p.r*a,0,TAU);cx.fill();}
  if(parts.length>350)parts.splice(350);cx.globalAlpha=1;

  orgs.forEach(o=>drawCreature(o,ts));
  projs.forEach(p=>{cx.fillStyle=p.c;cx.globalAlpha=.85;cx.shadowBlur=10*zm;cx.shadowColor=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r,0,TAU);cx.fill();cx.fillStyle='#fff';cx.globalAlpha=.5;cx.beginPath();cx.arc(p.x,p.y,p.r*.35,0,TAU);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;});
  drawPicks(ts);
  drawP(ts);

  cx.font='600 13px "Tenor Sans",serif';cx.textAlign='center';
  for(let i=txts.length-1;i>=0;i--){const f=txts[i];f.y-=.7*(dt/16);f.life-=dt;if(f.life<=0){txts.splice(i,1);continue;}cx.fillStyle=f.c;cx.globalAlpha=cl(f.life/f.ml,0,1);cx.fillText(f.t,f.x,f.y);}cx.globalAlpha=1;

  if(frenzy){cx.setTransform(1,0,0,1,0,0);cx.globalAlpha=.04+.02*Math.sin(ts*.008);cx.fillStyle='#ff39ff';cx.fillRect(0,0,W,H);cx.globalAlpha=1;}

  drawVignette();updateHUD();if(radarOn)drawRadar();drawMM();drawJK();updateHead();
}

init();requestAnimationFrame(loop);
</script>
</body>
