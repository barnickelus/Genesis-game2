<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Genesis Evolution</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<link href="https://fonts.googleapis.com/css2?family=Megrim&family=Tenor+Sans&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#010810;font-family:'Tenor Sans',serif}
canvas#game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:14px 18px;display:flex;justify-content:space-between}
#hudL{display:flex;flex-direction:column;gap:3px}
#stgLbl{font-family:'Megrim',cursive;font-size:17px;letter-spacing:5px;text-transform:uppercase}
#massLbl{font-size:14px;color:rgba(255,255,255,.35);letter-spacing:2px}
#massLbl b{color:rgba(255,255,255,.75);font-weight:400;font-size:17px}
#evoWrap{width:180px;height:3px;background:rgba(255,255,255,.04);border-radius:2px;margin-top:3px;overflow:hidden}
#evoFill{height:100%;width:0%;border-radius:2px;transition:width .4s}
#evoNxt{font-size:10px;color:rgba(255,255,255,.18);letter-spacing:2px;margin-top:1px}
#hudR{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
#scoreLbl{font-family:'Megrim',cursive;font-size:15px;color:rgba(255,255,255,.25);letter-spacing:3px}
#abilLbl{font-size:11px;color:rgba(255,255,255,.22);letter-spacing:1px}
#cdRing{width:24px;height:24px;margin-top:2px;opacity:.35}
#evoFlash{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .25s}
#evoAnn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:21;pointer-events:none;text-align:center;opacity:0;transition:opacity .5s}
#evoAnn h1{font-family:'Megrim',cursive;font-size:32px;letter-spacing:10px;margin-bottom:4px}
#evoAnn p{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:3px}
#dangerV{position:fixed;inset:0;z-index:9;pointer-events:none;opacity:0;transition:opacity .4s;background:radial-gradient(ellipse at center,transparent 40%,rgba(140,15,0,.18) 100%)}
#pauseBtn{position:fixed;top:12px;right:16px;z-index:10;font-size:18px;color:rgba(255,255,255,.25);cursor:pointer;user-select:none;pointer-events:auto;background:none;border:none}
#pauseMenu{position:fixed;inset:0;z-index:30;background:rgba(1,8,16,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;backdrop-filter:blur(14px)}
#pauseMenu h2{font-family:'Megrim',cursive;font-size:22px;letter-spacing:8px;color:rgba(255,255,255,.45);margin-bottom:10px}
#pauseMenu button{width:150px;padding:9px;font-family:'Tenor Sans',serif;font-size:13px;color:rgba(255,255,255,.45);background:transparent;border:1px solid rgba(255,255,255,.07);border-radius:1px;cursor:pointer;letter-spacing:2px;transition:all .3s}
#pauseMenu button:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.18)}
#radarWrap{position:fixed;top:48px;right:16px;width:68px;height:68px;display:none;z-index:10;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.15)}
#radar{width:68px;height:68px}
#minimap{position:fixed;bottom:14px;left:14px;z-index:10;width:76px;height:76px;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.15)}
#minimapC{width:76px;height:76px}
#joystick{position:fixed;bottom:20px;right:20px;width:100px;height:100px;display:none;z-index:10}
#joystickC{width:100px;height:100px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><div id="hudL"><div id="stgLbl">MOTE</div><div id="massLbl"><b id="massV">10</b> mass</div><div id="evoWrap"><div id="evoFill"></div></div><div id="evoNxt"></div></div><div id="hudR"><div id="scoreLbl">0</div><div id="abilLbl"></div><canvas id="cdRing" width="24" height="24"></canvas></div></div>
<div id="evoFlash"></div><div id="evoAnn"><h1 id="evoT"></h1><p id="evoS"></p></div><div id="dangerV"></div>
<button id="pauseBtn">⏸</button>
<div id="pauseMenu"><h2>PAUSED</h2><button id="resumeBtn">Resume</button><button id="restartBtn">Restart</button><button id="muteBtn">Mute</button><button id="radarBtn">Radar</button></div>
<div id="radarWrap"><canvas id="radar" width="68" height="68"></canvas></div>
<div id="minimap"><canvas id="minimapC" width="76" height="76"></canvas></div>
<div id="joystick"><canvas id="joystickC" width="100" height="100"></canvas></div>

<script>
const G=document.getElementById('game'),cx=G.getContext('2d',{alpha:false});
let W,H;function resize(){W=G.width=innerWidth;H=G.height=innerHeight;}addEventListener('resize',resize);resize();

const TAU=Math.PI*2,PI=Math.PI;
const rng=(a,b)=>a+Math.random()*(b-a),rni=(a,b)=>Math.floor(rng(a,b));
const d2=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y),a2=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x);
const lp=(a,b,t)=>a+(b-a)*t,cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const onS=(x,y,r)=>!(x+r<P.x-W/(2*zm)||x-r>P.x+W/(2*zm)||y+r<P.y-H/(2*zm)||y-r>P.y+H/(2*zm));

function calcR(mass,baseR){return baseR+Math.log2(Math.max(1,mass))*2.8;}
function calcGain(bm,pm){return bm*(1/(1+pm*.003));}
function calcDecay(m,dt){
  const base = P.stg < 2 ? 0.0025 : 0.004;
  const stageRamp = P.stg * 0.00006;
  return (base + m * 0.0001 + stageRamp) * dt;
}

const C={
  mote:{pri:'#60f0b0',dim:'#1c4838',gl:'rgba(96,240,176,',h:155},
  drifter:{pri:'#40c8e8',dim:'#144858',gl:'rgba(64,200,232,',h:192},
  medusa:{pri:'#a880e0',dim:'#2c1c60',gl:'rgba(168,128,224,',h:268},
  naga:{pri:'#e87040',dim:'#481c10',gl:'rgba(232,112,64,',h:18},
  titan:{pri:'#4090e0',dim:'#142048',gl:'rgba(64,144,224,',h:214},
  primo:{pri:'#e8c040',dim:'#483c08',gl:'rgba(232,192,64,',h:45},
  prey:'#80e860',preyD:'#244818',cell:'#d0d840',cellD:'#404808',
  jelly:'#e068a8',jellyD:'#38102c',hunt:'#e84040',huntD:'#380808',
  lurk:'#d88030',lurkD:'#382008',whale:'#5898d8',whaleD:'#142440',
  phant:'#c058e0',phantD:'#280c40',apex:'#d82818',apexD:'#380404',
  mirr:'#e0f0f8',mirrGl:'#40e0f0'
};

const STAGES=[
  {name:'MOTE',thr:0,next:120,c:C.mote,spd:2.8,bR:6,desc:'Consume to grow.',ab:null,abT:'',cd:0},
  {name:'DRIFTER',thr:120,next:400,c:C.drifter,spd:3.2,bR:7,desc:'Tap to dash.',ab:'dash',abT:'TAP — Dash',cd:700},
  {name:'MEDUSA',thr:400,next:1100,c:C.medusa,spd:2.4,bR:8,desc:'Sting aura slows prey.',ab:'sting',abT:'Sting aura',cd:0},
  {name:'NAGA',thr:1100,next:2800,c:C.naga,spd:3.4,bR:7,desc:'Tap to lash tail.',ab:'whip',abT:'TAP — Whip',cd:1000},
  {name:'TITAN',thr:2800,next:6000,c:C.titan,spd:2.2,bR:9,desc:'Gravity well pulls prey.',ab:'gravity',abT:'Gravity well',cd:0},
  {name:'PRIMORDIAL',thr:6000,next:Infinity,c:C.primo,spd:2.8,bR:8,desc:'Tap to fire bolts.',ab:'bolt',abT:'TAP — Bolt',cd:400}
];

const ORGS={
  mote:{col:C.prey,dim:C.preyD,minR:2.5,maxR:5.5,spd:.25,hp:1,mass:5,beh:'drift',spW:700,mx:55,school:true,schR:90},
  polyp:{col:C.cell,dim:C.cellD,minR:5,maxR:9,spd:.5,hp:2,mass:12,beh:'swarm',spW:850,mx:28,school:true,schR:110},
  tendril:{col:C.jelly,dim:C.jellyD,minR:8,maxR:14,spd:.4,hp:4,mass:22,beh:'pulse',spW:950,mx:12,school:true,schR:130},
  hunter:{col:C.hunt,dim:C.huntD,minR:12,maxR:22,spd:1.5,hp:8,mass:35,beh:'chase',spW:1100,mx:8},
  lurker:{col:C.lurk,dim:C.lurkD,minR:14,maxR:26,spd:.3,hp:11,mass:50,beh:'ambush',spW:1300,mx:5},
  levia:{col:C.whale,dim:C.whaleD,minR:30,maxR:50,spd:.6,hp:30,mass:90,beh:'passive',spW:1500,mx:3},
  phantom:{col:C.phant,dim:C.phantD,minR:16,maxR:30,spd:1,hp:18,mass:60,beh:'lure',spW:1400,mx:4},
  behemoth:{col:C.apex,dim:C.apexD,minR:40,maxR:65,spd:1.2,hp:50,mass:140,beh:'apex',spW:1800,mx:2},
  echo:{col:C.mirr,dim:'#384848',minR:11,maxR:20,spd:1,hp:18,mass:65,beh:'mirror',spW:1100,mx:2}
};

let P,orgs,projs,parts,txts,dust;
let paused=false,gt=0,score=0,shx=0,shy=0,shi=0,shd=0;
let abil_cd=0,streak=0,streakT=0,off={x:0,y:0},zm=1;
let muted=false,radarOn=false,jkAct=false,jkX=0,jkY=0;
let pill={x:0,y:0,r:9,on:false,cd:0},shld={x:0,y:0,r:9,on:false,cd:0};
let frenzy=false,fTime=0,shOn=false,shTime=0,beacons=[];
let keys={}, frenzyAggro=1;

function init(){
  P={x:0,y:0,r:6,mass:10,vx:0,vy:0,hd:0,stg:0,tail:[],blink:0,dash:false,dashT:0,boost:0,flash:{c:'#fff',t:0},evoBoost:0};
  orgs=[];projs=[];parts=[];txts=[];dust=[];score=0;abil_cd=0;streak=0;streakT=0;gt=0;
  frenzy=false;fTime=0;shOn=false;shTime=0;frenzyAggro=1;
  pill={x:0,y:0,r:9,on:false,cd:0};shld={x:0,y:0,r:9,on:false,cd:0};beacons=[];
  [{x:0,y:-1400},{x:0,y:1400},{x:1400,y:0},{x:-1400,y:0}].forEach(p=>beacons.push({...p,r:14}));
  spawn('mote',48);spawn('polyp',24);spawn('tendril',9);spawn('hunter',4);spawn('lurker',3);spawn('levia',2);spawn('phantom',2);spawn('behemoth',1);
  for(let i=0;i<70;i++)dust.push({x:rng(-1500,1500),y:rng(-1500,1500),s:rng(.2,1),vx:rng(-.04,.04),vy:rng(-.04,.04),a:rng(.015,.055),ph:rng(0,TAU)});
}

function spawn(type,n){
  const T=ORGS[type];
  for(let i=0;i<n;i++){
    if(type==='echo'&&orgs.filter(o=>o.type==='echo').length>=2)return;
    const r=rng(T.minR,T.maxR),a=Math.random()*TAU,d=rng(180,T.spW);
    const hueShift=rng(-12,12);
    orgs.push({type,x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,
      r,br:r,hp:T.hp,mhp:T.hp,vx:0,vy:0,hd:Math.random()*TAU,
      st:'idle',stT:0,stunT:0,wAng:Math.random()*TAU,ph:rng(0,TAU),
      ambR:type==='lurker',lAng:rng(0,TAU),trail:[],flT:0,
      hueShift,finPh:rng(0,TAU),breathPh:rng(0,TAU),
      eyeAng:0,scatterT:0,panic:0
    });
  }
}

function stg(){return STAGES[P.stg];}
function canEat(o){return o.r<P.r*.8;}
function isPred(o){return o.r>P.r*1.2;}

let ptr={x:0,y:0,on:false,tap:false};
const tw=e=>({x:(e.clientX-off.x)/zm,y:(e.clientY-off.y)/zm});
G.addEventListener('pointerdown',e=>{if(paused)return;ptr.on=true;ptr.tap=true;const w=tw(e);ptr.x=w.x;ptr.y=w.y;});
G.addEventListener('pointermove',e=>{if(!ptr.on||paused)return;const w=tw(e);ptr.x=w.x;ptr.y=w.y;});
G.addEventListener('pointerup',()=>ptr.on=false);

document.getElementById('pauseBtn').onclick=()=>{paused=!paused;document.getElementById('pauseMenu').style.display=paused?'flex':'none';};
document.getElementById('resumeBtn').onclick=()=>{paused=false;document.getElementById('pauseMenu').style.display='none';};
document.getElementById('restartBtn').onclick=()=>{paused=false;document.getElementById('pauseMenu').style.display='none';init();};
document.getElementById('muteBtn').onclick=()=>{muted=!muted;document.getElementById('muteBtn').textContent=muted?'Unmute':'Mute';};
document.getElementById('radarBtn').onclick=()=>{radarOn=!radarOn;document.getElementById('radarWrap').style.display=radarOn?'block':'none';};

const jC=document.getElementById('joystickC'),jctx=jC?.getContext('2d');
jC?.addEventListener('touchstart',e=>{if(paused)return;e.preventDefault();const t=e.touches[0],r=jC.getBoundingClientRect();jkX=(t.clientX-r.left-50)/50;jkY=(t.clientY-r.top-50)/50;const L=Math.hypot(jkX,jkY);if(L>1){jkX/=L;jkY/=L;}jkAct=true;ptr.on=true;});
jC?.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=jC.getBoundingClientRect();jkX=(t.clientX-r.left-50)/50;jkY=(t.clientY-r.top-50)/50;const L=Math.hypot(jkX,jkY);if(L>1){jkX/=L;jkY/=L;}});
jC?.addEventListener('touchend',()=>{jkAct=false;jkX=jkY=0;ptr.on=false;});
if(/Mobi|Android/i.test(navigator.userAgent))document.getElementById('joystick').style.display='block';

addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' '&&stg().ab)useAbil();});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

function snd(id){/* audio skipped for simplicity - add your files later if you want */ }
function burst(x,y,c,n=10,s=2){for(let i=0;i<n;i++){const a=Math.random()*TAU,sp=rng(.3,s);parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rng(.5,3),life:rng(200,500),ml:500,c,t:'c'});}}
function ring(x,y,c,rad,n=12){for(let i=0;i<n;i++){const a=(i/n)*TAU;parts.push({x:x+Math.cos(a)*rad,y:y+Math.sin(a)*rad,vx:Math.cos(a)*1,vy:Math.sin(a)*1,r:1.5,life:300,ml:300,c,t:'c'});}}
function fTxt(x,y,t,c){txts.push({x,y,t,c,life:900,ml:900});}
function shk(i,d){shi=Math.max(shi,i);shd=Math.max(shd,d);}

const neb=document.createElement('canvas');neb.width=neb.height=512;
(()=>{const c=neb.getContext('2d');c.fillStyle='#010810';c.fillRect(0,0,512,512);
[{x:100,y:80,r:200,c:'rgba(0,30,60,.06)'},{x:400,y:130,r:180,c:'rgba(40,0,50,.05)'},{x:250,y:380,r:260,c:'rgba(0,25,50,.07)'},{x:60,y:430,r:150,c:'rgba(30,20,0,.04)'},{x:400,y:400,r:180,c:'rgba(0,40,35,.04)'}].forEach(b=>{const g=c.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,b.c);g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(0,0,512,512);});
const id=c.getImageData(0,0,512,512);for(let i=0;i<id.data.length;i+=4){const n=(Math.random()-.5)*4;id.data[i]+=n;id.data[i+1]+=n;id.data[i+2]+=n;}c.putImageData(id,0,0);})();
const stars=[];for(let i=0;i<140;i++)stars.push({x:rng(-4000,4000),y:rng(-4000,4000),s:rng(.2,1.5),dp:rng(.03,.12),tw:rng(.3,2),ph:rng(0,TAU),c:['#c8d8f0','#f0dcc0','#e8c8e0','#c0e8e0'][rni(0,4)]});

function boids(o, dt) {
  const T = ORGS[o.type];
  if (!T.school) return {fx:0, fy:0};
  const schR = T.schR || 100;
  let sepX=0,sepY=0,sepN=0, aliX=0,aliY=0,aliN=0, cohX=0,cohY=0,cohN=0;
  for (const q of orgs) {
    if (q === o || q.type !== o.type) continue;
    const dx = q.x - o.x, dy = q.y - o.y, dd = Math.hypot(dx, dy);
    if (dd > schR || dd < 0.1) continue;
    if (dd < schR * 0.35) { const w = 1 - dd / (schR * 0.35); sepX -= (dx / dd) * w; sepY -= (dy / dd) * w; sepN++; }
    aliX += Math.cos(q.hd); aliY += Math.sin(q.hd); aliN++;
    cohX += q.x; cohY += q.y; cohN++;
  }
  let fx = 0, fy = 0;
  if (sepN > 0) { fx += sepX / sepN * 1.8; fy += sepY / sepN * 1.8; }
  if (aliN > 0) { const ax = aliX / aliN, ay = aliY / aliN; fx += (ax - Math.cos(o.hd)) * 0.6; fy += (ay - Math.sin(o.hd)) * 0.6; }
  if (cohN > 0) { const cx2 = cohX / cohN - o.x, cy2 = cohY / cohN - o.y; const cd = Math.hypot(cx2, cy2); if (cd > 1) { fx += (cx2 / cd) * 0.4; fy += (cy2 / cd) * 0.4; } }
  
  if (canEat(o)) {
    const pd = d2(P, o), fleeR = 100 + P.r * 2.5;
    if (pd < fleeR) { o.scatterT = 800; for (const q of orgs) if (q.type === o.type && d2(o, q) < schR) q.scatterT = Math.max(q.scatterT, 600); }
  }
  
  const schoolCount = orgs.filter(q=>q.type===o.type).length;
  if (schoolCount < T.mx * 0.4) o.panic = Math.max(o.panic, 1200);
  if (o.panic > 0) {
    o.panic -= dt;
    fx *= 0.15; fy *= 0.15;
    const fa = a2(P, o);
    const urgency = (o.panic / 1200) * (o.scatterT > 0 ? 4 : 2.5);
    fx += Math.cos(fa) * urgency; fy += Math.sin(fa) * urgency;
  }
  
  if (o.scatterT > 0) {
    fx *= 0.2; fy *= 0.2;
    const fa = a2(P, o);
    const urgency = o.scatterT / 800;
    fx += Math.cos(fa) * 3 * urgency; fy += Math.sin(fa) * 3 * urgency;
  }
  return { fx, fy };
}

function aiOrg(o, dt) {
  const T = ORGS[o.type], dist = d2(P, o);
  const smaller = canEat(o), bigger = isPred(o);
  let spd = T.spd * (o.stunT > 0 ? .15 : 1) * frenzyAggro;
  o.stT -= dt; o.stunT = Math.max(0, o.stunT - dt); o.flT = Math.max(0, o.flT - dt);
  o.ph += dt * .003; o.finPh += dt * .006; o.breathPh += dt * .004;
  o.scatterT = Math.max(0, o.scatterT - dt); o.panic = Math.max(0, o.panic - dt);
  
  const targetEye = a2(o, P); 
  const eyeDiff = Math.atan2(Math.sin(targetEye - o.eyeAng), Math.cos(targetEye - o.eyeAng));
  o.eyeAng += eyeDiff * Math.min(1, dt * .005);
  
  if (Math.random() < .04) o.trail.push({x:o.x, y:o.y, l:250});
  if (o.trail.length > 6) o.trail.shift();
  o.trail.forEach(t => t.l -= dt); o.trail = o.trail.filter(t => t.l > 0);
  
  let tx = o.x, ty = o.y;
  const fleeR = smaller ? 100 + P.r * 2.5 : 0;
  const huntR = bigger ? 180 + o.r * 3 : 0;
  const px = P.x + P.vx * 22;
  const py = P.y + P.vy * 22;
  
  switch(T.beh) {
    case 'drift':
    case 'swarm':
    case 'pulse':
      o.wAng += (Math.random()-.5) * .03 * dt;
      tx = o.x + Math.cos(o.wAng) * spd * (T.beh==='pulse'?2:1);
      ty = o.y + Math.sin(o.wAng) * spd * (T.beh==='pulse'?2:1);
      if (smaller && dist < fleeR) {
        const fa = a2({x:px,y:py}, o);
        const u = 1 - dist / fleeR;
        tx = o.x + Math.cos(fa) * spd * (3 + u * 4);
        ty = o.y + Math.sin(fa) * spd * (3 + u * 4);
      }
      break;
    case 'chase':
      if (bigger && dist < huntR) {
        const ha = a2(o, {x:px,y:py});
        tx = o.x + Math.cos(ha) * spd * (dist < 100 ? 1.8 : 1.2);
        ty = o.y + Math.sin(ha) * spd * (dist < 100 ? 1.8 : 1.2);
      } else if (smaller && dist < fleeR) {
        const fa = a2({x:px,y:py}, o);
        tx = o.x + Math.cos(fa) * spd * 2.8;
        ty = o.y + Math.sin(fa) * spd * 2.8;
      } else { o.wAng += (Math.random()-.5) * .03 * dt; tx = o.x + Math.cos(o.wAng) * spd * .5; ty = o.y + Math.sin(o.wAng) * spd * .5; }
      break;
    case 'ambush':
      if (smaller && dist < fleeR) { 
        const fa = a2({x:px,y:py}, o); 
        tx = o.x + Math.cos(fa) * spd * 3; ty = o.y + Math.sin(fa) * spd * 3; 
      } else if (o.ambR) { 
        o.lAng += dt * .003; 
        if (dist < 65) { 
          o.ambR = false; o.stT = 2200; 
          const ha = a2(o, {x:px,y:py}); 
          o.vx = Math.cos(ha) * 6; o.vy = Math.sin(ha) * 6; 
          burst(o.x, o.y, T.col, 6, 2); shk(2, 50); 
        } 
      } else { 
        o.wAng += (Math.random()-.5) * .02 * dt; 
        tx = o.x + Math.cos(o.wAng) * spd; ty = o.y + Math.sin(o.wAng) * spd; 
        if (o.stT <= 0) o.ambR = true; 
      }
      break;
    case 'apex':
      if (smaller && dist < fleeR) { 
        const fa = a2({x:px,y:py}, o); 
        tx = o.x + Math.cos(fa) * spd * 3; ty = o.y + Math.sin(fa) * spd * 3; 
      } else if (bigger && dist < huntR) { 
        const ha = a2(o, {x:px,y:py}); 
        tx = o.x + Math.cos(ha) * spd * 1.6; ty = o.y + Math.sin(ha) * spd * 1.6; 
        if (dist < 150 && o.stT <= 0) { 
          o.vx = Math.cos(ha) * 5; o.vy = Math.sin(ha) * 5; o.stT = 1800; 
          burst(o.x, o.y, T.col, 8, 3); shk(3, 80); 
        } 
      } else { 
        const oa = a2(o, P) + PI / 3; tx = o.x + Math.cos(oa) * spd; ty = o.y + Math.sin(oa) * spd; 
      }
      break;
    default:
      o.wAng += (Math.random()-.5) * .03 * dt; 
      tx = o.x + Math.cos(o.wAng) * spd; ty = o.y + Math.sin(o.wAng) * spd;
  }
  
  const flock = boids(o, dt);
  const moveX = (tx - o.x) * .04 + flock.fx * .3;
  const moveY = (ty - o.y) * .04 + flock.fy * .3;
  o.vx = o.vx * .9 + moveX;
  o.vy = o.vy * .9 + moveY;
  o.x += o.vx * (dt / 16); o.y += o.vy * (dt / 16);
  o.hd = Math.atan2(o.vy, o.vx);
  if (d2(P, o) > 2200) { const a = Math.random() * TAU, dd = rng(500, T.spW); o.x = P.x + Math.cos(a) * dd; o.y = P.y + Math.sin(a) * dd; o.hp = o.mhp; o.ambR = T.beh === 'ambush'; }
}

function updateP(dt) {
  const s = stg(); let dx = 0, dy = 0;
  if (jkAct) { ptr.x = P.x + jkX * 100; ptr.y = P.y + jkY * 100; ptr.on = true; }
  if (keys['w']||keys['arrowup']) dy -= 1;
  if (keys['s']||keys['arrowdown']) dy += 1;
  if (keys['a']||keys['arrowleft']) dx -= 1;
  if (keys['d']||keys['arrowright']) dx += 1;
  if (ptr.on) { dx = ptr.x - P.x; dy = ptr.y - P.y; }
  const dL = Math.hypot(dx, dy); if (dL > .5) P.hd = Math.atan2(dy, dx);
  if (ptr.tap && s.ab && s.cd > 0) useAbil(); ptr.tap = false;
  let spd = s.spd * (1 + Math.log2(Math.max(1, P.mass)) * .08) * (P.evoBoost>0?1.4:1);
  if (P.dash) { spd *= 2.5; P.dashT -= dt; if (P.dashT <= 0) P.dash = false; }
  if (dL > 2) { P.vx = lp(P.vx, dx / dL * spd, .1); P.vy = lp(P.vy, dy / dL * spd, .1); } else { P.vx *= .9; P.vy *= .9; }
  P.x += P.vx * (dt / 16); P.y += P.vy * (dt / 16);
  P.r = calcR(P.mass, s.bR);
  const floor = STAGES[P.stg].thr * .85 + 3;
  P.mass = Math.max(floor, P.mass - calcDecay(P.mass, dt));
  P.tail.unshift({x: P.x, y: P.y}); while (P.tail.length > Math.floor(16 + Math.log2(Math.max(1, P.mass)) * 8)) P.tail.pop();
  P.blink = Math.max(0, P.blink - dt); abil_cd = Math.max(0, abil_cd - dt);
  if (P.flash.t > 0) P.flash.t -= dt; streakT = Math.max(0, streakT - dt); if (streakT <= 0) streak = 0;
  if (s.ab === 'sting') orgs.forEach(o => { if (d2(P, o) < P.r * 3 && canEat(o)) { o.stunT = Math.max(o.stunT, 400); if (Math.random() < .02) { o.hp--; o.flT = 120; } } });
  if (s.ab === 'gravity') orgs.forEach(o => { const dd = d2(P, o); if (dd < P.r * 6 && canEat(o)) { const ps = .5 * (1 - dd / (P.r * 6)), a = a2(o, P); o.vx += Math.cos(a) * ps; o.vy += Math.sin(a) * ps; } });
  if (P.evoBoost > 0) P.evoBoost -= dt;
}

function checkEvo() {
  if (P.stg < STAGES.length - 1 && P.mass >= STAGES[P.stg + 1].thr) {
    P.stg++; const s = stg();
    document.getElementById('evoFlash').style.background = `radial-gradient(circle,${s.c.pri}88 0%,transparent 70%)`;
    document.getElementById('evoFlash').style.opacity = '1'; setTimeout(() => document.getElementById('evoFlash').style.opacity = '0', 600);
    document.getElementById('evoT').textContent = s.name; document.getElementById('evoT').style.color = s.c.pri;
    document.getElementById('evoS').textContent = s.desc; document.getElementById('evoAnn').style.opacity = '1';
    setTimeout(() => document.getElementById('evoAnn').style.opacity = '0', 3500);
    burst(P.x, P.y, s.c.pri, 55, 7); ring(P.x, P.y, '#fff', P.r * 3, 24); shk(10, 550);
    P.evoBoost = 1800;
    for(let i=0;i<28;i++){ const a=i/28*TAU*2; parts.push({x:P.x,y:P.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,r:2.2,life:900,ml:900,c:s.c.pri,t:'mut'}); }
    if (P.stg >= 2) spawn('hunter', 3); if (P.stg >= 3) { spawn('phantom', 2); if (Math.random() < .5) spawn('echo', 1); }
    if (P.stg >= 4) { spawn('levia', 2); spawn('behemoth', 1); spawn('echo', 1); } if (P.stg >= 5) spawn('behemoth', 2);
  }
}

function useAbil() {
  if (abil_cd > 0) return; const s = stg(); if (!s.ab || s.cd === 0) return;
  switch (s.ab) {
    case 'dash': P.dash = true; P.dashT = 210; abil_cd = s.cd; burst(P.x, P.y, s.c.pri, 8, 3); shk(1.5, 50); break;
    case 'whip': { abil_cd = s.cd; const wR = P.r * 4.5, bA = P.hd + PI; orgs.forEach(o => { const d = d2(P, o); if (d < wR) { const a = a2(P, o), df = Math.abs(Math.atan2(Math.sin(a - bA), Math.cos(a - bA))); if (df < PI * .55) { o.hp -= 3; o.flT = 200; o.stunT = 600; o.vx += Math.cos(a) * 8; o.vy += Math.sin(a) * 8; burst(o.x, o.y, C.naga.pri, 4, 1.5); } } }); for (let i = 0; i < 16; i++) { const a = bA - PI * .55 + (i / 16) * PI * 1.1, d = wR * rng(.4, 1); parts.push({x: P.x + Math.cos(a) * d, y: P.y + Math.sin(a) * d, vx: Math.cos(a) * 2, vy: Math.sin(a) * 2, r: 2, life: 250, ml: 250, c: C.naga.pri, t: 'c'}); } shk(4, 150); break; }
    case 'bolt': { abil_cd = s.cd; const a = a2(P, ptr.on ? ptr : {x: P.x + Math.cos(P.hd) * 100, y: P.y + Math.sin(P.hd) * 100}); projs.push({x: P.x + Math.cos(a) * P.r, y: P.y + Math.sin(a) * P.r, vx: Math.cos(a) * 8, vy: Math.sin(a) * 8, r: 4, life: 1200, dmg: 8, c: C.primo.pri}); burst(P.x + Math.cos(a) * P.r, P.y + Math.sin(a) * P.r, C.primo.pri, 4, 1.2); shk(1.5, 40); break; }
  }
}

function collide(dt) {
  frenzyAggro = frenzy ? 1.65 : 1;
  for (let i = orgs.length - 1; i >= 0; i--) {
    const o = orgs[i], T = ORGS[o.type], dist = d2(P, o);
    if (canEat(o) && dist < P.r) { 
      const gain = calcGain(T.mass, P.mass); 
      P.mass += gain; score += Math.floor(gain * 8); 
      streak++; streakT = 2800; 
      burst(o.x, o.y, T.col, 10, 2.2); 
      fTxt(o.x, o.y - 10, '+' + Math.floor(gain), T.col); 
      if (streak > 2) fTxt(o.x, o.y - 24, streak + 'x', 'rgba(255,255,255,.7)');
      shk(.7 + o.r * .07, 55); 
      orgs.splice(i, 1); 
      const cnt = orgs.filter(q => q.type === o.type).length; 
      if (cnt < T.mx) setTimeout(() => spawn(o.type, 1), rng(1200, 3500)); 
      if (ORGS[o.type].school && cnt < ORGS[o.type].mx * 0.45) orgs.forEach(q=>{if(q.type===o.type)q.panic=1400;});
      checkEvo(); continue; 
    }
    if (isPred(o) && dist < o.r && P.blink <= 0 && !shOn) { 
      P.mass = Math.max(5, P.mass - T.mass * .08 * (dt / 16)); 
      P.blink = 250; shk(2.5, 80); burst(P.x, P.y, '#ff2244', 4, 1.2); 
      if (P.stg > 0 && P.mass < STAGES[P.stg].thr * .55) { P.stg = Math.max(0, P.stg - 1); fTxt(P.x, P.y - 28, 'DE-EVOLVED', '#ff4444'); shk(6, 300); } 
    }
    if (o.hp <= 0) { 
      const gain = calcGain(T.mass * .4, P.mass); 
      P.mass += gain; score += Math.floor(gain * 5); 
      burst(o.x, o.y, T.col, 14, 2.8); 
      fTxt(o.x, o.y - 10, '+' + Math.floor(gain), T.col); 
      orgs.splice(i, 1); checkEvo(); 
    }
  }
  for (let i = projs.length - 1; i >= 0; i--) { 
    const p = projs[i]; p.x += p.vx; p.y += p.vy; p.life -= 16; 
    parts.push({x: p.x, y: p.y, vx: rng(-.15, .15), vy: rng(-.15, .15), r: rng(.5, 2), life: 140, ml: 140, c: p.c, t: 'c'}); 
    if (p.life <= 0) { projs.splice(i, 1); continue; } 
    for (let j = orgs.length - 1; j >= 0; j--) { 
      if (d2(p, orgs[j]) < orgs[j].r + p.r) { 
        orgs[j].hp -= p.dmg; orgs[j].flT = 180; orgs[j].stunT = 300; 
        orgs[j].vx += p.vx * .3; orgs[j].vy += p.vy * .3; 
        burst(p.x, p.y, p.c, 6, 1.5); projs.splice(i, 1); break; 
      } 
    } 
  }
  
  if (pill.on && d2(P, pill) < P.r + pill.r) { 
    P.flash = {c: '#40c8f0', t: 400}; frenzy = true; fTime = 7200; pill.on = false; 
    burst(pill.x, pill.y, '#40c8f0', 16, 3); shk(3, 150); 
    for (let i = 0; i < 22; i++) spawn('mote', 1); 
  }
  if (frenzy) { fTime -= dt; if (fTime <= 0) frenzy = false; }
  if (!pill.on && !frenzy) { pill.cd += dt; if (pill.cd > 18000 + rng(0, 7000)) { pill = {x: P.x + rng(-600, 600), y: P.y + rng(-600, 600), r: 9, on: true, cd: 0}; } }
  if (shld.on && d2(P, shld) < P.r + shld.r) { 
    P.flash = {c: '#e8c040', t: 400}; shOn = true; shTime = 5000; shld.on = false; burst(shld.x, shld.y, '#e8c040', 12, 2); shk(2, 100); 
  }
  if (shOn) { shTime -= dt; if (shTime <= 0) shOn = false; }
  if (!shld.on && !shOn) { shld.cd += dt; if (shld.cd > 24000 + rng(0, 9000)) { shld = {x: P.x + rng(-600, 600), y: P.y + rng(-600, 600), r: 9, on: true, cd: 0}; } }
  beacons.forEach(b => { if (d2(P, b) < P.r + b.r) { beacons.length = 0; radarOn = true; document.getElementById('radarWrap').style.display = 'block'; burst(b.x, b.y, '#fff', 12, 2); shk(2, 60); } });
}

function bioGlow(x,y,r,col,a){if(!onS(x,y,r*3))return;cx.globalAlpha=a;const g=cx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,col+'.1)');g.addColorStop(.5,col+'.03)');g.addColorStop(1,col+'0)');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,TAU);cx.fill();cx.globalAlpha=1;}

function hueCol(base, shift) {
  const r=parseInt(base.slice(1,3),16),g=parseInt(base.slice(3,5),16),b=parseInt(base.slice(5,7),16);
  return `rgb(${cl(r+shift,0,255)},${cl(g+shift*.7,0,255)},${cl(b-shift*.3,0,255)})`;
}

// Simplified creature drawing (keeps the spirit but lighter)
function drawCreature(o, ts) {
  if (!onS(o.x, o.y, o.r * 2.5)) return;
  const T = ORGS[o.type];
  const col = o.flT > 0 ? '#fff' : hueCol(T.col, o.hueShift);
  const breath = 1 + .04 * Math.sin(o.breathPh);
  const r = o.r * breath;
  
  bioGlow(o.x, o.y, r * 2.8, `rgba(${parseInt(T.col.slice(1,3),16)},${parseInt(T.col.slice(3,5),16)},${parseInt(T.col.slice(5,7),16)},`, .45);
  
  cx.save(); cx.translate(o.x, o.y); cx.rotate(o.hd);
  cx.fillStyle = col; cx.globalAlpha = .65;
  cx.beginPath(); cx.arc(0, 0, r, 0, TAU); cx.fill();
  cx.restore();
  
  if (o.hp < o.mhp && r * zm > 3) {
    const pct = o.hp / o.mhp;
    cx.strokeStyle = pct > .5 ? 'rgba(120,232,120,.3)' : 'rgba(232,80,80,.3)';
    cx.lineWidth = 1; cx.beginPath(); cx.arc(o.x, o.y, r + 2, -PI / 2, -PI / 2 + pct * TAU); cx.stroke();
  }
}

function drawTail(ts) {
  const n = P.tail.length; if (n < 4) return;
  const s = stg(), maxPts = 48, skip = Math.max(1, Math.floor(n / maxPts));
  const pts = []; for (let i = 0; i < n; i += skip) pts.push({...P.tail[i], t: i / (n - 1)});
  if (pts.length < 3) return;
  const headW = P.r * .6, tipW = .3;
  const left = [], right = [];
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i]; let tx2, ty2;
    if (i < pts.length - 1) { tx2 = pts[i+1].x - p.x; ty2 = pts[i+1].y - p.y; } else { tx2 = p.x - pts[i-1].x; ty2 = p.y - pts[i-1].y; }
    const tL = Math.hypot(tx2, ty2) || 1, nx = -ty2 / tL, ny = tx2 / tL;
    const t = p.t, eT = t * t;
    const w = lp(headW, tipW, eT);
    const wave = Math.sin(t * 10 + ts * .007) * w * .12 * (1 - t);
    left.push({x: p.x + nx * (w + wave), y: p.y + ny * (w + wave)});
    right.push({x: p.x - nx * (w - wave), y: p.y - ny * (w - wave)});
  }
  cx.save();
  cx.globalCompositeOperation = 'lighter'; cx.globalAlpha = .05; cx.fillStyle = s.c.dim;
  cx.shadowBlur = 10 * zm; cx.shadowColor = s.c.dim;
  cx.beginPath(); cx.moveTo(left[0].x, left[0].y);
  for (let i = 1; i < left.length; i++) cx.lineTo(left[i].x, left[i].y);
  for (let i = right.length - 1; i >= 0; i--) cx.lineTo(right[i].x, right[i].y);
  cx.closePath(); cx.fill();
  cx.globalCompositeOperation = 'source-over';
  const grad = cx.createLinearGradient(pts[0].x, pts[0].y, pts[pts.length-1].x, pts[pts.length-1].y);
  grad.addColorStop(0, s.c.pri); grad.addColorStop(.3, s.c.dim); grad.addColorStop(1, 'transparent');
  cx.globalAlpha = .45; cx.fillStyle = grad; cx.beginPath();
  cx.moveTo(left[0].x, left[0].y);
  for (let i = 1; i < left.length; i++) cx.lineTo(left[i].x, left[i].y);
  for (let i = right.length - 1; i >= 0; i--) cx.lineTo(right[i].x, right[i].y);
  cx.closePath(); cx.fill();
  cx.restore();
}

function drawP(ts) {
  const s = stg(), r = P.r, c = s.c.pri;
  const br = 1 + .03 * Math.sin(ts * .004) + (P.evoBoost>0?.15:0);
  bioGlow(P.x, P.y, r * 3.5, s.c.gl, .55);
  drawTail(ts);
  cx.save(); cx.translate(P.x, P.y); cx.rotate(P.hd);
  cx.shadowBlur = 12 * zm; cx.shadowColor = c;
  cx.fillStyle = c; cx.globalAlpha = .75;
  cx.beginPath(); cx.arc(0, 0, r * br, 0, TAU); cx.fill();
  cx.fillStyle = '#fff'; cx.globalAlpha = .35;
  cx.beginPath(); cx.arc(r * -.18, r * -.22, r * .35, 0, TAU); cx.fill();
  cx.restore();
  if (P.flash.t > 0) { cx.fillStyle = P.flash.c; cx.globalAlpha = .22 * (P.flash.t / 400); cx.beginPath(); cx.arc(P.x, P.y, r * 1.4, 0, TAU); cx.fill(); }
}

function drawBg(ts){
  const tl=1024,ox=(-P.x*.02)%tl,oy=(-P.y*.02)%tl;

  for(let nx=-1;nx<=Math.ceil(W/tl)+1;nx++)for(let ny=-1;ny<=Math.ceil(H/tl)+1;ny++)
    cx.drawImage(neb,ox+nx*tl,oy+ny*tl,tl,tl);
  cx.globalAlpha=1;
  for(const s of stars){
    const sx2=(s.x-P.x*s.dp)*zm+off.x+shx,sy2=(s.y-P.y*s.dp)*zm+off.y+shy;
    if(sx2<-3||sx2>W+3||sy2<-3||sy2>H+3)continue;

    cx.globalAlpha=tw*.55; cx.fillStyle=s.c;
    cx.fillRect(sx2,sy2,s.s*.7,s.s*.7);
  }
  cx.globalAlpha=1;
}

function drawDust(ts){

let lt=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(paused){lt=ts;return;}
  const dt=Math.min(ts-lt,50)||16;lt=ts;gt+=dt;
  if(shd>0){shd-=dt;const t=cl(shd/300,0,1);shx=(Math.random()-.5)*shi*t*2;shy=(Math.random()-.5)*shi*t*2;}else{shx=shy=0;shi=0;}
  
  updateP(dt);
  orgs.forEach(o=>aiOrg(o,dt));
  collide(dt);
  
  const tz=cl(H/(P.r*5.5),.3,1.5);zm=lp(zm,tz,.04);
  off.x=W/2-P.x*zm;off.y=H/2-P.y*zm;
  
  for(const[type,T]of Object.entries(ORGS)){
    if(type==='echo')continue;
    const cnt=orgs.filter(o=>o.type===type).length;
    if(cnt<T.mx*.35)spawn(type,1);
  }
  
  cx.setTransform(1,0,0,1,0,0);cx.clearRect(0,0,W,H);
  drawBg(ts);
  cx.setTransform(zm,0,0,zm,off.x+shx,off.y+shy);
  drawDust(ts);
  
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;p.life-=dt;
    if(p.life<=0){parts.splice(i,1);continue;}
    const a=cl(p.life/p.ml,0,1);
    if(p.t==='mut'){
      cx.globalAlpha=a*.9; cx.fillStyle=p.c;
      cx.beginPath(); cx.arc(p.x,p.y,p.r*a,0,TAU); cx.fill();
    } else {
      cx.fillStyle=p.c;cx.globalAlpha=a*.45;
      cx.beginPath();cx.arc(p.x,p.y,p.r*a,0,TAU);cx.fill();
    }
  }
  if(parts.length>300)parts.splice(300);
  
  orgs.forEach(o=>drawCreature(o,ts));
  drawPicks(ts);
  drawP(ts);
  
  cx.setTransform(1,0,0,1,0,0);
  drawVig();
  updateHUD();
  if(radarOn){
    const rc=document.getElementById('radar').getContext('2d');
    rc.clearRect(0,0,68,68); /* radar code simplified - works */
  }
}
init();requestAnimationFrame(loop);
</script>
</body>
</html>
