// ═══════════════════════════════════════════
// DRAW BACKGROUND
// ═══════════════════════════════════════════
function drawBg(ts) {
  const tl=1024, ox=(-P.x*.02)%tl, oy=(-P.y*.02)%tl;
  cx.globalAlpha=.55;
  for (let nx=-1; nx<=Math.ceil(W/tl)+1; nx++)
    for (let ny=-1; ny<=Math.ceil(H/tl)+1; ny++)
      cx.drawImage(nebCanvas, ox+nx*tl, oy+ny*tl, tl, tl);
  cx.globalAlpha=1;

  // Parallax stars
  for (const s of stars) {
    const sx=(s.x-P.x*s.dp)*zm+off.x+shx, sy=(s.y-P.y*s.dp)*zm+off.y+shy;
    if (sx<-4||sx>W+4||sy<-4||sy>H+4) continue;
    const twinkle=.18+.82*(.5+.5*Math.sin(ts*s.tw*.001+s.ph));
    cx.globalAlpha=twinkle*.5;
    cx.fillStyle=s.c;
    if (s.s>1.05) { cx.fillRect(sx-s.s,sy-.18,s.s*2,.36); cx.fillRect(sx-.18,sy-s.s,.36,s.s*2); }
    cx.fillRect(sx,sy,s.s*.6,s.s*.6);
  }
  cx.globalAlpha=1;
}

// ═══════════════════════════════════════════
// DRAW GRID + LANDMARKS
// ═══════════════════════════════════════════
function drawGrid() {
  // Fine grid
  cx.lineWidth=.22;
  for (let i=-18;i<=18;i++) for (let j=-18;j<=18;j++) {
    const x=i*50,y=j*50; if(!onScr(x,y,55))continue;
    const dd=Math.hypot(x+25-P.x,y+25-P.y), f=Math.max(0,1-dd/360); if(f<.01)continue;
    cx.strokeStyle=`rgba(14,26,44,${.055*f})`; cx.beginPath(); cx.rect(x,y,50,50); cx.stroke();
  }
  // Major grid
  cx.lineWidth=.45;
  for (let i=-9;i<=9;i++) for (let j=-9;j<=9;j++) {
    const x=i*200,y=j*200; if(!onScr(x,y,280))continue;
    const dd=Math.hypot(x+100-P.x,y+100-P.y), f=Math.max(0,1-dd/850);
    cx.strokeStyle=`rgba(20,38,60,${.1*f+.012})`; cx.beginPath(); cx.rect(x,y,200,200); cx.stroke();
  }
  // Landmarks
  for (const lm of LANDMARKS) {
    if (!onScr(lm.x,lm.y,lm.s*6)) continue;
    const dd=Math.hypot(lm.x-P.x,lm.y-P.y); if(dd>720)continue;
    const fade=Math.max(0,1-dd/720);
    for (const rk of lm.rocks) {
      cx.globalAlpha=fade*.07;
      cx.fillStyle=`rgba(12,20,32,1)`;
      cx.beginPath(); cx.ellipse(lm.x+Math.cos(rk.a)*lm.s*rk.d,lm.y+Math.sin(rk.a)*lm.s*rk.d,lm.s*rk.r,lm.s*rk.r*.6,rk.a,0,TAU); cx.fill();
    }
    cx.globalAlpha=1;
  }
  // Distance rings
  cx.strokeStyle='rgba(18,34,50,.038)'; cx.lineWidth=.45;
  for (let ri=1;ri<=4;ri++) { const rr=ri*400; if(!onScr(0,0,rr+60))continue; cx.beginPath();cx.arc(0,0,rr,0,TAU);cx.stroke(); }
}

// ═══════════════════════════════════════════
// DRAW DUST
// ═══════════════════════════════════════════
function drawDust(ts) {
  while (dust.length<55) dust.push({x:P.x+rng(-W/zm,W/zm),y:P.y+rng(-H/zm,H/zm),s:rng(.15,.8),vx:rng(-.03,.03),vy:rng(-.03,.03),a:rng(.009,.04),ph:rng(0,TAU)});
  for (const d of dust) {
    d.x+=d.vx; d.y+=d.vy;
    if (!onScr(d.x,d.y,5)) { d.x=P.x+rng(-W/zm,W/zm); d.y=P.y+rng(-H/zm,H/zm); }
    cx.fillStyle=`rgba(155,196,238,${d.a*(.5+.5*Math.sin(ts*.001+d.ph))})`;
    cx.beginPath(); cx.arc(d.x,d.y,d.s,0,TAU); cx.fill();
  }
}

// ═══════════════════════════════════════════
// DRAW ORGANISMS (NPCs)  — improved detail
// ═══════════════════════════════════════════
function drawCreature(o, ts) {
  const T=ORGS[o.type]; if(!onScr(o.x,o.y,o.r*2.8))return;
  const dd=dst(P,o), fl=o.flT>0;
  const col = fl ? '#fff' : T.col;
  const dim = fl ? '#888' : T.dim;
  const breath = 1 + .038*Math.sin(o.breathPh);
  const r = o.r * breath;
  const gl = `rgba(${parseInt(T.col.slice(1,3),16)},${parseInt(T.col.slice(3,5),16)},${parseInt(T.col.slice(5,7),16)},`;

  bioGlow(o.x, o.y, r*2.8, gl, .28+.08*Math.sin(o.breathPh*2));

  // Trail
  for (const t of o.trail) {
    cx.fillStyle=dim; cx.globalAlpha=(t.l/250)*.05;
    cx.beginPath(); cx.arc(t.x,t.y,r*.18*(t.l/250),0,TAU); cx.fill();
  }

  // Stun rings
  if (o.stunT>0) {
    cx.strokeStyle='rgba(255,248,160,.14)'; cx.lineWidth=.5;
    for (let si=0;si<3;si++) { const sa=ts*.01+si*TAU/3; cx.beginPath(); cx.arc(o.x,o.y,r*1.12,sa,sa+.22); cx.stroke(); }
  }

  cx.save();
  cx.translate(o.x, o.y);
  cx.rotate(o.hd);
  cx.shadowBlur=5*zm; cx.shadowColor=dim;

  switch (o.type) {

    case 'echo': {
      cx.rotate(-o.hd);
      cx.globalCompositeOperation='lighter';
      for (let i=0;i<3;i++) { cx.globalAlpha=.05; cx.fillStyle=`hsla(${185+i*40},75%,58%,.1)`; cx.beginPath(); cx.arc(Math.sin(ts*.008+i)*4,Math.cos(ts*.008+i)*4,r*(1.1+i*.17),0,TAU); cx.fill(); }
      cx.globalCompositeOperation='source-over';
      cx.fillStyle='rgba(215,238,248,.55)'; cx.globalAlpha=.65;
      cx.beginPath();
      for (let a=0;a<TAU;a+=.18) { const rr=r+Math.sin(a*4+ts*.01)*1.8+Math.sin(a*7+ts*.006)*1.2; cx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr); }
      cx.closePath(); cx.fill();
      // Mirror shimmer
      cx.strokeStyle='rgba(64,220,240,.35)'; cx.lineWidth=.6; cx.globalAlpha=.4+.15*Math.sin(ts*.007);
      cx.beginPath(); cx.arc(0,0,r*.92,0,TAU); cx.stroke();
      // Eye
      const ea=o.eyeAng-o.hd;
      cx.fillStyle='rgba(64,220,240,.9)'; cx.globalAlpha=.8; cx.beginPath(); cx.arc(Math.cos(ea)*r*.3,Math.sin(ea)*r*.3,r*.14,0,TAU); cx.fill();
      cx.fillStyle='#012'; cx.beginPath(); cx.arc(Math.cos(ea)*r*.36,Math.sin(ea)*r*.36,r*.06,0,TAU); cx.fill();
      break; }

    case 'bloom': {
      const pu=.42+.2*Math.sin(o.breathPh*1.3);
      cx.fillStyle=col; cx.globalAlpha=pu*.08; cx.beginPath(); cx.arc(0,0,r*1.8,0,TAU); cx.fill();
      if (o.lobes) for (const lb of o.lobes) {
        const lbr=r*lb.r*(1+.07*Math.sin(o.breathPh+lb.ph));
        const lx=Math.cos(lb.a)*r*lb.d, ly=Math.sin(lb.a)*r*lb.d;
        cx.fillStyle=col; cx.globalAlpha=pu*.35; cx.beginPath(); cx.arc(lx,ly,lbr,0,TAU); cx.fill();
        cx.fillStyle='rgba(255,255,255,.1)'; cx.globalAlpha=pu*.6; cx.beginPath(); cx.arc(lx*1.1,ly*1.1,lbr*.24,0,TAU); cx.fill();
      }
      cx.fillStyle='rgba(255,255,255,.22)'; cx.globalAlpha=pu*.9; cx.beginPath(); cx.arc(0,0,r*.22,0,TAU); cx.fill();
      break; }

    case 'mote': {
      cx.fillStyle=col; cx.globalAlpha=.42;
      cx.beginPath(); cx.arc(0,0,r,0,TAU); cx.fill();
      cx.strokeStyle=col; cx.lineWidth=.4; cx.globalAlpha=.5;
      cx.beginPath(); cx.arc(0,0,r,0,TAU); cx.stroke();
      // Tiny nucleus
      cx.fillStyle=dim; cx.globalAlpha=.3; cx.beginPath(); cx.arc(-r*.06,-r*.06,r*.28,0,TAU); cx.fill();
      cx.fillStyle='rgba(255,255,255,.35)'; cx.globalAlpha=.6; cx.beginPath(); cx.arc(-r*.04,-r*.08,r*.1,0,TAU); cx.fill();
      break; }

    case 'polyp': {
      cx.fillStyle=col; cx.globalAlpha=.45;
      for (let i=0;i<3;i++) { const pa=(i/3)*TAU+ts*.002; cx.beginPath(); cx.arc(Math.cos(pa)*r*.3,Math.sin(pa)*r*.3,r*.65,0,TAU); cx.fill(); }
      cx.fillStyle='rgba(255,255,255,.15)'; cx.globalAlpha=.4; cx.beginPath(); cx.arc(0,0,r*.2,0,TAU); cx.fill();
      break; }

    case 'tendril': {
      cx.fillStyle=col; cx.globalAlpha=.38;
      cx.beginPath(); cx.moveTo(-r*.85,r*.1); cx.quadraticCurveTo(-r*.9,-r*.72,0,-r); cx.quadraticCurveTo(r*.9,-r*.72,r*.85,r*.1); cx.quadraticCurveTo(r*.4,r*.26,0,r*.14); cx.quadraticCurveTo(-r*.4,r*.26,-r*.85,r*.1); cx.fill();
      // Tendrils
      cx.strokeStyle=col; cx.lineWidth=.55; cx.globalAlpha=.18;
      for (let t=0;t<5;t++) {
        const bx=(t-2)*r*.28; let tx=bx,ty=r*.12;
        cx.beginPath(); cx.moveTo(bx,r*.12);
        for (let seg=0;seg<5;seg++) { tx+=Math.sin(o.finPh+t*1.1+seg*.7)*r*.1; ty+=r*.22; cx.lineTo(tx,ty); }
        cx.stroke();
      }
      break; }

    case 'hunter': {
      cx.fillStyle=col; cx.globalAlpha=.52;
      cx.beginPath(); cx.moveTo(r*1.22,0); cx.quadraticCurveTo(r*.9,-r*.3,r*.3,-r*.34); cx.lineTo(-r*.5,-r*.28); cx.quadraticCurveTo(-r*.88,0,-r*.5,r*.28); cx.lineTo(r*.3,r*.34); cx.quadraticCurveTo(r*.9,r*.3,r*1.22,0); cx.fill();
      // Tail fork
      cx.fillStyle=dim; cx.globalAlpha=.3;
      cx.beginPath(); cx.moveTo(-r*.86,0); cx.lineTo(-r*1.12,-r*.22); cx.lineTo(-r*.9,0); cx.fill();
      cx.beginPath(); cx.moveTo(-r*.86,0); cx.lineTo(-r*1.12,r*.22); cx.lineTo(-r*.9,0); cx.fill();
      // Dorsal
      cx.globalAlpha=.28; cx.beginPath(); cx.moveTo(r*.08,-r*.34); cx.lineTo(r*.22+Math.sin(o.finPh)*r*.03,-r*.58); cx.lineTo(r*.4,-r*.3); cx.fill();
      // Eye
      if (r*zm>5) { const ea=o.eyeAng-o.hd; cx.fillStyle='#fff'; cx.globalAlpha=.8; cx.beginPath(); cx.arc(r*.52,-r*.07,r*.1,0,TAU); cx.fill(); cx.fillStyle='#300'; cx.globalAlpha=1; cx.beginPath(); cx.arc(r*.53,-r*.07,r*.05,0,TAU); cx.fill(); }
      break; }

    case 'lurker': {
      cx.fillStyle=col; cx.globalAlpha=o.ambR?.3:.45;
      cx.beginPath(); cx.moveTo(r*.42,0); cx.quadraticCurveTo(r*.6,-r*.4,r*.08,-r*.62); cx.quadraticCurveTo(-r*.4,-r*.78,-r*.68,-r*.25); cx.quadraticCurveTo(-r*.92,0,-r*.68,r*.25); cx.quadraticCurveTo(-r*.4,r*.78,r*.08,r*.62); cx.quadraticCurveTo(r*.6,r*.4,r*.42,0); cx.fill();
      // Lure
      if (o.ambR) {
        const lx=r*.62+Math.sin(o.lAng)*r*.18, ly=-r*.52+Math.cos(o.lAng)*r*.1;
        cx.strokeStyle='rgba(255,255,255,.1)'; cx.lineWidth=.3; cx.globalAlpha=.25;
        cx.beginPath(); cx.moveTo(r*.1,-r*.6); cx.quadraticCurveTo(r*.36,-r*.82,lx,ly); cx.stroke();
        cx.fillStyle='#6AE856'; cx.globalAlpha=.45+.35*Math.sin(ts*.008);
        cx.shadowBlur=10*zm; cx.shadowColor='#6AE856';
        cx.beginPath(); cx.arc(lx,ly,2.5,0,TAU); cx.fill();
      }
      break; }

    case 'levia': {
      cx.fillStyle=col; cx.globalAlpha=.4;
      cx.beginPath(); cx.moveTo(r*1.12,0); cx.quadraticCurveTo(r,-r*.42,r*.22,-r*.5); cx.quadraticCurveTo(-r*.32,-r*.52,-r*.62,-r*.28); cx.quadraticCurveTo(-r*1.02,0,-r*.62,r*.28); cx.quadraticCurveTo(-r*.32,r*.52,r*.22,r*.5); cx.quadraticCurveTo(r,r*.42,r*1.12,0); cx.fill();
      cx.fillStyle=dim; cx.globalAlpha=.28;
      cx.beginPath(); cx.moveTo(-r*.97,0); cx.lineTo(-r*1.32,-r*.3); cx.lineTo(-r*1.08,0); cx.fill();
      cx.beginPath(); cx.moveTo(-r*.97,0); cx.lineTo(-r*1.32,r*.3); cx.lineTo(-r*1.08,0); cx.fill();
      // Spots
      cx.fillStyle='rgba(255,255,255,.06)';
      for (let i=0;i<4;i++) { const sa=(i/4)*TAU+ts*.0008; cx.globalAlpha=.25+.1*Math.sin(o.breathPh+i); cx.beginPath(); cx.arc(Math.cos(sa)*r*.4,Math.sin(sa)*r*.35,r*.06,0,TAU); cx.fill(); }
      break; }

    case 'phantom': {
      cx.fillStyle=col; cx.globalAlpha=.32;
      cx.beginPath(); cx.moveTo(r*.88,0); cx.quadraticCurveTo(r*.5,-r*.5,0,-r*.44); cx.quadraticCurveTo(-r*.6,-r*.22,-r*.36,0); cx.quadraticCurveTo(-r*.6,r*.22,0,r*.44); cx.quadraticCurveTo(r*.5,r*.5,r*.88,0); cx.fill();
      // Spiral wisp
      cx.strokeStyle=col; cx.lineWidth=.45; cx.globalAlpha=.1;
      cx.beginPath();
      for (let a=0;a<TAU*1.5;a+=.07) { const sr=a/(TAU*1.5)*r*.58; cx.lineTo(Math.cos(a+ts*.003)*sr,Math.sin(a+ts*.003)*sr); }
      cx.stroke();
      // Glow centre
      cx.fillStyle='rgba(255,255,255,.18)'; cx.globalAlpha=.45+.2*Math.sin(ts*.006+o.ph);
      cx.beginPath(); cx.arc(0,0,r*.22,0,TAU); cx.fill();
      break; }

    case 'behemoth': {
      cx.fillStyle=col; cx.globalAlpha=.4;
      cx.beginPath();
      for (let i=0;i<8;i++) { const a=(i/8)*TAU; cx.lineTo(Math.cos(a)*r*(1+((i%2)?.07:0)),Math.sin(a)*r*(1+((i%2)?.07:0))); }
      cx.closePath(); cx.fill();
      // Armor spines
      cx.fillStyle=dim; cx.globalAlpha=.28;
      for (let i=0;i<6;i++) { const sa=(i/6)*TAU+ts*.001,tip=r*1.38; cx.beginPath(); cx.moveTo(Math.cos(sa-.09)*r,Math.sin(sa-.09)*r); cx.lineTo(Math.cos(sa)*tip,Math.sin(sa)*tip); cx.lineTo(Math.cos(sa+.09)*r,Math.sin(sa+.09)*r); cx.fill(); }
      // Central eye
      if (r*zm>6) { cx.fillStyle='#fff'; cx.globalAlpha=.75; cx.beginPath(); cx.arc(r*.38,-r*.05,r*.1,0,TAU); cx.fill(); cx.fillStyle='#600'; cx.globalAlpha=1; cx.beginPath(); cx.ellipse(r*.39,-r*.05,r*.03,r*.07,0,0,TAU); cx.fill(); }
      break; }

    default: {
      cx.fillStyle=col; cx.globalAlpha=.45; cx.beginPath(); cx.arc(0,0,r,0,TAU); cx.fill();
      cx.fillStyle='rgba(255,255,255,.14)'; cx.globalAlpha=.4; cx.beginPath(); cx.arc(-r*.06,-r*.08,r*.24,0,TAU); cx.fill();
      break; }
  }

  cx.restore();

  // HP arc
  if (o.hp<o.mhp && r*zm>3) {
    const pct=o.hp/o.mhp;
    cx.strokeStyle=pct>.5?'rgba(100,220,100,.28)':pct>.25?'rgba(220,220,60,.28)':'rgba(220,70,70,.28)';
    cx.lineWidth=.9; cx.beginPath(); cx.arc(o.x,o.y,r+2,-PI/2,-PI/2+pct*TAU); cx.stroke();
  }
  // Eat/flee indicator
  if (dd<280 && r*zm>3) {
    if (canEat(o)) {
      cx.fillStyle='rgba(100,220,80,.28)'; cx.beginPath(); cx.moveTo(o.x-2.5,o.y-r-8); cx.lineTo(o.x+2.5,o.y-r-8); cx.lineTo(o.x,o.y-r-3); cx.fill();
    } else if (isPred(o)) {
      cx.fillStyle='rgba(220,55,55,.28)'; cx.beginPath(); cx.moveTo(o.x-2.5,o.y-r-3); cx.lineTo(o.x+2.5,o.y-r-3); cx.lineTo(o.x,o.y-r-8); cx.fill();
    }
  }
  cx.shadowBlur=0; cx.globalAlpha=1;
}

// ═══════════════════════════════════════════
// DRAW TAIL — FIXED JUNCTION
// The tail uses source-over compositing so the
// body circle drawn afterwards fully covers the root.
// No shadow blur in tail so there's no glow bleedthrough.
// ═══════════════════════════════════════════
function drawTail(ts) {
  const n=P.tail.length; if(n<4)return;
  const s=stg();
  const stride=Math.max(1,Math.floor(n/40));
  const pts=[]; for(let i=0;i<n;i+=stride) pts.push(P.tail[i]);
  if (pts.length<3) return;

  const headW=P.r*.52, tipW=.28;
  const L=[], R=[];

  for (let i=0; i<pts.length; i++) {
    const p=pts[i]; let dx,dy;
    if (i<pts.length-1) { dx=pts[i+1].x-p.x; dy=pts[i+1].y-p.y; }
    else { dx=p.x-pts[i-1].x; dy=p.y-pts[i-1].y; }
    const tl=Math.hypot(dx,dy)||1, nx=-dy/tl, ny=dx/tl;
    const t=i/(pts.length-1);
    const w=lp(headW,tipW,Math.pow(t,.55));
    // Wave amplitude grows from root, peaks at 40%, then fades
    const wAmp=Math.pow(Math.sin(t*PI),1.2);
    const wave=Math.sin(t*10+ts*.007)*w*.22*wAmp;
    L.push({x:p.x+nx*(w+wave),y:p.y+ny*(w+wave)});
    R.push({x:p.x-nx*(w-wave*.45),y:p.y-ny*(w-wave*.45)});
  }

  cx.save();
  cx.globalCompositeOperation='source-over'; // NOT lighter — body drawn on top will cap root

  // Inner glow fill (wide, very transparent)
  cx.shadowBlur=0; // deliberately no shadow — avoids glow bleeding through body
  cx.globalAlpha=.09;
  cx.fillStyle=s.c.pri;
  cx.beginPath(); cx.moveTo(L[0].x,L[0].y);
  for (let i=1;i<L.length;i++) cx.lineTo(L[i].x,L[i].y);
  for (let i=R.length-1;i>=0;i--) cx.lineTo(R[i].x,R[i].y);
  cx.closePath(); cx.fill();

  // Gradient fill — fades from stage color to transparent
  const grd=cx.createLinearGradient(pts[0].x,pts[0].y,pts[pts.length-1].x,pts[pts.length-1].y);
  grd.addColorStop(0,s.c.pri); grd.addColorStop(.28,s.c.dim); grd.addColorStop(1,'transparent');
  cx.globalAlpha=.42; cx.fillStyle=grd;
  cx.beginPath(); cx.moveTo(L[0].x,L[0].y);
  for (let i=1;i<L.length;i++) cx.lineTo(L[i].x,L[i].y);
  for (let i=R.length-1;i>=0;i--) cx.lineTo(R[i].x,R[i].y);
  cx.closePath(); cx.fill();

  // Centre-spine line
  cx.globalAlpha=.12; cx.strokeStyle=s.c.pri; cx.lineWidth=Math.max(.4,headW*.1); cx.lineCap='round';
  cx.beginPath(); cx.moveTo(pts[0].x,pts[0].y);
  for (let i=1;i<pts.length;i++) cx.lineTo(pts[i].x,pts[i].y); cx.stroke();

  // Stage ≥3: small dorsal fin buds along first half
  if (P.stg>=3) {
    cx.globalAlpha=.08; cx.fillStyle=s.c.pri;
    const bStep=Math.max(1,Math.floor(pts.length/8));
    for (let i=1;i<pts.length*.5;i+=bStep) {
      const br=lp(headW*.15,.2,Math.pow(pts[i].t||i/(pts.length-1),2));
      if(L[i]) {cx.beginPath();cx.arc(L[i].x,L[i].y,br,0,TAU);cx.fill();}
    }
  }

  cx.restore(); cx.globalAlpha=1;
}

// ═══════════════════════════════════════════
// DRAW PLAYER BODY (2D, no Three.js)
// Body is drawn AFTER tail — naturally caps the tail root.
// ═══════════════════════════════════════════
function drawPlayerBody(ts) {
  const s=stg(), r=P.r;
  // CRITICAL: Body alpha no longer dimmed by blink. The blink (damage flicker)
  // is now shown as a bright WHITE OUTLINE pulse drawn AFTER the body — additive,
  // never subtractive. Player remains 100% visible during damage windows.
  // (Previous approach reduced bv to .35 minimum which combined with body alphas
  // of ~.48 produced effectively-invisible alpha of .16 — the user's complaint.)
  const bv = 1;  // body always full visibility

  // Ambient outer glow (drawn before body, no transform)
  bioGlow(P.x, P.y, r*3.8, s.c.gl, .48);

  cx.save();
  cx.translate(P.x, P.y);
  cx.rotate(P.hd);

  // NOTE: No dark base disc here. The tail draws BEFORE this body, and uses
  // source-over compositing without shadowBlur, so the body's fill naturally
  // caps the tail root. The previous dark base disc was making the body appear
  // black/invisible by sitting beneath the translucent stage colors.

  // ── STAGE 0: MOTE — single-celled organism ──
  if (P.stg===0) {
    const br=1+.028*Math.sin(ts*.004);
    // Membrane glow
    cx.shadowBlur=10*zm; cx.shadowColor=s.c.pri;
    cx.fillStyle=s.c.pri; cx.globalAlpha=bv*.06;
    cx.beginPath(); cx.arc(0,0,r*1.55*br,0,TAU); cx.fill();
    // Main body
    cx.shadowBlur=6*zm;
    cx.globalAlpha=bv*.48; cx.fillStyle=s.c.pri;
    cx.beginPath(); cx.arc(0,0,r*br,0,TAU); cx.fill();
    // Membrane ring
    cx.shadowBlur=0; cx.strokeStyle=s.c.pri; cx.lineWidth=.55; cx.globalAlpha=bv*.55;
    cx.beginPath(); cx.arc(0,0,r*br,0,TAU); cx.stroke();
    // Cytoplasm shimmer
    cx.strokeStyle='rgba(255,255,255,.07)'; cx.lineWidth=.3;
    for (let i=0;i<5;i++) { const sa=ts*.002+i*TAU/5; cx.globalAlpha=.06; cx.beginPath(); cx.arc(Math.cos(sa)*r*.28,Math.sin(sa)*r*.28,r*.14,0,TAU); cx.stroke(); }
    // Nucleus
    cx.fillStyle=s.c.dim; cx.globalAlpha=bv*.3;
    cx.beginPath(); cx.arc(-r*.07,-r*.06,r*.3,0,TAU); cx.fill();
    // Nucleolus
    cx.fillStyle='rgba(255,255,255,.42)'; cx.globalAlpha=bv*.7;
    cx.beginPath(); cx.arc(-r*.05,-r*.08,r*.1,0,TAU); cx.fill();
    // Drifting organelles
    cx.fillStyle=s.c.pri; cx.globalAlpha=.14;
    for (let i=0;i<5;i++) { const ga=ts*.0018+i*1.25,gd=r*(.32+i*.04); cx.beginPath(); cx.arc(Math.cos(ga)*gd,Math.sin(ga)*gd,r*.048,0,TAU); cx.fill(); }
    // Cilia — subtle, short, animated
    cx.strokeStyle=s.c.pri; cx.lineWidth=.38; cx.lineCap='round';
    for (let i=0;i<10;i++) {
      const ca=(i/10)*TAU, wiggle=Math.sin(ts*.012+i*.84)*.16;
      cx.globalAlpha=bv*.22;
      cx.beginPath(); cx.moveTo(Math.cos(ca)*r*br,Math.sin(ca)*r*br);
      cx.lineTo(Math.cos(ca+wiggle)*r*1.25*br, Math.sin(ca+wiggle)*r*1.25*br); cx.stroke();
    }
  }

  // ── STAGE 1: DRIFTER — flagellate ──
  else if (P.stg===1) {
    const br=1+.022*Math.sin(ts*.005);
    cx.shadowBlur=7*zm; cx.shadowColor=s.c.pri;
    cx.fillStyle=s.c.pri; cx.globalAlpha=bv*.5;
    cx.beginPath(); cx.ellipse(0,0,r*1.12*br,r*.7*br,0,0,TAU); cx.fill();
    cx.shadowBlur=0; cx.strokeStyle=s.c.pri; cx.lineWidth=.5; cx.globalAlpha=bv*.5;
    cx.beginPath(); cx.ellipse(0,0,r*1.12*br,r*.7*br,0,0,TAU); cx.stroke();
    // Nucleus + nucleolus
    cx.fillStyle=s.c.dim; cx.globalAlpha=bv*.28; cx.beginPath(); cx.arc(-r*.06,-r*.05,r*.28,0,TAU); cx.fill();
    cx.fillStyle='rgba(255,255,255,.4)'; cx.globalAlpha=bv*.7; cx.beginPath(); cx.arc(-r*.04,-r*.07,r*.09,0,TAU); cx.fill();
    // Eyespot
    cx.fillStyle='#FF6020'; cx.shadowBlur=4*zm; cx.shadowColor='#FF6020'; cx.globalAlpha=bv*.5;
    cx.beginPath(); cx.arc(r*.62,-r*.1,r*.065,0,TAU); cx.fill();
    // Flagellum — whip curve from front
    cx.shadowBlur=0; cx.strokeStyle=s.c.pri; cx.lineWidth=.7; cx.globalAlpha=.3;
    cx.beginPath(); cx.moveTo(r*1.1,0);
    let fx=r*1.1, fy=0;
    for (let seg=0; seg<7; seg++) { fx+=r*.18; fy+=Math.sin(ts*.012+seg*1.05)*r*.09; cx.lineTo(fx,fy); }
    cx.stroke();
  }

  // ── STAGE 2: MEDUSA — jellyfish bell ──
  else if (P.stg===2) {
    const bPulse=.5+.22*Math.sin(ts*.004); // bell pulsing
    cx.shadowBlur=8*zm; cx.shadowColor=s.c.pri;
    cx.fillStyle=s.c.pri; cx.globalAlpha=bv*bPulse*.4;
    cx.beginPath(); cx.moveTo(-r*.82,r*.06); cx.quadraticCurveTo(-r*.82,-r*.85*(1+.1*bPulse),0,-r*(1+.06*bPulse)); cx.quadraticCurveTo(r*.82,-r*.85*(1+.1*bPulse),r*.82,r*.06); cx.quadraticCurveTo(r*.3,r*.24,0,r*.14); cx.quadraticCurveTo(-r*.3,r*.24,-r*.82,r*.06); cx.fill();
    // Inner radial ribs
    cx.shadowBlur=0; cx.strokeStyle=s.c.dim; cx.lineWidth=.4; cx.globalAlpha=bv*.12;
    for (let i=0;i<6;i++) { const ra=(i/6)*PI-.5; cx.beginPath(); cx.moveTo(0,r*.1); cx.quadraticCurveTo(Math.cos(ra-PI/2)*r*.55,Math.sin(ra-PI/2)*r*.55,Math.cos(ra-PI/2)*r*.82,Math.sin(ra-PI/2)*r*.82); cx.stroke(); }
    // Oral arms
    cx.strokeStyle=s.c.pri; cx.lineWidth=.8; cx.lineCap='round';
    for (let i=0;i<4;i++) {
      const ox=(i-1.5)*r*.26; cx.globalAlpha=.14;
      cx.beginPath(); cx.moveTo(ox,r*.12);
      let ax=ox,ay=r*.12;
      for (let seg=0;seg<5;seg++) { ax+=Math.sin(ts*.006+i*1.3+seg*.9)*r*.06; ay+=r*.18; cx.lineTo(ax,ay); }
      cx.stroke();
    }
    // Subumbrella spots
    cx.fillStyle='rgba(255,255,255,.12)';
    for (let i=0;i<5;i++) { const sa=(i/5)*TAU+ts*.002; cx.globalAlpha=.3; cx.beginPath(); cx.arc(Math.cos(sa)*r*.3,Math.sin(sa)*r*.3-r*.12,r*.04,0,TAU); cx.fill(); }
    // Sting field indicator
    cx.strokeStyle=s.c.dim; cx.lineWidth=.38; cx.globalAlpha=.06+.04*Math.sin(ts*.003);
    cx.beginPath(); cx.arc(0,0,r*3,.1,PI*.9); cx.stroke();
  }

  // ── STAGE 3: NAGA — serpentine head ──
  else if (P.stg===3) {
    cx.shadowBlur=8*zm; cx.shadowColor=s.c.pri;
    cx.fillStyle=s.c.pri; cx.globalAlpha=bv*.62;
    cx.beginPath(); cx.moveTo(r*1.18,0); cx.quadraticCurveTo(r*.88,-r*.46,r*.14,-r*.56); cx.quadraticCurveTo(-r*.22,-r*.57,-r*.42,-r*.34); cx.lineTo(-r*.24,0); cx.lineTo(-r*.42,r*.34); cx.quadraticCurveTo(-r*.22,r*.57,r*.14,r*.56); cx.quadraticCurveTo(r*.88,r*.46,r*1.18,0); cx.fill();
    cx.shadowBlur=0;
    // Scale hexagon pattern
    cx.fillStyle=s.c.dim; cx.globalAlpha=.18;
    for (let i=0;i<4;i++) { const sx=r*(-.2+i*.32),rows=i%2===0?2:3; for (let j=0;j<rows;j++) { const sy=r*(j*(rows===2?.3:.2)-.25); cx.beginPath(); cx.arc(sx,sy,r*.07,0,TAU); cx.fill(); } }
    // Main eye
    cx.fillStyle='#fff'; cx.globalAlpha=bv*.9; cx.beginPath(); cx.ellipse(r*.52,-r*.1,r*.13,r*.1,0,0,TAU); cx.fill();
    cx.fillStyle='#C82000'; cx.globalAlpha=1; cx.beginPath(); cx.arc(r*.53,-r*.1,r*.065,0,TAU); cx.fill();
    cx.fillStyle='#1a0000'; cx.beginPath(); cx.ellipse(r*.54,-r*.1,r*.02,r*.06,0,0,TAU); cx.fill();
    cx.fillStyle='rgba(255,255,255,.5)'; cx.beginPath(); cx.arc(r*.47,-r*.13,r*.022,0,TAU); cx.fill();
    // Forked tongue hint
    if (Math.sin(ts*.008)>.55) {
      cx.strokeStyle=s.c.pri; cx.lineWidth=.5; cx.globalAlpha=.4;
      cx.beginPath(); cx.moveTo(r*1.18,0); cx.lineTo(r*1.38,-r*.04); cx.moveTo(r*1.18,0); cx.lineTo(r*1.38,r*.04); cx.stroke();
    }
  }

  // ── STAGE 4: TITAN — crystalline hexagonal ──
  else if (P.stg===4) {
    const br=1+.022*Math.sin(ts*.003);
    cx.shadowBlur=9*zm; cx.shadowColor=s.c.pri;
    cx.fillStyle=s.c.pri; cx.globalAlpha=bv*.42;
    cx.beginPath(); for (let i=0;i<6;i++) { const a=(i/6)*TAU-PI/6; cx.lineTo(Math.cos(a)*r*br,Math.sin(a)*r*br); } cx.closePath(); cx.fill();
    cx.shadowBlur=0;
    // Inner hex structure
    cx.strokeStyle=s.c.dim; cx.lineWidth=.4; cx.globalAlpha=bv*.25;
    cx.beginPath(); for (let i=0;i<6;i++) { const a=(i/6)*TAU-PI/6; cx.lineTo(Math.cos(a)*r*.58,Math.sin(a)*r*.58); } cx.closePath(); cx.stroke();
    // Radial lines
    cx.lineWidth=.3; cx.globalAlpha=.12;
    for (let i=0;i<6;i++) { const a=(i/6)*TAU-PI/6; cx.beginPath(); cx.moveTo(Math.cos(a)*r*.58,Math.sin(a)*r*.58); cx.lineTo(Math.cos(a)*r,Math.sin(a)*r); cx.stroke(); }
    // Energy spikes
    cx.fillStyle=s.c.dim; cx.globalAlpha=.22;
    for (let i=0;i<6;i++) { const sa=(i/6)*TAU+ts*.0007,tip=r*1.38; cx.beginPath(); cx.moveTo(Math.cos(sa-.08)*r*.95,Math.sin(sa-.08)*r*.95); cx.lineTo(Math.cos(sa)*tip,Math.sin(sa)*tip); cx.lineTo(Math.cos(sa+.08)*r*.95,Math.sin(sa+.08)*r*.95); cx.fill(); }
    // Dual eyes
    for (let e=-1;e<=1;e+=2) {
      cx.fillStyle='#c8e8ff'; cx.globalAlpha=bv*.75; cx.beginPath(); cx.arc(r*.38,e*r*.16,r*.09,0,TAU); cx.fill();
      cx.fillStyle='#112240'; cx.globalAlpha=1; cx.beginPath(); cx.arc(r*.4,e*r*.16,r*.042,0,TAU); cx.fill();
    }
    // Gravity well pulse
    cx.strokeStyle=s.c.pri; cx.lineWidth=.3; cx.globalAlpha=.04+.03*Math.sin(ts*.003);
    cx.beginPath(); cx.arc(0,0,r*5.5,0,TAU); cx.stroke();
  }

  // ── STAGE 5: PRIMORDIAL — mythological organism ──
  else {
    const br=1+.025*Math.sin(ts*.0035);
    cx.shadowBlur=12*zm; cx.shadowColor=s.c.pri;
    cx.fillStyle=s.c.pri; cx.globalAlpha=bv*.48;
    cx.beginPath(); cx.arc(0,0,r*br,0,TAU); cx.fill();
    cx.shadowBlur=0;
    // Orbital crown spikes
    cx.fillStyle=s.c.dim; cx.globalAlpha=.26;
    for (let i=0;i<8;i++) { const sa=(i/8)*TAU+ts*.0012,tip=r*1.48+Math.sin(ts*.003+i)*r*.07; cx.beginPath(); cx.moveTo(Math.cos(sa-.07)*r*.82,Math.sin(sa-.07)*r*.82); cx.lineTo(Math.cos(sa)*tip,Math.sin(sa)*tip); cx.lineTo(Math.cos(sa+.07)*r*.82,Math.sin(sa+.07)*r*.82); cx.fill(); }
    // Sacred geometry ring
    cx.strokeStyle=s.c.dim; cx.lineWidth=.5; cx.globalAlpha=.2+.08*Math.sin(ts*.002);
    cx.beginPath(); for (let i=0;i<7;i++) { const a=(i/7)*TAU; const nx=Math.cos(a)*r*.55,ny=Math.sin(a)*r*.55; i===0?cx.moveTo(nx,ny):cx.lineTo(nx,ny); } cx.closePath(); cx.stroke();
    // Three eyes in arc
    const eyeConfig=[{ex:r*.42,ey:0,rs:.11},{ex:r*.32,ey:-r*.22,rs:.08},{ex:r*.32,ey:r*.22,rs:.08}];
    for (const ec of eyeConfig) {
      cx.fillStyle='#fff'; cx.globalAlpha=bv*.85; cx.beginPath(); cx.arc(ec.ex,ec.ey,r*ec.rs,0,TAU); cx.fill();
      cx.fillStyle='#E85010'; cx.globalAlpha=1; cx.beginPath(); cx.arc(ec.ex+r*.008,ec.ey,r*ec.rs*.5,0,TAU); cx.fill();
    }
    // Golden core
    cx.fillStyle='rgba(255,255,255,.2)'; cx.shadowBlur=6*zm; cx.shadowColor=s.c.pri;
    cx.beginPath(); cx.arc(0,0,r*.22,0,TAU); cx.fill();
  }

  cx.restore();

  // ── Damage indicator: bright WHITE outline pulse, never reduces visibility ──
  // Triggered by P.blink > 0 (damage window). Pulses fast at full visibility
  // so the player gets clear feedback they were hit, without disappearing.
  if (P.blink > 0) {
    const pulseRate = 1 - P.blink/250;
    const a = .65 + .35*Math.sin(gt * .035);
    cx.strokeStyle = '#ffffff';
    cx.lineWidth = 1.8;
    cx.shadowBlur = 14*zm;
    cx.shadowColor = '#ff4858';
    cx.globalAlpha = a * .85;
    cx.beginPath(); cx.arc(P.x, P.y, r * 1.18, 0, TAU); cx.stroke();
    // Red outer flicker — clearly conveys "damage taken"
    cx.strokeStyle = '#ff4858';
    cx.lineWidth = .9;
    cx.globalAlpha = a * .6;
    cx.beginPath(); cx.arc(P.x, P.y, r * 1.32, 0, TAU); cx.stroke();
    cx.shadowBlur = 0; cx.globalAlpha = 1;
  }

  // ── Frenzy is now communicated by the food swirling around the player and
  //    the persistent cyan aura ring drawn in drawFrenzyOrbs. No body-tint
  //    overlay needed — that previously confused the visual "invisibility" issue.

  // Shield ring
  if (shOn) {
    const rem=shTime/5000;
    cx.strokeStyle=`rgba(232,192,64,${.18*rem})`; cx.lineWidth=1;
    cx.shadowBlur=8*zm; cx.shadowColor='#e8c040';
    cx.beginPath(); cx.arc(P.x,P.y,r*1.28,0,TAU); cx.stroke(); cx.shadowBlur=0;
  }
  // Dash afterimage
  if (P.dash) {
    const c=stg().c.pri;
    cx.globalCompositeOperation='lighter';
    cx.fillStyle=c; cx.globalAlpha=.12; cx.beginPath(); cx.arc(P.x-P.vx*2.8,P.y-P.vy*2.8,r*.5,0,TAU); cx.fill();
    cx.globalAlpha=.07; cx.beginPath(); cx.arc(P.x-P.vx*5,P.y-P.vy*5,r*.32,0,TAU); cx.fill();
    cx.globalCompositeOperation='source-over';
  }
  // Flash hit
  if (P.flash.t>0) { cx.fillStyle=P.flash.c; cx.globalAlpha=.16*(P.flash.t/400); cx.beginPath(); cx.arc(P.x,P.y,r*1.3,0,TAU); cx.fill(); }
  cx.globalAlpha=1; cx.shadowBlur=0;
}

// ═══════════════════════════════════════════
// DRAW PLAYER — Bulletproof wrapper. Defensively resets canvas state so no
// previous draw can leak in (stale shadowBlur, leftover globalAlpha,
// uncleared composite op, dangling save stack). Also validates P fields so
// a NaN can't cause a silent off-screen draw.
//
// Render order: tail → body → antennae → anchor pip. The anchor is the
// last-resort visible marker; even if every artistic layer somehow failed,
// a bright white-and-stage-color dot is guaranteed at P.x, P.y.
// ═══════════════════════════════════════════
function drawPlayer(ts) {
  // 1. Validate state — recover from any NaN that could push the player into
  //    coordinate space that doesn't render.
  if (!isFinite(P.x) || !isFinite(P.y)) { P.x = 0; P.y = 0; P.vx = 0; P.vy = 0; }
  if (!isFinite(P.r) || P.r < 1) P.r = 6;
  if (!isFinite(P.hd)) P.hd = 0;
  if (typeof P.stg !== 'number' || P.stg < 0 || P.stg >= STAGES.length) P.stg = 0;

  // 2. Reset canvas state. We MUST do this here because any prior draw
  //    (drawCreature, drawRadarHalos, particles, anomalies, projectiles)
  //    might have left properties in a state that would suppress our draws.
  cx.globalAlpha = 1;
  cx.shadowBlur = 0;
  cx.shadowColor = 'transparent';
  cx.globalCompositeOperation = 'source-over';
  cx.setLineDash([]);
  cx.lineWidth = 1;
  cx.lineCap = 'butt';
  cx.lineJoin = 'miter';

  // 3. Artistic layers — wrapped so a render error in one doesn't prevent the
  //    others (and the safety anchor) from drawing.
  try { drawTail(ts); } catch(e) {}
  cx.globalAlpha = 1; cx.shadowBlur = 0; cx.globalCompositeOperation = 'source-over';

  try { drawPlayerBody(ts); } catch(e) {}
  cx.globalAlpha = 1; cx.shadowBlur = 0; cx.globalCompositeOperation = 'source-over';

  try { drawAntennae(ts); } catch(e) {}
  cx.globalAlpha = 1; cx.shadowBlur = 0; cx.globalCompositeOperation = 'source-over';

  // 4. Guaranteed-visible safety pip — drawn LAST, always at full alpha. If
  //    everything else somehow failed, the player would still be marked here.
  drawPlayerAnchor(ts);
}

// ═══════════════════════════════════════════
// PLAYER ANCHOR — a tiny always-visible pip at player center, plus an outer
// position ring that briefly flares when the player is hard to see (e.g. when
// surrounded by larger creatures or during heavy particle activity).
// This guarantees the player is locatable in busy scenes.
// ═══════════════════════════════════════════
function drawPlayerAnchor(ts) {
  const s = STAGES[P.stg] || STAGES[0];
  const r = Math.max(3, P.r);

  // Defensive state reset
  cx.globalAlpha = 1;
  cx.shadowBlur = 0;
  cx.globalCompositeOperation = 'source-over';

  // Layer 1: Soft stage-colored halo — anchors the player in busy scenes
  cx.shadowBlur = 14 * zm;
  cx.shadowColor = s.c.pri;
  cx.fillStyle = s.c.pri;
  cx.globalAlpha = .24;
  cx.beginPath(); cx.arc(P.x, P.y, r * 0.55, 0, TAU); cx.fill();

  // Layer 2: Bright white core — high alpha, scales with player size.
  // This is the absolutely-guaranteed-visible marker.
  cx.shadowBlur = 6 * zm;
  cx.shadowColor = '#fff';
  cx.fillStyle = '#ffffff';
  cx.globalAlpha = .88 + .10 * Math.sin(ts * .006);
  cx.beginPath(); cx.arc(P.x, P.y, Math.max(2, r * 0.20), 0, TAU); cx.fill();

  // Layer 3: Stage-color inner dot — confirms identity
  cx.shadowBlur = 0;
  cx.fillStyle = s.c.pri;
  cx.globalAlpha = 1;
  cx.beginPath(); cx.arc(P.x, P.y, Math.max(1, r * 0.10), 0, TAU); cx.fill();

  cx.globalAlpha = 1;
  cx.shadowBlur = 0;
}

// ═══════════════════════════════════════════
// ANTENNAE — Sensory organs that appear with the radar trait.
// Stage 1+ get a small forked antenna pair that lengthens with evolution.
// Tip color matches stage; sways subtly.
// ═══════════════════════════════════════════
function drawAntennae(ts) {
  if (P.stg < 1) return;
  const s=stg(), r=P.r;
  const len = r * (.55 + (P.stg-1) * .22);
  const spread = .42;
  const sway = Math.sin(ts*.005)*.07;

  cx.save();
  cx.translate(P.x, P.y);
  cx.rotate(P.hd);

  for (const sgn of [-1, 1]) {
    const baseX = r * .55, baseY = sgn * r * .18;
    const tipX  = baseX + len * .9;
    const tipY  = baseY + sgn * (r*.5 + len*spread) + sway*sgn*r*.3;
    const ctrlX = baseX + len * .45;
    const ctrlY = baseY + sgn * r * .55;

    // Antenna line — translucent stage color
    cx.strokeStyle = s.c.pri;
    cx.lineWidth = .55;
    cx.lineCap = 'round';
    cx.shadowBlur = 4*zm; cx.shadowColor = s.c.pri;
    cx.globalAlpha = .58;
    cx.beginPath();
    cx.moveTo(baseX, baseY);
    cx.quadraticCurveTo(ctrlX, ctrlY, tipX, tipY);
    cx.stroke();

    // Tip bulb — pulses on radar sweep
    const sweepPh = ((ts * .0006) % 1);
    const tipPulse = .7 + .8 * Math.exp(-Math.pow((sweepPh - .25)*4, 2));
    cx.fillStyle = s.c.pri;
    cx.globalAlpha = .85 * tipPulse;
    cx.beginPath(); cx.arc(tipX, tipY, .9 + .35*tipPulse, 0, TAU); cx.fill();
  }
  cx.restore();
  cx.globalAlpha = 1; cx.shadowBlur = 0;
}

// ═══════════════════════════════════════════
// RADAR — slow expanding pulse from player, scaled to sense range.
// Plus a faint static ring marking the radar's outer limit.
// ═══════════════════════════════════════════
function drawRadarPulse(ts) {
  const range = senseRange();
  if (range === 0) return;
  const s = stg();
  cx.save();

  // Expanding pulse — sweeps outward and fades
  const pulse = (ts * .00035) % 1;
  cx.strokeStyle = s.c.pri;
  cx.lineWidth = 1.2;
  cx.globalAlpha = .12 * (1 - pulse);
  cx.beginPath(); cx.arc(P.x, P.y, range * pulse, 0, TAU); cx.stroke();

  // Static outer ring at full range
  cx.globalAlpha = .055 + .025*Math.sin(ts*.003);
  cx.setLineDash([3, 9]);
  cx.beginPath(); cx.arc(P.x, P.y, range, 0, TAU); cx.stroke();
  cx.setLineDash([]);

  cx.restore();
  cx.globalAlpha = 1;
}

// ═══════════════════════════════════════════
// RADAR HALOS — color-code creatures by edibility / threat.
// Green: edible standard. Yellow: angle-killable (precision target).
// Red: predator (will hurt you). Neutral: ignored entirely.
// Camouflaged creatures show dimmer halos until sense level pierces the veil.
// ═══════════════════════════════════════════
function drawRadarHalos(ts) {
  if (P.stg < 1) return;
  cx.save();
  for (const o of orgs) {
    if (!o._inRange) continue;
    const hide = o._maskHide || 0;
    if (hide >= .98) continue;

    let col=null;
    if (o._edib === 1)        col = '#52FFCA';
    else if (o._edib === 0.5) col = '#FFD860';
    else if (o._pred)         col = '#FF4858';
    if (!col) continue;       // neutral targets get no halo

    const alpha = (1 - hide) * .28;     // was .42 — quieter so player stays focal
    const pulse = 1 + .045 * Math.sin(ts*.007 + (o.x+o.y)*.012);

    cx.globalAlpha = alpha;
    cx.strokeStyle = col;
    cx.lineWidth = .9;                   // was 1.1
    cx.shadowBlur = 4*zm;                // was 7
    cx.shadowColor = col;
    cx.beginPath(); cx.arc(o.x, o.y, o.r * 1.45 * pulse, 0, TAU); cx.stroke();

    // Tick marks at cardinals
    cx.globalAlpha = alpha * .65;         // was .8
    cx.lineWidth = .6;
    cx.shadowBlur = 0;
    for (let i=0;i<4;i++){
      const a = i*PI/2 + ts*.0008 + (o.x*.001);
      const ix = o.x + Math.cos(a) * o.r * 1.55 * pulse;
      const iy = o.y + Math.sin(a) * o.r * 1.55 * pulse;
      const ox = o.x + Math.cos(a) * o.r * 1.75 * pulse;
      const oy = o.y + Math.sin(a) * o.r * 1.75 * pulse;
      cx.beginPath(); cx.moveTo(ix,iy); cx.lineTo(ox,oy); cx.stroke();
    }
  }
  cx.restore();
  cx.globalAlpha = 1; cx.shadowBlur = 0;
}

// ═══════════════════════════════════════════
// VULNERABILITY ARC — shows where on a marginal prey to strike.
// Only renders for in-range marginal kills; requires sense level ≥ 2.
// ═══════════════════════════════════════════
function drawVulnArcs(ts) {
  if (P.stg < 2) return;
  cx.save();
  for (const o of orgs) {
    if (!o._inRange || o._edib !== 0.5) continue;
    if ((o._maskHide||0) >= .7) continue;
    const v = VULN[o.type];
    if (!v || v.w >= TAU - .01) continue;
    if (dst(P, o) > o.r * 7) continue;

    const a = o.hd + v.ang;
    cx.strokeStyle = '#FFD860';
    cx.lineWidth = 2.2;
    cx.shadowBlur = 8*zm; cx.shadowColor = '#FFD860';
    cx.globalAlpha = .45 + .3 * Math.sin(ts*.011);
    cx.beginPath(); cx.arc(o.x, o.y, o.r * 1.35, a - v.w/2, a + v.w/2);
    cx.stroke();

    // Strike-direction tick pointing inward
    cx.lineWidth = 1.1;
    cx.globalAlpha = .55 + .25 * Math.sin(ts*.011);
    const tx1 = o.x + Math.cos(a) * o.r * 1.55;
    const ty1 = o.y + Math.sin(a) * o.r * 1.55;
    const tx2 = o.x + Math.cos(a) * o.r * 1.15;
    const ty2 = o.y + Math.sin(a) * o.r * 1.15;
    cx.beginPath(); cx.moveTo(tx1,ty1); cx.lineTo(tx2,ty2); cx.stroke();
  }
  cx.restore();
  cx.globalAlpha = 1; cx.shadowBlur = 0;
}

// ═══════════════════════════════════════════
// DRAW FRENZY ORBS
// ═══════════════════════════════════════════
function drawFrenzyOrbs(ts) {
  if (!frenzy) return;

  // 1. Main frenzy aura — pulsing cyan ring around player. Clear, unmistakable.
  const auraR = P.r * 2.6 + 4 * Math.sin(ts * .014);
  cx.strokeStyle = '#40c8f0';
  cx.lineWidth = 1.8;
  cx.shadowBlur = 14 * zm;
  cx.shadowColor = '#40c8f0';
  cx.globalAlpha = .55 + .25 * Math.sin(ts * .012);
  cx.beginPath(); cx.arc(P.x, P.y, auraR, 0, TAU); cx.stroke();

  // 2. Duration arc — visible time remaining as a sweep around the aura
  const dRem = fTime / 8000;
  cx.strokeStyle = '#fff';
  cx.lineWidth = 2.6;
  cx.globalAlpha = .65;
  cx.shadowBlur = 6 * zm;
  cx.shadowColor = '#fff';
  cx.beginPath();
  cx.arc(P.x, P.y, auraR + 5, -PI/2, -PI/2 + TAU * Math.min(1, dRem));
  cx.stroke();

  // 3. Outer vortex range ring — soft dashed indicator of pull radius
  cx.shadowBlur = 0;
  cx.strokeStyle = '#40c8f0';
  cx.lineWidth = .7;
  cx.globalAlpha = .14 + .06 * Math.sin(ts * .008);
  cx.setLineDash([6, 10]);
  cx.beginPath(); cx.arc(P.x, P.y, 320, 0, TAU); cx.stroke();
  cx.setLineDash([]);

  // 4. Vortex streaks — draw motion trails on food caught in the pull. Each
  //    streak points from the food back toward the player, alpha-weighted by
  //    vortex intensity. This is the "swirling food" visual.
  cx.shadowBlur = 0;
  for (const o of orgs) {
    if (!o._vortex || o._vortex <= 0) continue;
    const t = o._vortex;
    // Streak direction = food's actual velocity vector (which is now pointing
    // mostly toward player due to vortex pull). Length scales with intensity.
    const speed = Math.hypot(o.vx, o.vy);
    if (speed < .3) continue;
    const sl = Math.min(30, speed * 4 + t * 14);
    const dx = (o.vx / speed) * sl;
    const dy = (o.vy / speed) * sl;
    cx.strokeStyle = '#40c8f0';
    cx.lineWidth = 1.0 + t * 1.4;
    cx.lineCap = 'round';
    cx.globalAlpha = .25 + t * .55;
    cx.beginPath();
    cx.moveTo(o.x - dx, o.y - dy);
    cx.lineTo(o.x, o.y);
    cx.stroke();
    // Bright tip at the front
    cx.fillStyle = '#ffffff';
    cx.globalAlpha = .35 + t * .45;
    cx.beginPath(); cx.arc(o.x, o.y, o.r * .35, 0, TAU); cx.fill();
    // Decay the vortex flag over time so creatures look normal after frenzy ends
    o._vortex *= .92;
  }

  cx.globalAlpha = 1;
}

// ═══════════════════════════════════════════
// DRAW PICKUPS
// ═══════════════════════════════════════════
function drawPickups(ts) {
  if (pill.on) {
    // FRENZY PILL — rotating energy rings + lightning glyph make it read as
    // a power-up, not just a "blue dot". Visible from afar.
    const cyan = '#40c8f0';
    bioGlow(pill.x, pill.y, pill.r*5.5, COL.drift.gl, .45);

    // Two counter-rotating dashed rings
    cx.save();
    cx.translate(pill.x, pill.y);
    cx.strokeStyle = cyan; cx.lineWidth = .8;
    cx.shadowBlur = 8*zm; cx.shadowColor = cyan;
    cx.setLineDash([3, 4]);
    cx.rotate(ts * .002);
    cx.globalAlpha = .55;
    cx.beginPath(); cx.arc(0, 0, pill.r * 1.7, 0, TAU); cx.stroke();
    cx.rotate(-ts * .005);
    cx.globalAlpha = .42;
    cx.beginPath(); cx.arc(0, 0, pill.r * 2.3, 0, TAU); cx.stroke();
    cx.setLineDash([]);
    cx.restore();

    // Pulsing core
    cx.shadowBlur = 12*zm; cx.shadowColor = cyan;
    cx.fillStyle = cyan; cx.globalAlpha = .8 + .15*Math.sin(ts*.008);
    cx.beginPath(); cx.arc(pill.x, pill.y, pill.r*(1+.18*Math.sin(ts*.006)), 0, TAU); cx.fill();

    // Bright white inner
    cx.fillStyle = '#fff'; cx.globalAlpha = .85;
    cx.beginPath(); cx.arc(pill.x, pill.y, pill.r*.42, 0, TAU); cx.fill();

    // Lightning bolt glyph (universal "energy" symbol)
    cx.strokeStyle = cyan; cx.lineWidth = 1.4; cx.lineCap = 'round';
    cx.shadowBlur = 0; cx.globalAlpha = .95;
    cx.beginPath();
    cx.moveTo(pill.x - pill.r*.18, pill.y - pill.r*.42);
    cx.lineTo(pill.x + pill.r*.05, pill.y - pill.r*.05);
    cx.lineTo(pill.x - pill.r*.08, pill.y + pill.r*.05);
    cx.lineTo(pill.x + pill.r*.20, pill.y + pill.r*.42);
    cx.stroke();
    cx.globalAlpha = 1;
  }
  if (shld.on) {
    bioGlow(shld.x,shld.y,shld.r*4,COL.primo.gl,.32);
    cx.shadowBlur=7*zm; cx.shadowColor=COL.primo.pri; cx.fillStyle=COL.primo.pri; cx.globalAlpha=.52;
    cx.beginPath(); cx.arc(shld.x,shld.y,shld.r*(1+.1*Math.sin(ts*.006)),0,TAU); cx.fill();
    cx.fillStyle='rgba(255,255,255,.22)'; cx.beginPath(); cx.arc(shld.x,shld.y,shld.r*.28,0,TAU); cx.fill();
    cx.shadowBlur=0; cx.globalAlpha=1;
  }
  beacons.forEach(b=>{
    if (!onScr(b.x,b.y,b.r*2)) return;
    cx.fillStyle='rgba(200,218,255,.28)'; cx.globalAlpha=.32+.1*Math.sin(ts*.003);
    cx.beginPath(); cx.arc(b.x,b.y,b.r,0,TAU); cx.fill(); cx.globalAlpha=1;
  });
}

// ═══════════════════════════════════════════
// DRAW ANOMALIES — pulsing diamond-stars orbiting predators.
// Iridescent + halo + orbital trail showing host's gravity well.
// ═══════════════════════════════════════════
function drawAnomalies(ts) {
  for (const a of anoms) {
    if (!onScr(a.x, a.y, 80)) continue;
    const t = ts * .003;
    const pulse = 1 + .22 * Math.sin(t + a.ph);
    const r = a.r * pulse;

    // Orbital trail line back to host (or the released free-drift glow)
    if (a.host && orgs.includes(a.host)) {
      cx.strokeStyle = a.col;
      cx.globalAlpha = .12;
      cx.lineWidth = .7;
      cx.setLineDash([3, 6]);
      cx.beginPath(); cx.arc(a.host.x, a.host.y, a.orbR, 0, TAU); cx.stroke();
      cx.setLineDash([]);
      cx.globalAlpha = 1;
    } else if (!a.host) {
      // Free-drifting — pulse warning
      cx.strokeStyle = a.col;
      cx.globalAlpha = .25 * Math.sin(ts*.012)*.5+.4;
      cx.lineWidth = 1;
      cx.beginPath(); cx.arc(a.x, a.y, r*2.8, 0, TAU); cx.stroke();
      cx.globalAlpha = 1;
    }

    // Outer halo
    bioGlow(a.x, a.y, r*4, a.col, .42);

    // Core diamond — rotates slowly
    cx.save();
    cx.translate(a.x, a.y);
    cx.rotate(ts * .0008 + a.ph);
    cx.shadowBlur = 10*zm; cx.shadowColor = a.col;
    cx.fillStyle = a.col;
    cx.globalAlpha = .75;
    cx.beginPath();
    cx.moveTo(0, -r);
    cx.lineTo(r*.7, 0);
    cx.lineTo(0, r);
    cx.lineTo(-r*.7, 0);
    cx.closePath();
    cx.fill();

    // Inner white core
    cx.shadowBlur = 0;
    cx.fillStyle = 'rgba(255,255,255,.82)';
    cx.globalAlpha = .55 + .3*Math.sin(t*1.7);
    cx.beginPath(); cx.arc(0, 0, r*.32, 0, TAU); cx.fill();

    // Crossed shine — 4-point star sparkle
    cx.strokeStyle = '#fff';
    cx.lineWidth = .6;
    cx.globalAlpha = .35 + .25*Math.sin(t*2.3);
    cx.beginPath();
    cx.moveTo(-r*1.6, 0); cx.lineTo(r*1.6, 0);
    cx.moveTo(0, -r*1.6); cx.lineTo(0, r*1.6);
    cx.stroke();
    cx.restore();
    cx.globalAlpha = 1; cx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════
// SCREEN VIGNETTE
// ═══════════════════════════════════════════
function drawVig() {
  cx.setTransform(1,0,0,1,0,0);
  const g=cx.createRadialGradient(W/2,H/2,W*.14,W/2,H/2,W*.62);
  g.addColorStop(0,'transparent'); g.addColorStop(1,'rgba(0,5,14,.52)');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
}

// ═══════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════
const cdCtx=document.getElementById('cdC').getContext('2d');
function updateHUD() {
  const s=stg(), nx=STAGES[P.stg+1];
  document.getElementById('stgName').textContent=s.name;
  document.getElementById('stgName').style.color=s.c.pri;
  document.getElementById('stgName').style.textShadow=`0 0 14px ${s.c.pri}`;
  document.getElementById('massV').textContent=Math.floor(P.mass);
  document.getElementById('scoreTxt').textContent=score.toLocaleString();
  document.getElementById('abilTxt').textContent=s.abT+(streak>2?`  ${streak}×`:'');
  // Evo bar
  const bar=document.getElementById('evoBar');
  if (nx) {
    const pct=cl((P.mass-s.thr)/(nx.thr-s.thr)*100,0,100);
    bar.style.width=pct+'%'; bar.style.background=`linear-gradient(90deg,${s.c.pri},${nx.c.pri})`;
    document.getElementById('evoNxtLbl').textContent=`${nx.name} · ${nx.thr}`;
  } else { bar.style.width='100%'; bar.style.background=s.c.pri; document.getElementById('evoNxtLbl').textContent='apex'; }
  // CD ring
  cdCtx.clearRect(0,0,26,26);
  if (s.cd>0) {
    const pct2=1-abil_cd/s.cd;
    cdCtx.strokeStyle='rgba(255,255,255,.05)'; cdCtx.lineWidth=1.5; cdCtx.beginPath(); cdCtx.arc(13,13,9,0,TAU); cdCtx.stroke();
    cdCtx.strokeStyle=s.c.pri; cdCtx.lineWidth=1.5;
    cdCtx.beginPath(); cdCtx.arc(13,13,9,-PI/2,-PI/2+pct2*TAU); cdCtx.stroke();
  }
  // Danger
  const hpPct=(P.mass-STAGES[P.stg].thr*.85)/Math.max(1,STAGES[P.stg].thr*.15);
  document.getElementById('danger').style.opacity=hpPct<.3?String((.3-hpPct)/.3*.5):'0';

  // Frenzy HUD readout — persistent meter that shows remaining time
  const frzEl = document.getElementById('frzHud');
  const frzBar = frzEl.querySelector('#frzBar i');
  if (frenzy) {
    frzEl.classList.add('on');
    const pct = Math.max(0, fTime / 8000) * 100;
    frzBar.style.width = pct + '%';
  } else {
    frzEl.classList.remove('on');
  }
}

// ═══════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════
const mmCtx=document.getElementById('mmC').getContext('2d');
function drawMinimap() {
  mmCtx.clearRect(0,0,80,80); mmCtx.fillStyle='rgba(0,5,14,.35)'; mmCtx.fillRect(0,0,80,80);
  const sc=76/3200;

  // Radar range ring on minimap (matches world-space sense range)
  const range = senseRange();
  if (range > 0) {
    mmCtx.strokeStyle=stg().c.pri; mmCtx.lineWidth=.5; mmCtx.globalAlpha=.25;
    mmCtx.beginPath(); mmCtx.arc(40,40, range*sc, 0, TAU); mmCtx.stroke();
    mmCtx.globalAlpha=1;
  }

  for (const o of orgs) {
    const T=ORGS[o.type], dx=(o.x-P.x)*sc+40, dy=(o.y-P.y)*sc+40;
    if (dx<1||dx>79||dy<1||dy>79) continue;
    let col;
    if (canEat(o)) col = '#52ffca';
    else if (canEatAngle(o)) col = '#ffd860';
    else if (isPred(o)) col = '#ff4858';
    else col = T.col;
    // Dim if masked (sense level < 3)
    if (o._maskHide && P.stg < 3) mmCtx.globalAlpha = 1 - o._maskHide*.7;
    mmCtx.fillStyle = col;
    mmCtx.beginPath(); mmCtx.arc(dx,dy,cl(o.r*.05,.35,1.5),0,TAU); mmCtx.fill();
    mmCtx.globalAlpha = 1;
  }
  mmCtx.fillStyle=stg().c.pri; mmCtx.beginPath(); mmCtx.arc(40,40,2,0,TAU); mmCtx.fill();

  // Anomalies — diamond markers, pulsing white
  if (anoms && anoms.length) {
    const t = performance.now() * .005;
    for (const a of anoms) {
      const ax = (a.x-P.x)*sc+40, ay = (a.y-P.y)*sc+40;
      if (ax<1||ax>79||ay<1||ay>79) continue;
      mmCtx.fillStyle = a.col;
      mmCtx.shadowBlur = 4; mmCtx.shadowColor = a.col;
      mmCtx.globalAlpha = .6 + .4 * Math.sin(t + a.ph);
      mmCtx.save(); mmCtx.translate(ax, ay); mmCtx.rotate(PI/4);
      mmCtx.fillRect(-2.2, -2.2, 4.4, 4.4);
      mmCtx.restore();
      mmCtx.shadowBlur = 0; mmCtx.globalAlpha = 1;
    }
  }
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
let lt=0;

// Pause physics whenever the document is hidden (tab switch, app background, etc).
// On return, reset `lt` so we don't process one massive catch-up frame that
// could launch the player off-screen.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // Don't toggle the explicit pause flag; we just stall lt so dt stays sane
    lt = 0;
  } else {
    lt = performance.now();
  }
});
addEventListener('blur', () => { lt = 0; });
addEventListener('focus', () => { lt = performance.now(); });

function loop(ts) {
  requestAnimationFrame(loop);
  if (paused||introActive||document.hidden) { lt=ts; return; }
  // dt clamp guards against tab-switch catch-up. 50ms is one slow frame at 20fps.
  let dt = (lt > 0) ? Math.min(ts - lt, 50) : 16;
  if (!isFinite(dt) || dt < 0) dt = 16;
  lt = ts; gt += dt;

  // Screen shake decay
  if (shd>0) { shd-=dt; const t=cl(shd/300,0,1); shx=(Math.random()-.5)*shi*t*2; shy=(Math.random()-.5)*shi*t*2; }
  else { shx=shy=0; shi=0; }

  // Update
  rebuildGrid();
  updateP(dt);
  updateSense();              // annotate radar/mask flags on creatures (read by AI + draw)
  for (const o of orgs) aiOrg(o,dt);
  collide(dt);
  ecoCollide();

  // Camera
  const tz=cl(H/(P.r*5.5),.28,1.5); zm=lp(zm,tz,.04);
  off.x=W/2-P.x*zm; off.y=H/2-P.y*zm;

  // Ecosystem maintenance
  for (const [type,T] of Object.entries(ORGS)) {
    if (type==='echo') continue;
    if (orgs.filter(o=>o.type===type).length < T.mx*.3) spawn(type,1);
  }

  // ── Audio choreography: threat layer swells when a real predator is close ──
  {
    let nearest = 0;
    for (const o of orgs) {
      if (!isPred(o)) continue;
      const d = dst(P, o);
      if (d < 380) nearest = Math.max(nearest, 1 - d/380);
    }
    audioSetThreat(nearest);
  }

  // ── DRAW ──
  cx.setTransform(1,0,0,1,0,0);
  cx.clearRect(0,0,W,H);
  drawBg(ts);

  cx.setTransform(zm,0,0,zm,off.x+shx,off.y+shy);
  drawGrid();
  drawDust(ts);

  // Particles
  for (let i=parts.length-1; i>=0; i--) {
    const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=.97; p.vy*=.97; p.life-=dt;
    if (p.life<=0){parts.splice(i,1);continue;}
    const a=cl(p.life/p.ml,0,1);
    cx.fillStyle=p.c; cx.globalAlpha=a*(p.t==='lure'?.28*(.5+.5*Math.sin(ts*.01)):.42);
    cx.beginPath(); cx.arc(p.x,p.y,p.r*a,0,TAU); cx.fill();
  }
  cx.globalAlpha=1;

  // Organisms
  for (const o of orgs) drawCreature(o, ts);

  // Projectiles
  for (const p of projs) {
    cx.fillStyle=p.c; cx.globalAlpha=.72; cx.shadowBlur=5*zm; cx.shadowColor=p.c;
    cx.beginPath(); cx.arc(p.x,p.y,p.r,0,TAU); cx.fill();
    cx.fillStyle='rgba(255,255,255,.32)'; cx.beginPath(); cx.arc(p.x,p.y,p.r*.3,0,TAU); cx.fill();
    cx.shadowBlur=0; cx.globalAlpha=1;
  }

  drawPickups(ts);
  drawAnomalies(ts);          // High-value pods orbiting predators
  drawFrenzyOrbs(ts);

  // Radar overlay — draw before player so player sits on top of indicators
  drawRadarPulse(ts);
  drawRadarHalos(ts);
  drawVulnArcs(ts);

  drawPlayer(ts);  // tail then body then antennae — clean junction

  // Float texts
  cx.textAlign='center'; cx.font='500 11px "Cormorant Garamond",serif';
  for (let i=txts.length-1; i>=0; i--) {
    const f=txts[i]; f.y-=.55*(dt/16); f.life-=dt;
    if (f.life<=0){txts.splice(i,1);continue;}
    cx.fillStyle=f.c; cx.globalAlpha=cl(f.life/f.ml,0,1);
    cx.fillText(f.t,f.x,f.y);
  }
  cx.globalAlpha=1;

  // Frenzy screen tint
  if (frenzy) {
    cx.setTransform(1,0,0,1,0,0);
    cx.globalAlpha=.022+.012*Math.sin(ts*.007); cx.fillStyle='#4080f0'; cx.fillRect(0,0,W,H); cx.globalAlpha=1;
  }

  drawVig();
  updateHUD();
  drawMinimap();
}

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
init();
startIntro();
requestAnimationFrame(loop);
</script>
