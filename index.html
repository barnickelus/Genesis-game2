<style>

canvas#game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
#dragonHead{position:absolute;pointer-events:none;z-index:3}
#headCanvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:14px 18px;display:flex;justify-content:space-between}
#hudL{display:flex;flex-direction:column;gap:3px}

#abilLbl{font-size:11px;color:rgba(255,255,255,.22);letter-spacing:1px}
#cdRing{width:24px;height:24px;margin-top:2px;opacity:.35}
#evoFlash{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .25s}
#evoAnn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:21;pointer-events:none;text-align:center;opacity:0;transition:opacity .5s}
#evoAnn h1{font-family:'Megrim',cursive;font-size:32px;letter-spacing:10px;margin-bottom:4px}
#evoAnn p{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:3px}
#dangerV{position:fixed;inset:0;z-index:9;pointer-events:none;opacity:0;transition:opacity .4s;background:radial-gradient(ellipse at center,transparent 40%,rgba(140,15,0,.18) 100%)}
#pauseBtn{position:fixed;top:12px;right:16px;z-index:10;font-size:18px;color:rgba(255,255,255,.25);cursor:pointer;user-select:none;pointer-events:auto;background:none;border:none}
#pauseMenu{position:fixed;inset:0;z-index:30;background:rgba(1,8,16,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;backdrop-filter:blur(14px)}

#pauseMenu button:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.18)}
#radarWrap{position:fixed;top:48px;right:16px;width:68px;height:68px;display:none;z-index:10;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.15)}
#radar{width:68px;height:68px}
#minimap{position:fixed;bottom:14px;left:14px;z-index:10;width:76px;height:76px;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.15)}
#minimapC{width:76px;height:76px}
#joystick{position:fixed;bottom:20px;right:20px;width:100px;height:100px;display:none;z-index:10}
#joystickC{width:100px;height:100px}
</style>

<audio id="bgm" src="background-music.mp3" loop preload="auto"></audio>

<script type="module">
import*as THREE from'https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.module.js';
import{GLTFLoader}from'https://cdn.jsdelivr.net/npm/three@0.153.0/examples/jsm/loaders/GLTFLoader.js';
const T=window.TILE,S=window.SCALE,hc=document.getElementById('headCanvas');
const r=new THREE.WebGLRenderer({canvas:hc,alpha:true,antialias:true});r.setSize(T*S,T*S);

const dl=new THREE.DirectionalLight(0xffffff,1.2);dl.position.set(1,2,3);sc.add(dl);sc.add(new THREE.AmbientLight(0xffffff,.35));
let hm=null;new GLTFLoader().load('dragon-head.glb',g=>{hm=g.scene;const b=new THREE.Box3().setFromObject(hm);const sz=b.getSize(new THREE.Vector3()).length();hm.scale.setScalar(2/Math.max(sz,.001));b.setFromObject(hm);hm.position.copy(b.getCenter(new THREE.Vector3()).negate());hm.rotation.order='YXZ';sc.add(hm);},undefined,()=>{});
window.renderHead=(yaw,pitch)=>{if(!hm)return;hm.rotation.y=yaw;hm.rotation.x=pitch;r.render(sc,cam);};

<script>
const TILE=window.TILE,SCALE=window.SCALE,COLS=window.COLS,ROWS=window.ROWS;
const G=document.getElementById('game'),cx=G.getContext('2d',{alpha:false});
let W,H;function resize(){W=G.width=innerWidth;H=G.height=innerHeight;}addEventListener('resize',resize);resize();

const TAU=Math.PI*2,PI=Math.PI;
const rng=(a,b)=>a+Math.random()*(b-a),rni=(a,b)=>Math.floor(rng(a,b));
const d2=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y),a2=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x);
const lp=(a,b,t)=>a+(b-a)*t,cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const onS=(x,y,r)=>!(x+r<P.x-W/(2*zm)||x-r>P.x+W/(2*zm)||y+r<P.y-H/(2*zm)||y-r>P.y+H/(2*zm));
function calcR(mass,baseR){return baseR+Math.log2(Math.max(1,mass))*2.8;}
function calcGain(bm,pm){return bm*(1/(1+pm*.003));}
function calcDecay(m,dt){
  // Near-zero below 80, gentle 80-400, moderate 400-1500, steep 1500+
  if(m<80) return .0005*dt;
  if(m<400) return(.0008+(m-80)*.000006)*dt;
  if(m<1500) return(.002+(m-400)*.00008)*dt;
  return(.0108+(m-1500)*.0002)*dt;
}

const C={
  mote:{pri:'#60f0b0',dim:'#1c4838',gl:'rgba(96,240,176,',h:155},
  drifter:{pri:'#40c8e8',dim:'#144858',gl:'rgba(64,200,232,',h:192},
  medusa:{pri:'#a880e0',dim:'#2c1c60',gl:'rgba(168,128,224,',h:268},
  naga:{pri:'#e87040',dim:'#481c10',gl:'rgba(232,112,64,',h:18},
  titan:{pri:'#4090e0',dim:'#142048',gl:'rgba(64,144,224,',h:214},
  primo:{pri:'#e8c040',dim:'#483c08',gl:'rgba(232,192,64,',h:45},
  bloom:'#38d8a0',bloomD:'#143828',
  prey:'#80e860',preyD:'#244818',cell:'#d0d840',cellD:'#404808',
  jelly:'#e068a8',jellyD:'#38102c',hunt:'#e84040',huntD:'#380808',
  lurk:'#d88030',lurkD:'#382008',whale:'#5898d8',whaleD:'#142440',
  phant:'#c058e0',phantD:'#280c40',apex:'#d82818',apexD:'#380404',
  mirr:'#e0f0f8',mirrGl:'#40e0f0'
};

const STAGES=[
  {name:'MOTE',thr:0,next:120,c:C.mote,spd:2.8,bR:6,desc:'Consume to grow.',ab:null,abT:'',cd:0},
  {name:'DRIFTER',thr:120,next:400,c:C.drifter,spd:3.2,bR:7,desc:'Tap to dash.',ab:'dash',abT:'TAP — Dash',cd:700},
  {name:'MEDUSA',thr:400,next:1100,c:C.medusa,spd:2.4,bR:8,desc:'Sting aura slows prey.',ab:'sting',abT:'Sting aura',cd:0},
  {name:'NAGA',thr:1100,next:2800,c:C.naga,spd:3.4,bR:7,desc:'Tap to lash tail.',ab:'whip',abT:'TAP — Whip',cd:1000},
  {name:'TITAN',thr:2800,next:6000,c:C.titan,spd:2.2,bR:9,desc:'Gravity well pulls prey.',ab:'gravity',abT:'Gravity well',cd:0},
  {name:'PRIMORDIAL',thr:6000,next:Infinity,c:C.primo,spd:2.8,bR:8,desc:'Tap to fire bolts.',ab:'bolt',abT:'TAP — Bolt',cd:400}
];

const ORGS={
  bloom:{col:C.bloom,dim:C.bloomD,minR:4,maxR:7,spd:.04,hp:1,mass:8,beh:'bloom',spW:500,mx:10},
  mote:{col:C.prey,dim:C.preyD,minR:2.5,maxR:5.5,spd:.25,hp:1,mass:5,beh:'drift',spW:700,mx:55,school:true,schR:90},
  polyp:{col:C.cell,dim:C.cellD,minR:5,maxR:9,spd:.5,hp:2,mass:12,beh:'swarm',spW:850,mx:28,school:true,schR:110},
  tendril:{col:C.jelly,dim:C.jellyD,minR:8,maxR:14,spd:.4,hp:4,mass:22,beh:'pulse',spW:950,mx:12,school:true,schR:130},
  hunter:{col:C.hunt,dim:C.huntD,minR:12,maxR:22,spd:1.5,hp:8,mass:35,beh:'chase',spW:1100,mx:8},
  lurker:{col:C.lurk,dim:C.lurkD,minR:14,maxR:26,spd:.3,hp:11,mass:50,beh:'ambush',spW:1300,mx:5},
  levia:{col:C.whale,dim:C.whaleD,minR:30,maxR:50,spd:.6,hp:30,mass:90,beh:'passive',spW:1500,mx:3},
  phantom:{col:C.phant,dim:C.phantD,minR:16,maxR:30,spd:1,hp:18,mass:60,beh:'lure',spW:1400,mx:4},
  behemoth:{col:C.apex,dim:C.apexD,minR:40,maxR:65,spd:1.2,hp:50,mass:140,beh:'apex',spW:1800,mx:2},
  echo:{col:C.mirr,dim:'#384848',minR:11,maxR:20,spd:1,hp:18,mass:65,beh:'mirror',spW:1100,mx:2}
};

// ═══ FOOD CHAIN ═══
// Each type lists what it actively hunts (organism types)
const PREY_OF={
  hunter:['mote','polyp','bloom'],      // barracuda hunts small fish
  lurker:['mote','polyp','tendril'],     // angler lures small things
  phantom:['mote','polyp','tendril'],    // phantom hunts with deception
  behemoth:['mote','polyp','tendril','hunter','lurker','phantom'], // apex eats most
  levia:['bloom','mote'],                // whale filter-feeds tiny things
  tendril:['mote','bloom'],              // jelly catches small drifters
  echo:['mote','polyp']                  // mirror hunts small things
};
// Hunt range per type (how far they'll chase prey organisms)
const ECO_HUNT_R = { hunter:180, lurker:100, phantom:150, behemoth:250, levia:120, tendril:80, echo:140 };

let P,orgs,projs,parts,txts,dust;
let paused=false,gt=0,score=0,shx=0,shy=0,shi=0,shd=0;
let abil_cd=0,streak=0,streakT=0,off={x:0,y:0},zm=1;
let muted=false,radarOn=false,jkAct=false,jkX=0,jkY=0,behMem=[];
let pill={x:0,y:0,r:9,on:false,cd:0},shld={x:0,y:0,r:9,on:false,cd:0};
let frenzy=false,fTime=0,shOn=false,shTime=0,beacons=[];

function init(){
  P={x:0,y:0,r:6,mass:10,vx:0,vy:0,hd:0,stg:0,tail:[],blink:0,dash:false,dashT:0,boost:0,flash:{c:'#fff',t:0}};
  orgs=[];projs=[];parts=[];txts=[];dust=[];score=0;abil_cd=0;streak=0;streakT=0;gt=0;behMem=[];
  frenzy=false;fTime=0;shOn=false;shTime=0;
  pill={x:0,y:0,r:9,on:false,cd:0};shld={x:0,y:0,r:9,on:false,cd:0};beacons=[];
  [{x:0,y:-1400},{x:0,y:1400},{x:1400,y:0},{x:-1400,y:0}].forEach(p=>beacons.push({...p,r:14}));
  spawn('bloom',10);spawn('mote',45);spawn('polyp',22);spawn('tendril',8);spawn('hunter',4);spawn('lurker',2);spawn('levia',2);spawn('phantom',2);spawn('behemoth',1);
  for(let i=0;i<60;i++)dust.push({x:rng(-1500,1500),y:rng(-1500,1500),s:rng(.2,1),vx:rng(-.04,.04),vy:rng(-.04,.04),a:rng(.015,.055),ph:rng(0,TAU)});
}

function spawn(type,n){
  const T=ORGS[type];
  for(let i=0;i<n;i++){
    if(type==='echo'&&orgs.filter(o=>o.type==='echo').length>=2)return;
    const r=rng(T.minR,T.maxR),a=Math.random()*TAU,d=rng(type==='bloom'?60:180,T.spW);
    const hueShift=rng(-12,12);
    orgs.push({type,x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,
      r,br:r,hp:T.hp,mhp:T.hp,vx:0,vy:0,hd:Math.random()*TAU,
      st:'idle',stT:0,stunT:0,wAng:Math.random()*TAU,ph:rng(0,TAU),
      ambR:type==='lurker',lAng:rng(0,TAU),trail:[],flT:0,
      hueShift,finPh:rng(0,TAU),breathPh:rng(0,TAU),
      eyeAng:0,scatterT:0,
      // bloom-specific: lobe offsets for organic shape
      lobes:type==='bloom'?Array.from({length:5},()=>({a:rng(0,TAU),d:rng(.25,.4),r:rng(.45,.6),ph:rng(0,TAU)})):null
    });
  }
}

function stg(){return STAGES[P.stg];}
function canEat(o){return o.r<P.r*.8;}
function isPred(o){return o.r>P.r*1.2;}

// ═══ INPUT ═══
let ptr={x:0,y:0,on:false,tap:false};
const tw=e=>({x:(e.clientX-off.x)/zm,y:(e.clientY-off.y)/zm});
G.addEventListener('pointerdown',e=>{if(paused)return;ptr.on=true;ptr.tap=true;const w=tw(e);ptr.x=w.x;ptr.y=w.y;});
G.addEventListener('pointermove',e=>{if(!ptr.on||paused)return;const w=tw(e);ptr.x=w.x;ptr.y=w.y;});
G.addEventListener('pointerup',()=>ptr.on=false);
document.getElementById('pauseBtn').onclick=()=>{paused=!paused;document.getElementById('pauseMenu').style.display=paused?'flex':'none';};
document.getElementById('resumeBtn').onclick=()=>{paused=false;document.getElementById('pauseMenu').style.display='none';};
document.getElementById('restartBtn').onclick=()=>{paused=false;document.getElementById('pauseMenu').style.display='none';init();};
document.getElementById('muteBtn').onclick=()=>{muted=!muted;document.getElementById('muteBtn').textContent=muted?'Unmute':'Mute';};
document.getElementById('radarBtn').onclick=()=>{radarOn=!radarOn;document.getElementById('radarWrap').style.display=radarOn?'block':'none';};
const jC=document.getElementById('joystickC'),jctx=jC?.getContext('2d');
jC?.addEventListener('touchstart',e=>{if(paused)return;e.preventDefault();const t=e.touches[0],r=jC.getBoundingClientRect();jkX=(t.clientX-r.left-50)/50;jkY=(t.clientY-r.top-50)/50;const L=Math.hypot(jkX,jkY);if(L>1){jkX/=L;jkY/=L;}jkAct=true;ptr.on=true;});
jC?.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=jC.getBoundingClientRect();jkX=(t.clientX-r.left-50)/50;jkY=(t.clientY-r.top-50)/50;const L=Math.hypot(jkX,jkY);if(L>1){jkX/=L;jkY/=L;}});
jC?.addEventListener('touchend',()=>{jkAct=false;jkX=jkY=0;ptr.on=false;});
if(/Mobi|Android/i.test(navigator.userAgent))document.getElementById('joystick').style.display='block';
function snd(id){const s=document.getElementById(id);if(s&&!muted){s.currentTime=0;s.play().catch(()=>{});}}
addEventListener('touchstart',()=>{const b=document.getElementById('bgm');if(b&&b.paused&&!muted)b.play().catch(()=>{});},{once:true});
addEventListener('pointerdown',()=>{const b=document.getElementById('bgm');if(b&&b.paused&&!muted)b.play().catch(()=>{});},{once:true});

function burst(x,y,c,n=10,s=2){for(let i=0;i<n;i++){const a=Math.random()*TAU,sp=rng(.3,s);parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rng(.5,3),life:rng(200,500),ml:500,c,t:'c'});}}
function ring(x,y,c,rad,n=12){for(let i=0;i<n;i++){const a=(i/n)*TAU;parts.push({x:x+Math.cos(a)*rad,y:y+Math.sin(a)*rad,vx:Math.cos(a)*1,vy:Math.sin(a)*1,r:1.5,life:300,ml:300,c,t:'c'});}}
function fTxt(x,y,t,c){txts.push({x,y,t,c,life:900,ml:900});}
function shk(i,d){shi=Math.max(shi,i);shd=Math.max(shd,d);}

// Nebula
const neb=document.createElement('canvas');neb.width=neb.height=512;
(()=>{const c=neb.getContext('2d');c.fillStyle='#010810';c.fillRect(0,0,512,512);[{x:100,y:80,r:200,c:'rgba(0,30,60,.06)'},{x:400,y:130,r:180,c:'rgba(40,0,50,.05)'},{x:250,y:380,r:260,c:'rgba(0,25,50,.07)'},{x:60,y:430,r:150,c:'rgba(30,20,0,.04)'},{x:400,y:400,r:180,c:'rgba(0,40,35,.04)'}].forEach(b=>{const g=c.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,b.c);g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(0,0,512,512);});const id=c.getImageData(0,0,512,512);for(let i=0;i<id.data.length;i+=4){const n=(Math.random()-.5)*4;id.data[i]+=n;id.data[i+1]+=n;id.data[i+2]+=n;}c.putImageData(id,0,0);})();
const stars=[];for(let i=0;i<140;i++)stars.push({x:rng(-4000,4000),y:rng(-4000,4000),s:rng(.2,1.5),dp:rng(.03,.12),tw:rng(.3,2),ph:rng(0,TAU),c:['#c8d8f0','#f0dcc0','#e8c8e0','#c0e8e0'][rni(0,4)]});

// ═══ BOIDS ═══
function boids(o,dt){const T=ORGS[o.type];if(!T.school)return{fx:0,fy:0};const schR=T.schR||100;let sepX=0,sepY=0,sepN=0,aliX=0,aliY=0,aliN=0,cohX=0,cohY=0,cohN=0;for(const q of orgs){if(q===o||q.type!==o.type)continue;const dx=q.x-o.x,dy=q.y-o.y,dd=Math.hypot(dx,dy);if(dd>schR||dd<.1)continue;if(dd<schR*.35){const w=1-dd/(schR*.35);sepX-=(dx/dd)*w;sepY-=(dy/dd)*w;sepN++;}aliX+=Math.cos(q.hd);aliY+=Math.sin(q.hd);aliN++;cohX+=q.x;cohY+=q.y;cohN++;}let fx=0,fy=0;if(sepN>0){fx+=sepX/sepN*1.8;fy+=sepY/sepN*1.8;}if(aliN>0){fx+=(aliX/aliN-Math.cos(o.hd))*.6;fy+=(aliY/aliN-Math.sin(o.hd))*.6;}if(cohN>0){const cx2=cohX/cohN-o.x,cy2=cohY/cohN-o.y,cd=Math.hypot(cx2,cy2);if(cd>1){fx+=(cx2/cd)*.4;fy+=(cy2/cd)*.4;}}if(canEat(o)){const pd=d2(P,o),flR=100+P.r*2.5;if(pd<flR){o.scatterT=800;for(const q of orgs)if(q.type===o.type&&d2(o,q)<schR)q.scatterT=Math.max(q.scatterT,600);}}if(o.scatterT>0){fx*=.2;fy*=.2;const fa=a2(P,o),u=o.scatterT/800;fx+=Math.cos(fa)*3*u;fy+=Math.sin(fa)*3*u;}return{fx,fy};}
function schoolPulse(o){let nearest=null,nd=Infinity;for(const q of orgs){if(q===o||q.type!==o.type)continue;const dd=d2(o,q);if(dd<nd){nd=dd;nearest=q;}}if(nearest&&nd<(ORGS[o.type].schR||100)){o.breathPh+=Math.sin(nearest.breathPh-o.breathPh)*.02;}}

// ═══ ECOSYSTEM: find nearest huntable organism ═══
function findOrgPrey(o){
  const preyTypes=PREY_OF[o.type];if(!preyTypes)return null;
  const huntR=ECO_HUNT_R[o.type]||120;
  let best=null,bestD=huntR;
  for(const q of orgs){
    if(q===o||!preyTypes.includes(q.type))continue;

// ═══ ECOSYSTEM: organisms eat each other ═══
function ecoCollide(){

    const a=orgs[i];if(!a)continue;
    const preyTypes=PREY_OF[a.type];if(!preyTypes)continue;
    for(let j=orgs.length-1;j>=0;j--){
      if(i===j||!orgs[j])continue;
      const b=orgs[j];
      if(!preyTypes.includes(b.type))continue;
      if(b.r>=a.r*.8)continue; // must be smaller
      const dd=d2(a,b);
      if(dd<a.r+b.r*.3){
        // a eats b
        a.r=Math.min(a.r*1.02,ORGS[a.type].maxR*1.1); // predator grows slightly
        burst(b.x,b.y,ORGS[b.type].col,5,1.2);

        orgs.splice(j,1);
        if(j<i)i--;

        const bType=b.type;

        if(cnt<ORGS[bType].mx)setTimeout(()=>spawn(bType,1),rng(2000,5000));

    }
  }
}

    cx.strokeStyle='rgba(255,255,255,.07)';cx.lineWidth=.5;
    for(let a=0;a<3;a++){const aa=ts*.004+a*TAU/3;cx.beginPath();cx.arc(0,0,r*1.55,aa,aa+.3);cx.stroke();}
    // Three eyes (detailed, fiery)
    for(let s2=-1;s2<=1;s2++){
      const ed=s2===0?r*.42:r*.36,ey=s2*.24,er=s2===0?r*.12:r*.09;
      // Eye socket glow
      cx.fillStyle=c;cx.globalAlpha=.15;cx.beginPath();cx.arc(ed,ey,er*1.6,0,TAU);cx.fill();
      // Sclera
      cx.fillStyle='#fff';cx.globalAlpha=bv*.85;cx.beginPath();cx.arc(ed,ey,er,0,TAU);cx.fill();
      // Iris (fiery gradient)
      cx.fillStyle='#e85010';cx.globalAlpha=1;cx.beginPath();cx.arc(ed+r*.01,ey,er*.7,0,TAU);cx.fill();
      cx.fillStyle='#ff8020';cx.globalAlpha=.5;cx.beginPath();cx.arc(ed+r*.005,ey,er*.5,0,TAU);cx.fill();
      // Pupil
      cx.fillStyle='#100';cx.beginPath();cx.arc(ed+r*.015,ey,er*.3,0,TAU);cx.fill();
      // Specular
      cx.fillStyle='rgba(255,255,255,.4)';cx.beginPath();cx.arc(ed-er*.3,ey-er*.3,er*.15,0,TAU);cx.fill();}
    // Central heart/core (pulsing)
    const coreP=.12+.06*Math.sin(ts*.006);
    cx.fillStyle='rgba(255,255,255,'+coreP+')';cx.shadowBlur=8*zm;cx.shadowColor='#ffcc40';
    cx.beginPath();cx.arc(0,0,r*.22,0,TAU);cx.fill();
    cx.fillStyle='rgba(255,255,255,.3)';cx.beginPath();cx.arc(0,0,r*.08,0,TAU);cx.fill();
  }

  cx.restore();
  // Shield visual
  if(shOn){const rem=shTime/5000;cx.strokeStyle=`rgba(232,192,64,${.18*rem})`;cx.lineWidth=1;cx.shadowBlur=8*zm;cx.shadowColor='#e8c040';cx.beginPath();cx.arc(P.x,P.y,r*1.25,0,TAU);cx.stroke();cx.shadowBlur=0;}
  // Dash afterimage
  if(P.dash){cx.globalCompositeOperation='lighter';cx.fillStyle=c;cx.globalAlpha=.15;cx.beginPath();cx.arc(P.x-P.vx*3,P.y-P.vy*3,r*.55,0,TAU);cx.fill();cx.beginPath();cx.arc(P.x-P.vx*5,P.y-P.vy*5,r*.35,0,TAU);cx.fill();cx.globalCompositeOperation='source-over';}
  // Flash
  if(P.flash.t>0){cx.fillStyle=P.flash.c;cx.globalAlpha=.18*(P.flash.t/400);cx.beginPath();cx.arc(P.x,P.y,r*1.3,0,TAU);cx.fill();}
  cx.shadowBlur=0;cx.globalAlpha=1;
}

// ═══ BG / GRID / VIGNETTE / DUST / PICKUPS ═══
function drawBg(ts){const tl=1024,ox=(-P.x*.02)%tl,oy=(-P.y*.02)%tl;cx.globalAlpha=.5;for(let nx=-1;nx<=Math.ceil(W/tl)+1;nx++)for(let ny=-1;ny<=Math.ceil(H/tl)+1;ny++)cx.drawImage(neb,ox+nx*tl,oy+ny*tl,tl,tl);cx.globalAlpha=1;for(const s of stars){const sx2=(s.x-P.x*s.dp)*zm+off.x+shx,sy2=(s.y-P.y*s.dp)*zm+off.y+shy;if(sx2<-3||sx2>W+3||sy2<-3||sy2>H+3)continue;const tw=.2+.8*(.5+.5*Math.sin(ts*s.tw*.001+s.ph));cx.globalAlpha=tw*.55;cx.fillStyle=s.c;if(s.s>1.1){cx.fillRect(sx2-s.s,sy2-.2,s.s*2,.4);cx.fillRect(sx2-.2,sy2-s.s,.4,s.s*2);}cx.fillRect(sx2,sy2,s.s*.7,s.s*.7);}cx.globalAlpha=1;}
function drawGrid(){
  // ── Organic seabed grid ──
  // Major grid (200px) + minor grid (50px) with distance fade
  const majStep=200,minStep=50;
  // Minor grid (very faint, close range only)
  cx.lineWidth=.25;
  for(let i=-16;i<=16;i++)for(let j=-16;j<=16;j++){
    const x=i*minStep,y=j*minStep;if(!onS(x,y,minStep))continue;
    const dd=Math.hypot(x+minStep/2-P.x,y+minStep/2-P.y);
    const f=Math.max(0,1-dd/350);if(f<.01)continue;
    cx.strokeStyle=`rgba(18,28,40,${.06*f})`;cx.beginPath();cx.rect(x,y,minStep,minStep);cx.stroke();
  }
  // Major grid (more visible, extends further)
  cx.lineWidth=.5;
  for(let i=-8;i<=8;i++)for(let j=-8;j<=8;j++){
    const x=i*majStep,y=j*majStep;if(!onS(x,y,majStep*1.5))continue;
    const dd=Math.hypot(x+majStep/2-P.x,y+majStep/2-P.y);
    const f=Math.max(0,1-dd/800);
    cx.strokeStyle=`rgba(24,36,52,${.12*f+.015})`;cx.beginPath();cx.rect(x,y,majStep,majStep);cx.stroke();
    // Coordinate label at intersections (very subtle)
    if(f>.3&&zm>.6){cx.fillStyle=`rgba(30,45,65,${.08*f})`;cx.font='6px "Tenor Sans",serif';cx.textAlign='center';
    cx.fillText(`${i},${j}`,x,y-2);}
  }
  // ── Seabed pebbles/texture (fixed positions via seed hash) ──
  const pebStep=300;
  cx.fillStyle='rgba(16,24,36,.12)';
  for(let i=-5;i<=5;i++)for(let j=-5;j<=5;j++){
    const bx=i*pebStep,by=j*pebStep;if(!onS(bx,by,pebStep))continue;
    const dd=Math.hypot(bx-P.x,by-P.y);if(dd>900)continue;
    const fade=Math.max(0,1-dd/900);
    // Seed-based pseudo-random pebble positions within each cell
    const seed=(i*7919+j*104729)&0xFFFF;
    for(let p=0;p<6;p++){
      const ps=(seed*31+p*997)&0xFFFF;
      const px=bx+((ps%300)-150)*.95;
      const py=by+(((ps>>4)%300)-150)*.95;
      const pr=1.2+((ps>>8)%5)*.4;
      cx.globalAlpha=fade*(.04+((ps>>12)%3)*.02);
      cx.beginPath();cx.ellipse(px,py,pr,pr*.7,((ps>>6)%10)*.3,0,TAU);cx.fill();
    }
  }
  cx.globalAlpha=1;
  // ── Fixed landmark formations (coral/rock clusters at world positions) ──
  const lmks=[
    {x:0,y:0,s:8},{x:400,y:-300,s:6},{x:-500,y:200,s:7},{x:300,y:500,s:5},
    {x:-400,y:-500,s:6},{x:700,y:100,s:5},{x:-200,y:600,s:7},{x:600,y:-600,s:6},
    {x:-700,y:-200,s:5},{x:100,y:-700,s:6},{x:-600,y:400,s:5},{x:800,y:500,s:4},
    {x:500,y:-800,s:5},{x:-800,y:-600,s:4},{x:-300,y:-900,s:5},{x:900,y:-300,s:4}
  ];
  for(const lm of lmks){
    if(!onS(lm.x,lm.y,lm.s*6))continue;
    const dd=Math.hypot(lm.x-P.x,lm.y-P.y);if(dd>700)continue;
    const fade=Math.max(0,1-dd/700);
    // Rock cluster: several overlapping ellipses
    cx.fillStyle=`rgba(14,22,34,${.15*fade})`;
    const rseed=(lm.x*31+lm.y*17)&0xFFFF;
    for(let k=0;k<4;k++){
      const ka=((rseed+k*311)%628)*.01;
      const kd=lm.s*(1+((rseed>>k)%3)*.3);
      const kr=lm.s*(.6+((rseed>>(k+4))%4)*.15);
      cx.globalAlpha=fade*(.08+k*.02);
      cx.beginPath();cx.ellipse(lm.x+Math.cos(ka)*kd*.5,lm.y+Math.sin(ka)*kd*.5,kr,kr*.65,ka,0,TAU);cx.fill();
    }
    // Tiny bright tip (bioluminescent coral tip)
    cx.fillStyle=`rgba(60,140,120,${.06*fade})`;
    cx.beginPath();cx.arc(lm.x,lm.y-lm.s*.8,lm.s*.25,0,TAU);cx.fill();
  }
  cx.globalAlpha=1;
  // ── Distance rings from origin (compass reference) ──
  cx.strokeStyle='rgba(20,35,50,.04)';cx.lineWidth=.5;
  for(let ring=1;ring<=4;ring++){
    const rr=ring*400;if(!onS(0,0,rr+50))continue;
    cx.beginPath();cx.arc(0,0,rr,0,TAU);cx.stroke();
  }
  // Cardinal markers at origin
  if(onS(0,0,20)){
    cx.strokeStyle='rgba(40,70,90,.1)';cx.lineWidth=.6;
    cx.beginPath();cx.moveTo(-12,0);cx.lineTo(12,0);cx.stroke();
    cx.beginPath();cx.moveTo(0,-12);cx.lineTo(0,12);cx.stroke();
  }
}
function drawVig(){cx.setTransform(1,0,0,1,0,0);const g=cx.createRadialGradient(W/2,H/2,W*.18,W/2,H/2,W*.65);g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(1,8,16,.55)');cx.fillStyle=g;cx.fillRect(0,0,W,H);}
function drawDust(ts){while(dust.length<50)dust.push({x:P.x+rng(-W/zm,W/zm),y:P.y+rng(-H/zm,H/zm),s:rng(.2,.9),vx:rng(-.03,.03),vy:rng(-.03,.03),a:rng(.012,.045),ph:rng(0,TAU)});for(const d of dust){d.x+=d.vx;d.y+=d.vy;if(!onS(d.x,d.y,5)){d.x=P.x+rng(-W/zm,W/zm);d.y=P.y+rng(-H/zm,H/zm);}cx.fillStyle='rgba(160,200,240,'+d.a*(.5+.5*Math.sin(ts*.001+d.ph))+')';cx.beginPath();cx.arc(d.x,d.y,d.s,0,TAU);cx.fill();}}
function drawPicks(ts){if(pill.on){bioGlow(pill.x,pill.y,pill.r*3.5,C.drifter.gl,.35);cx.shadowBlur=8*zm;cx.shadowColor=C.drifter.pri;cx.fillStyle=C.drifter.pri;cx.globalAlpha=.55;cx.beginPath();cx.arc(pill.x,pill.y,pill.r*(1+.12*Math.sin(ts*.005)),0,TAU);cx.fill();cx.fillStyle='rgba(255,255,255,.25)';cx.beginPath();cx.arc(pill.x,pill.y,pill.r*.28,0,TAU);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;}if(shld.on){bioGlow(shld.x,shld.y,shld.r*3.5,C.primo.gl,.35);cx.shadowBlur=8*zm;cx.shadowColor=C.primo.pri;cx.fillStyle=C.primo.pri;cx.globalAlpha=.55;cx.beginPath();cx.arc(shld.x,shld.y,shld.r*(1+.1*Math.sin(ts*.006)),0,TAU);cx.fill();cx.fillStyle='rgba(255,255,255,.25)';cx.beginPath();cx.arc(shld.x,shld.y,shld.r*.28,0,TAU);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;}beacons.forEach(b=>{if(!onS(b.x,b.y,b.r*2))return;cx.fillStyle='rgba(200,220,255,.3)';cx.globalAlpha=.35+.1*Math.sin(ts*.003);cx.beginPath();cx.arc(b.x,b.y,b.r,0,TAU);cx.fill();cx.globalAlpha=1;});}

// Radar + Minimap + Head + Joystick + HUD
const rc=document.getElementById('radar').getContext('2d');
function drawRadar(){rc.clearRect(0,0,68,68);rc.fillStyle='rgba(0,0,0,.2)';rc.fillRect(0,0,68,68);const sw=gt*.002%TAU;rc.strokeStyle='rgba(100,200,180,.2)';rc.lineWidth=.6;rc.beginPath();rc.moveTo(34,34);rc.lineTo(34+Math.cos(sw)*32,34+Math.sin(sw)*32);rc.stroke();rc.fillStyle=stg().c.pri;rc.beginPath();rc.arc(34,34,2,0,TAU);rc.fill();const rng2=Math.max(1600,Math.hypot(P.x,P.y)*1.1),sc=64/(rng2*2);orgs.forEach(o=>{const T=ORGS[o.type],dx2=(o.x-P.x)*sc+34,dy2=(o.y-P.y)*sc+34;if(dx2<2||dx2>66||dy2<2||dy2>66)return;rc.fillStyle=o.type==='echo'?C.mirrGl:canEat(o)?'#5a5':isPred(o)?'#a44':T.col;rc.beginPath();rc.arc(dx2,dy2,cl(o.r*.04,.4,1.6),0,TAU);rc.fill();});}
const mc=document.getElementById('minimapC').getContext('2d');
function drawMM(){mc.clearRect(0,0,76,76);mc.fillStyle='rgba(1,8,16,.35)';mc.fillRect(0,0,76,76);const rng2=1600,sc=72/(rng2*2);orgs.forEach(o=>{const T=ORGS[o.type],dx2=(o.x-P.x)*sc+38,dy2=(o.y-P.y)*sc+38;if(dx2<2||dx2>74||dy2<2||dy2>74)return;mc.fillStyle=o.type==='echo'?C.mirrGl:canEat(o)?'#5a5':isPred(o)?'#a44':T.col;mc.beginPath();mc.arc(dx2,dy2,cl(o.r*.05,.4,1.6),0,TAU);mc.fill();});mc.fillStyle=stg().c.pri;mc.beginPath();mc.arc(38,38,2,0,TAU);mc.fill();}
function updateHead(){const w=document.getElementById('dragonHead'),sz=TILE*SCALE*Math.min(1.3,.8+(P.r/18));const sx2=P.x*zm+off.x+shx,sy2=P.y*zm+off.y+shy;w.style.width=sz+'px';w.style.height=sz+'px';w.style.left=(sx2-sz/2)+'px';w.style.top=(sy2-sz/2)+'px';document.getElementById('headCanvas').style.width=sz+'px';document.getElementById('headCanvas').style.height=sz+'px';if(typeof window.renderHead==='function'){const yT=(P.hd+PI)/TAU;window.renderHead((yT%1)*TAU,(cl(Math.hypot(P.vx,P.vy)/3,0,1)*.5-.25)*PI);}}
function drawJK(){if(!jctx)return;jctx.clearRect(0,0,100,100);jctx.fillStyle='rgba(255,255,255,.04)';jctx.beginPath();jctx.arc(50,50,44,0,TAU);jctx.fill();if(jkAct){jctx.fillStyle='rgba(255,255,255,.12)';jctx.beginPath();jctx.arc(50+jkX*26,50+jkY*26,12,0,TAU);jctx.fill();}}
const cdC=document.getElementById('cdRing').getContext('2d');
function updateHUD(){const s=stg(),nx=STAGES[P.stg+1];document.getElementById('stgLbl').textContent=s.name;document.getElementById('stgLbl').style.color=s.c.pri;document.getElementById('stgLbl').style.textShadow=`0 0 12px ${s.c.pri},0 0 30px ${s.c.dim}`;document.getElementById('massV').textContent=Math.floor(P.mass);document.getElementById('scoreLbl').textContent=score.toLocaleString();document.getElementById('abilLbl').textContent=s.abT+(streak>1?`  ${streak}x`:'');const bar=document.getElementById('evoFill');if(nx){const pct=cl((P.mass-s.thr)/(nx.thr-s.thr)*100,0,100);bar.style.width=pct+'%';bar.style.background=`linear-gradient(90deg,${s.c.pri},${nx.c.pri})`;document.getElementById('evoNxt').textContent=`${nx.name} — ${nx.thr}`;}else{bar.style.width='100%';bar.style.background=s.c.pri;document.getElementById('evoNxt').textContent='APEX';}cdC.clearRect(0,0,24,24);if(s.cd>0){const pct2=1-abil_cd/s.cd;cdC.strokeStyle=s.c.pri;cdC.lineWidth=1.5;cdC.beginPath();cdC.arc(12,12,9,-PI/2,-PI/2+pct2*TAU);cdC.stroke();cdC.strokeStyle='rgba(255,255,255,.04)';cdC.beginPath();cdC.arc(12,12,9,0,TAU);cdC.stroke();}const hpPct=(P.mass-STAGES[P.stg].thr*.85)/(Math.max(1,STAGES[P.stg].thr*.15));document.getElementById('dangerV').style.opacity=hpPct<.3?(.3-hpPct)/.3*.5:0;}

// ═══ MAIN LOOP ═══
let lt=0;
function loop(ts){
  requestAnimationFrame(loop);if(paused){lt=ts;return;}
  const dt=Math.min(ts-lt,50)||16;lt=ts;gt+=dt;
  if(shd>0){shd-=dt;const t=cl(shd/300,0,1);shx=(Math.random()-.5)*shi*t*2;shy=(Math.random()-.5)*shi*t*2;}else{shx=shy=0;shi=0;}
  updateP(dt);orgs.forEach(o=>aiOrg(o,dt));collide(dt);ecoCollide();
  const tz=cl(H/(P.r*5.5),.3,1.5);zm=lp(zm,tz,.04);off.x=W/2-P.x*zm;off.y=H/2-P.y*zm;
  for(const[type,T]of Object.entries(ORGS)){if(type==='echo')continue;const cnt=orgs.filter(o=>o.type===type).length;if(cnt<T.mx*.35)spawn(type,1);}
  cx.setTransform(1,0,0,1,0,0);cx.clearRect(0,0,W,H);drawBg(ts);
  cx.setTransform(zm,0,0,zm,off.x+shx,off.y+shy);drawGrid();drawDust(ts);
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;p.life-=dt;if(p.life<=0){parts.splice(i,1);continue;}const a=cl(p.life/p.ml,0,1);cx.fillStyle=p.c;cx.globalAlpha=a*(p.t==='lure'?.3*(.5+.5*Math.sin(ts*.01)):.45);cx.beginPath();cx.arc(p.x,p.y,p.r*a,0,TAU);cx.fill();}if(parts.length>300)parts.splice(300);cx.globalAlpha=1;
  orgs.forEach(o=>drawCreature(o,ts));
  projs.forEach(p=>{cx.fillStyle=p.c;cx.globalAlpha=.75;cx.shadowBlur=6*zm;cx.shadowColor=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r,0,TAU);cx.fill();cx.fillStyle='rgba(255,255,255,.35)';cx.beginPath();cx.arc(p.x,p.y,p.r*.3,0,TAU);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;});
  drawPicks(ts);drawP(ts);
  cx.font='500 12px "Tenor Sans",serif';cx.textAlign='center';for(let i=txts.length-1;i>=0;i--){const f=txts[i];f.y-=.6*(dt/16);f.life-=dt;if(f.life<=0){txts.splice(i,1);continue;}cx.fillStyle=f.c;cx.globalAlpha=cl(f.life/f.ml,0,1);cx.fillText(f.t,f.x,f.y);}cx.globalAlpha=1;
  if(frenzy){cx.setTransform(1,0,0,1,0,0);cx.globalAlpha=.025+.012*Math.sin(ts*.007);cx.fillStyle='#4080f0';cx.fillRect(0,0,W,H);cx.globalAlpha=1;}
  drawVig();updateHUD();if(radarOn)drawRadar();drawMM();drawJK();updateHead();
}
init();requestAnimationFrame(loop);
</script>
